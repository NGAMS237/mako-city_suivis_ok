<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Veraluz OS — Paramètres</title>
<style>
:root{
  --acc:#22d3a5;--acc2:#1ba87f;
  --bg:#0f1117;--bg2:#161b24;--bg3:#1e2535;--bg4:#252d3d;
  --text:#e8eaf0;--text2:#8b95a8;--text3:#5a6478;
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --green:#10b981;--orange:#f97316;--purple:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;}

/* ── Tab bar ── */
#tabbar{
  display:flex;overflow-x:auto;background:var(--bg2);
  border-bottom:2px solid var(--bg4);flex-shrink:0;scrollbar-width:none;
}
#tabbar::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;border:none;background:none;color:var(--text3);
  padding:0 14px;height:48px;cursor:pointer;font-size:12px;font-weight:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  border-bottom:2px solid transparent;transition:.15s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text2);background:var(--bg3);}
.tab-btn.active{color:var(--acc);border-bottom-color:var(--acc);background:rgba(34,211,165,.05);}
.tab-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.tab-label{font-size:10px;line-height:1;}

/* ── Unsaved bar ── */
#unsaved-bar{
  display:none;background:rgba(245,158,11,.12);border-bottom:1px solid rgba(245,158,11,.3);
  padding:8px 16px;flex-shrink:0;align-items:center;gap:10px;font-size:12px;color:var(--amber);
}
#unsaved-bar.show{display:flex;}
#unsaved-bar button{padding:5px 14px;border-radius:6px;border:none;font-size:12px;
  font-weight:600;cursor:pointer;}
.btn-save{background:var(--acc);color:#000;}
.btn-discard{background:var(--bg4);color:var(--text2);}

/* ── Content ── */
#content{flex:1;overflow-y:auto;padding:16px;display:none;}
#content.active{display:block;}
#section-wrap{flex:1;overflow-y:auto;padding:16px;}

/* ── Page header ── */
.ph{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid var(--bg4);}
.ph svg{width:22px;height:22px;stroke:var(--acc);fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.ph-text h2{font-size:15px;font-weight:700;}
.ph-text p{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── Card ── */
.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;
  padding:16px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.card-title svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;}

/* ── Form rows ── */
.row{margin-bottom:12px;}
.row label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;}
.row input,.row select,.row textarea{
  width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--bg4);
  border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:.15s;}
.row input:focus,.row select:focus,.row textarea:focus{border-color:var(--acc);}
.row textarea{resize:vertical;min-height:70px;}
.row-hint{font-size:10px;color:var(--text3);margin-top:4px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.row2{grid-template-columns:1fr;}}

/* ── Toggle row ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--bg4);}
.toggle-row:last-child{border-bottom:none;}
.toggle-info{flex:1;}
.toggle-label{font-size:13px;font-weight:500;}
.toggle-desc{font-size:11px;color:var(--text2);margin-top:2px;}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:var(--bg4);border-radius:12px;
  cursor:pointer;transition:.2s;}
.toggle input:checked + .toggle-track{background:var(--acc);}
.toggle-track::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;
  background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked + .toggle-track::after{transform:translateX(18px);}

/* ── Logo preview ── */
#logo-preview{
  width:80px;height:80px;border-radius:12px;background:var(--bg3);
  border:2px dashed var(--bg4);display:flex;align-items:center;justify-content:center;
  overflow:hidden;margin-bottom:10px;cursor:pointer;transition:.15s;}
#logo-preview:hover{border-color:var(--acc);}
#logo-preview img{width:100%;height:100%;object-fit:contain;}
#logo-preview .lp-placeholder{font-size:11px;color:var(--text3);text-align:center;padding:8px;}

/* ── Color swatch ── */
.color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.color-row label{font-size:12px;color:var(--text2);flex:1;}
.color-row input[type=color]{width:40px;height:32px;border:none;border-radius:6px;
  cursor:pointer;background:none;padding:0;}
.color-val{font-size:11px;color:var(--text3);width:60px;font-family:monospace;}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.tbl th{text-align:left;padding:7px 10px;font-size:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bg4);}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--bg3);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--bg3);}

/* ── Badges ── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;
  font-size:10px;font-weight:600;}
.bdg-g{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.bdg-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.bdg-a{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.bdg-b{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;
  border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-p{background:var(--acc);color:#000;}
.btn-p:hover{background:var(--acc2);}
.btn-o{background:var(--bg3);color:var(--text2);border:1px solid var(--bg4);}
.btn-o:hover{background:var(--bg4);color:var(--text);}
.btn-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* ── Permission grid ── */
.perm-table{width:100%;border-collapse:collapse;font-size:11px;}
.perm-table th,.perm-table td{padding:7px 6px;text-align:center;border:1px solid var(--bg4);}
.perm-table th:first-child,.perm-table td:first-child{text-align:left;font-weight:600;
  white-space:nowrap;padding-left:10px;}
.perm-table thead th{background:var(--bg3);font-size:10px;color:var(--text2);}
.perm-table input[type=checkbox]{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;}

/* ── Integration card ── */
.integ-card{display:flex;align-items:flex-start;gap:12px;padding:12px;
  background:var(--bg3);border-radius:10px;margin-bottom:8px;}
.integ-icon{width:36px;height:36px;border-radius:8px;background:var(--bg4);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.integ-icon svg{width:18px;height:18px;stroke:var(--acc);fill:none;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;}
.integ-body{flex:1;}
.integ-name{font-size:13px;font-weight:600;}
.integ-desc{font-size:11px;color:var(--text2);margin-top:2px;}
.integ-status{margin-top:6px;}

/* ── Toast ── */
#toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--bg4);
  border-radius:10px;padding:10px 16px;font-size:12.5px;z-index:9999;
  display:none;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);}
#toast.show{display:flex;}

/* ── Modal ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;
  display:none;align-items:center;justify-content:center;padding:16px;}
#modal-overlay.show{display:flex;}
#modal{background:var(--bg2);border:1px solid var(--bg4);border-radius:14px;
  width:100%;max-width:420px;overflow:hidden;}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--bg4);font-size:14px;font-weight:700;}
.modal-bd{padding:20px;}
.modal-ft{padding:12px 20px;border-top:1px solid var(--bg4);display:flex;gap:8px;justify-content:flex-end;}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
</style>
</head>
<body>
<div id="app">

<!-- ── Tab Bar ── -->
<div id="tabbar">
  <button class="tab-btn active" onclick="goSection('hotel')" id="tab-hotel">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

  <button class="tab-btn" onclick="goSection('systeme')" id="tab-systeme">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
    <span class="tab-label">Système</span>
  </button>
</div>

<!-- ── Unsaved changes bar ── -->
<div id="unsaved-bar">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Modifications non sauvegardées
  <button class="btn-save" onclick="saveAll()">Enregistrer</button>
  <button class="btn-discard" onclick="discardChanges()">Annuler</button>
</div>

<!-- ── Section content ── -->
<div id="section-wrap"></div>

</div><!-- #app -->

<!-- ── Modal ── -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="modal-hd" id="modal-title">Confirmation</div>
    <div class="modal-bd" id="modal-body"></div>
    <div class="modal-ft" id="modal-ft"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════
   SETTINGS_EMBEDDED v3 — Veraluz OS
   Icônes monochrome · Logo → Core · Langue/Devise/Taxe → modules
══════════════════════════════════════════════════════════ */
var MODULE_ID = 'veraluz-settings';
var LS_KEY    = 'veraluz_settings_v3';
var isDirty   = false;
var currentSection = 'hotel';

/* ── Default settings ── */
var DEFAULTS = {
  hotel: {
    name:'Résidence Veraluz', tagline:'Vue sur mer · Kribi · Cameroun',
    address:'Boulevard de l\'Océan, Kribi, Sud Cameroun',
    phone:'+237 6XX XXX XXX', email:'contact@veraluz.cm',
    website:'https://veraluz.cm', checkin:'14:00', checkout:'11:00',
    timezone:'Africa/Douala', total_rooms:9
  },
  branding: {
    logo_url:'', primary_color:'#22d3a5', secondary_color:'#1ba87f',
    bg_color:'#0f1117', font:'Inter', dark_mode:true, show_logo:true
  },
  chambres: [
    {id:'std',   name:'Chambre Standard',     count:5, capacity:2, price:75000,  amenities:'WiFi, Climatisation, TV, Vue jardin'},
    {id:'apt',   name:'Appartement 2 ch.',    count:1, capacity:5, price:120000, amenities:'WiFi, Clim, 2 TV, Cuisine équipée'},
    {id:'stua',  name:'Studio A (2e étage)',  count:1, capacity:3, price:90000,  amenities:'WiFi, Clim, TV, Kitchenette'},
    {id:'stub',  name:'Studio B (2e étage)',  count:1, capacity:3, price:90000,  amenities:'WiFi, Clim, TV, Kitchenette'},
    {id:'suite', name:'Suite Présidentielle', count:1, capacity:4, price:250000, amenities:'WiFi, Clim, TV, Minibar, Jacuzzi, Vue mer panoramique'},
  ],
  tarifs: {
    currency:'XAF', tax_tva:{rate:19.25, active:true, name:'TVA'},
    tax_tourist:{rate:2000, active:true, name:'Taxe touristique (XAF/nuit)'},
    tax_service:{rate:10, active:true, name:'Charge de service'},
    tax_municipal:{rate:5000, active:false, name:'Taxe communale (XAF)'},
    early_checkin:15000, late_checkout:12000, extra_bed:10000, cancellation_pct:30
  },
  devises: {
    primary:'XAF', secondary:'EUR', language:'fr',
    date_format:'DD/MM/YYYY', time_format:'24h', timezone:'Africa/Douala'
  },
  restaurant: {
    name:'Le Mako Lounge', capacity:40,
    open:'07:00', close:'23:00',
    breakfast_start:'07:00', breakfast_end:'10:30',
    lunch_start:'12:00', lunch_end:'14:30',
    dinner_start:'19:00', dinner_end:'22:30',
    room_service:true, bar_active:true, bar_open:'10:00', bar_close:'00:00',
    tva:19.25, service_charge:10, min_order:3000
  },
  notifs: {
    email_reservations:true, email_payments:true, email_checkin:true,
    email_checkout:false, sms_reservations:false, sms_payments:false,
    daily_report:true, weekly_report:true, low_stock_alert:true,
    payment_alert:true, alert_email:'afterworkquebec2025@gmail.com'
  },
  permissions: {
    admin:       {reservations:true,  paiements:true,  housekeeping:true,  restaurant:true,  rh:true,   finance:true,  analytics:true, audit:true,  settings:true},
    gerant:      {reservations:true,  paiements:true,  housekeeping:true,  restaurant:true,  rh:true,   finance:true,  analytics:true, audit:true,  settings:false},
    receptionist:{reservations:true,  paiements:true,  housekeeping:false, restaurant:false, rh:false,  finance:false, analytics:false,audit:false, settings:false},
    housekeeping:{reservations:false, paiements:false, housekeeping:true,  restaurant:false, rh:false,  finance:false, analytics:false,audit:false, settings:false},
    restaurant:  {reservations:false, paiements:false, housekeeping:false, restaurant:true,  rh:false,  finance:false, analytics:false,audit:false, settings:false},
  },
  integrations: {
    booking_com:false, airbnb:false, cinetpay:true, whatsapp:false,
    booking_com_key:'', airbnb_key:'', cinetpay_key:'', whatsapp_number:''
  },
  email: {
    template_id:'', test_address:'residenceveraluz@gmail.com',
    auto_booking:true, auto_alert:true, auto_report:false
  },
  systeme: {
    auto_backup:true, backup_freq:'daily', log_retention:90,
    session_timeout:480, maintenance_mode:false
  }
};

var S = {};

/* ── Load / Save ── */
function loadSettings(){
  try{ var sv=localStorage.getItem(LS_KEY); S=sv?JSON.parse(sv):JSON.parse(JSON.stringify(DEFAULTS)); }
  catch(e){ S=JSON.parse(JSON.stringify(DEFAULTS)); }
  Object.keys(DEFAULTS).forEach(function(k){ if(!S[k]) S[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); });
}

/* ── Event Bus ── */
function emit(type, data){
  try{ window.parent.postMessage({veraluzEvent:true, source:MODULE_ID, type:type, data:data||{}}, '*'); }
  catch(e){}
}

/* ── Toast ── */
function toast(msg, ok){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show';
  if(ok===false) el.style.borderColor='var(--red)'; else el.style.borderColor='var(--bg4)';
  setTimeout(function(){el.className='toast';},2800);
}

/* ── Dirty state ── */
function markDirty(){
  isDirty=true;
  document.getElementById('unsaved-bar').classList.add('show');
}
function markClean(){
  isDirty=false;
  document.getElementById('unsaved-bar').classList.remove('show');
}

/* ── Navigation ── */
function goSection(id){
  collectForm(); /* Sauvegarder la section courante avant de changer */
  currentSection=id;
  document.querySelectorAll('.tab-btn').forEach(function(el){ el.classList.remove('active'); });
  var tab = document.getElementById('tab-'+id);
  if(tab){ tab.classList.add('active'); tab.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }
  renderSection(id);
}

/* ── Save All ── */
function saveAll(){
  collectForm();
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(S));
    markClean();
    toast('✓ Paramètres enregistrés');
    /* Propager au Core */
    emit('settings-updated', {section:currentSection, ts:new Date().toISOString()});
    /* Propager les infos hôtel vers le Booking Engine */
    if(S.hotel){
      try{ localStorage.setItem('vz_hotel_info', JSON.stringify(S.hotel)); }catch(e){}
      emit('hotel-info-updated', {
        name:    S.hotel.name    || 'Résidence Veraluz',
        tagline: S.hotel.tagline || '',
        address: S.hotel.address || '',
        phone:   S.hotel.phone   || '',
        email:   S.hotel.email   || '',
        website: S.hotel.website || '',
        ts: new Date().toISOString()
      });
    }
    /* Propager logo si changé */
    if(S.branding && S.branding.logo_url){
      emit('logo-updated', {logo_url:S.branding.logo_url, ts:new Date().toISOString()});
      try{ localStorage.setItem('vz_logo_data', S.branding.logo_url); }catch(e2){}
    }
    /* Sauvegarder Template ID EmailJS */
    if(S.email && S.email.template_id){
      try{ localStorage.setItem('vz_email_template', S.email.template_id); }catch(e2){}
    }
    /* Propager langue/devise/taxes aux modules */
    emit('locale-updated', {
      language:  S.devises.language,
      currency:  S.devises.primary,
      currency2: S.devises.secondary,
      date_fmt:  S.devises.date_format,

/* ── Field helper ── */
function field(label, dfn, val, type, hint){
  type=type||'text';
  var h='<div class="row"><label>'+label+'</label>';
  h+='<input type="'+type+'" data-field="'+dfn+'" value="'+escH(String(val||''))+'" oninput="markDirty()">';
  if(hint) h+='<div class="row-hint">'+hint+'</div>';
  h+='</div>'; return h;
}
function sel(label, dfn, val, opts){
  var h='<div class="row"><label>'+label+'</label><select data-field="'+dfn+'" onchange="markDirty()">';
  opts.forEach(function(o){ h+='<option value="'+o[0]+'"'+(o[0]===val?' selected':'')+'>'+o[1]+'</option>'; });
  h+='</select></div>'; return h;
}
function toggle(label, desc, dfn, val){
  return '<div class="toggle-row"><div class="toggle-info"><div class="toggle-label">'+label+'</div>'+(desc?'<div class="toggle-desc">'+desc+'</div>':'')+'</div>'
    +'<label class="toggle"><input type="checkbox" data-field="'+dfn+'"'+(val?' checked':'')
    +' onchange="markDirty()"><div class="toggle-track"></div></label></div>';
}
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ph(icon, title, desc){
  return '<div class="ph">'+icon+'<div class="ph-text"><h2>'+title+'</h2>'+(desc?'<p>'+desc+'</p>':'')+'</div></div>';
}
function phIcon(d){
  return '<svg viewBox="0 0 24 24"><path d="'+d+'"/></svg>';
}

function loadEmailTemplates(){
  try{
    var raw = localStorage.getItem('vz_email_templates_lib');
    if(raw){ var arr = JSON.parse(raw); if(arr && arr.length) return arr; }
  }catch(e){}
  var defaults = getBuiltinTemplates();
  try{ localStorage.setItem('vz_email_templates_lib', JSON.stringify(defaults)); }catch(e){}
  return defaults;
}

function saveEmailTemplate(tpl){
  var lib = loadEmailTemplates();
  var idx = -1;
  for(var i=0;i<lib.length;i++){ if(lib[i].id===tpl.id){ idx=i; break; } }
  if(idx>=0) lib[idx]=tpl; else lib.push(tpl);
  try{ localStorage.setItem('vz_email_templates_lib', JSON.stringify(lib)); }catch(e){}
}

var _campagne = {segment: null, tplId: null, subject: '', step: 1};

function getSegments(){
  var rezRaw = null;
  try{ rezRaw = localStorage.getItem('vlz_cache_rez'); }catch(e){}
  var rez = [];
  try{ if(rezRaw) rez = JSON.parse(rezRaw); }catch(e){}
  if(!Array.isArray(rez)) rez = [];

  var now = Date.now();
  var day90 = 90*24*3600*1000;
  var day90ago = now - day90;

  var clientMap = {};
  rez.forEach(function(r){
    var em = r.email || r.client_email || '';
    var nm = r.guest_name || r.nom || r.client_name || '';
    if(!em) return;
    if(!clientMap[em]) clientMap[em] = {email:em, name:nm, stays:0, lastStay:0};
    clientMap[em].stays++;
    var d = r.checkout_date || r.check_out || r.date_depart || '';
    if(d){ var t = new Date(d).getTime(); if(t > clientMap[em].lastStay) clientMap[em].lastStay = t; }
  });
  var clients = Object.values(clientMap);

  var tous       = clients.filter(function(c){ return !!c.email; });
  var vip        = clients.filter(function(c){ return c.stays >= 4; });
  var fideles    = clients.filter(function(c){ return c.stays >= 2 && c.stays <= 3; });
  var nouveaux   = clients.filter(function(c){ return c.lastStay > day90ago; });
  var relance    = clients.filter(function(c){ return c.lastStay && c.lastStay < day90ago; });

  return [
    {id:'tous',    label:'Tous les clients avec email', clients: tous},
    {id:'vip',     label:'VIP (4+ séjours)',       clients: vip},
    {id:'fideles', label:'Fidèles (2-3 séjours)', clients: fideles},
    {id:'nouveaux',label:'Nouveaux (< 90 jours)',      clients: nouveaux},
    {id:'relance', label:'Relance (séjour ≥ 3 mois)', clients: relance}
  ];
}

  /* Step 2 — template */
  out += '<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">2. Choisir un modèle</div>'
    +'<select id="camp-tpl" onchange="selectCampagneTpl(this.value)" style="width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-size:13px;">'
    +'<option value="">-- Sélectionnez un modèle --</option>'
    + lib.map(function(t){
        return '<option value="'+escH(t.id)+'"'+(_campagne.tplId===t.id?' selected':'')+'>'+escH(t.name)+'</option>';
      }).join('')
    +'</select></div>';

  /* Step 3 — sujet */
  var selTpl = null;
  if(_campagne.tplId){ for(var i=0;i<lib.length;i++){ if(lib[i].id===_campagne.tplId){ selTpl=lib[i]; break; } } }
  out += '<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">3. Personnaliser le sujet</div>'
    +'<input type="text" id="camp-subject" value="'+escH(_campagne.subject || (selTpl?selTpl.subject:''))+'" placeholder="Sujet de l\'email..." style="width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-size:13px;" oninput="_campagne.subject=this.value">'
    +(selTpl?'<div style="margin-top:10px;padding:10px;background:var(--bg4);border-radius:6px;font-size:11px;color:var(--text2);max-height:80px;overflow:auto;">'+escH(selTpl.subject)+'</div>':'')
    +'</div>';

  /* Step 4 — envoyer */
  var canSend = _campagne.segment && _campagne.tplId;
  var segCount = 0;
  if(canSend){ for(var j=0;j<segs.length;j++){ if(segs[j].id===_campagne.segment){ segCount=segs[j].clients.length; break; } } }

  out += '<div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">4. Envoyer</div>'
    +'<div id="camp-progress" style="margin-bottom:10px;font-size:12px;color:var(--text2);display:none;"></div>'
    +(canSend
      ? '<button class="btn btn-p" onclick="runCampagne()" style="width:100%;">&#128640; Envoyer à '+segCount+' contact'+(segCount>1?'s':'')+'</button>'
      : '<button class="btn btn-o" disabled style="width:100%;opacity:.5;">Sélectionnez un segment et un modèle</button>')
    +'</div>';

  out += '</div>';
  return out;
}

function selectCampagneSegment(segId){
  _campagne.segment = segId;
  renderSection('email');
}

function selectCampagneTpl(tplId){
  _campagne.tplId = tplId || null;
  var lib = loadEmailTemplates();
  for(var i=0;i<lib.length;i++){
    if(lib[i].id===tplId){ _campagne.subject = lib[i].subject; break; }
  }
  renderSection('email');
}

function runCampagne(){
  var segs = getSegments();
  var lib = loadEmailTemplates();
  var seg = null;
  for(var i=0;i<segs.length;i++){ if(segs[i].id===_campagne.segment){ seg=segs[i]; break; } }
  var tpl = null;
  for(var j=0;j<lib.length;j++){ if(lib[j].id===_campagne.tplId){ tpl=lib[j]; break; } }

  if(!seg || !tpl){ toast('Sélectionnez un segment et un modèle'); return; }
  var clients = seg.clients;
  if(!clients.length){ toast('Aucun contact dans ce segment'); return; }

  var subject = _campagne.subject || tpl.subject;
  var tplId = (S.email && S.email.template_id) || '';
  if(!tplId){ toast('Template ID EmailJS manquant (onglet Configuration)'); return; }

  var progress = document.getElementById('camp-progress');
  if(progress){ progress.style.display='block'; progress.textContent='Préparation...'; }

  var sent = 0; var total = clients.length; var errors = 0;
  var campaign_log = {
    id: 'camp_'+Date.now(), segment: _campagne.segment, tpl_id: tpl.id, tpl_name: tpl.name,
    subject: subject, total: total, sent: 0, errors: 0, started_at: new Date().toISOString()
  };

  function sendNext(idx){
    if(idx >= total){
      campaign_log.sent = sent; campaign_log.errors = errors;
      campaign_log.finished_at = new Date().toISOString();
      try{
        var logs = JSON.parse(localStorage.getItem('vz_email_campaigns_log')||'[]');
        logs.unshift(campaign_log);
        localStorage.setItem('vz_email_campaigns_log', JSON.stringify(logs.slice(0,50)));
      }catch(e){}
      if(progress) progress.textContent = '✓ Campagne terminée : '+sent+'/'+total+' envoyés'+(errors?' ('+errors+' erreurs)':'');
      toast('✓ Campagne : '+sent+'/'+total+' emails envoyés');
      return;
    }
    var c = clients[idx];
    if(progress) progress.textContent = 'Envoi '+( idx+1)+'/'+total+' — '+c.email;

    fetch('https://api.emailjs.com/api/v1.0/email/send',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        service_id:'service_mwiart1', template_id: tplId, user_id:'MqrKcqvO952CD5HOA',
        template_params:{
          to_email: c.email, to_name: c.name || c.email,
          subject: subject, body_html: tpl.body,
          from_name:'Résidence Veraluz', reply_to:'residenceveraluz@gmail.com'
        }
      })
    }).then(function(r){
      if(r.ok){ sent++; logEmailSent(c.email, subject, 'ok'); }
      else { errors++; logEmailSent(c.email, subject, 'error'); }
      setTimeout(function(){ sendNext(idx+1); }, 300);
    }).catch(function(){
      errors++; logEmailSent(c.email, subject, 'error');
      setTimeout(function(){ sendNext(idx+1); }, 300);
    });
  }

  sendNext(0);
}

/* ── Historique ── */
function logEmailSent(to, subject, status){
  try{
    var log = JSON.parse(localStorage.getItem('vz_email_log')||'[]');
    log.unshift({to:to, subject:subject, sent_at:new Date().toISOString(), status:status||'ok'});
    localStorage.setItem('vz_email_log', JSON.stringify(log.slice(0,200)));
  }catch(e){}
}

function renderEmailHistorique(){
  var log = [];
  try{ log = JSON.parse(localStorage.getItem('vz_email_log')||'[]'); }catch(e){}

  var rows = log.length
    ? log.map(function(entry){
        var icon = entry.status==='ok' ? '✅' : '❌';
        var d = entry.sent_at ? new Date(entry.sent_at) : null;
        var dateStr = d ? d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '—';
        return '<tr>'
          +'<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escH(entry.to||'')+'</td>'
          +'<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escH(entry.subject||'')+'</td>'
          +'<td style="white-space:nowrap;color:var(--text2);font-size:11px;">'+dateStr+'</td>'
          +'<td style="text-align:center;">'+icon+'</td>'
          +'</tr>';
      }).join('')
    : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:24px;">Aucun email envoyé</td></tr>';

  return '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'
    +'<div class="card-title" style="margin:0;"><svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 9 9 9"/></svg>Historique des envois</div>'
    +'<button class="btn btn-r btn-sm" onclick="clearEmailLog()">Effacer l\'historique</button>'
    +'</div>'
    +'<div style="overflow-x:auto;"><table class="tbl">'
    +'<thead><tr><th>Destinataire</th><th>Objet</th><th>Date/heure</th><th>Statut</th></tr></thead>'
    +'<tbody>'+rows+'</tbody>'
    +'</table></div>'
    +'<div style="font-size:11px;color:var(--text3);margin-top:8px;">'+log.length+' enregistrement'+(log.length>1?'s':'')+' (max 200)</div>'
    +'</div>';
}

function clearEmailLog(){
  if(confirm('Effacer tout l\'historique des emails ?')){
    try{ localStorage.removeItem('vz_email_log'); }catch(e){}
    toast('✓ Historique effacé');
    renderSection('email');
  }
}

  var to=(S.email&&S.email.test_address)||'residenceveraluz@gmail.com';

  if(btn){ btn.disabled=true; btn.textContent='Envoi en cours...'; }
  fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      service_id:'service_mwiart1',
      template_id:tpl,
      user_id:'MqrKcqvO952CD5HOA',
      template_params:{
        to_email:to, to_name:'Admin Veraluz',
        subject:'Test - Residence Veraluz OS',
        body_html:'<div style="font-family:Arial,sans-serif;padding:24px;max-width:500px;"><h2 style="color:#0d7a5f;">Email operationnel !</h2><p>Le systeme email fonctionne.</p><p style="color:#888;font-size:12px;">Template: '+tpl+' | Service: service_mwiart1</p></div>',

    else{ r.text().then(function(t){ toast('Erreur EmailJS: '+t.slice(0,100)); }); }
  }).catch(function(e){
    if(btn){ btn.disabled=false; btn.textContent='Envoyer un email de test'; }
    toast('Erreur reseau: '+e.message);
  });
}

    'Système', 'Configuration technique et maintenance')
  +'<div class="card">'

  +field('Timeout session (minutes)','systeme.session_timeout',sys.session_timeout,'number','Durée avant déconnexion automatique')

/* ── Render dispatcher ── */
function renderSection(id){
  var wrap = document.getElementById('section-wrap');
  if(!wrap) return;
  var html='';
  if(id==='hotel')           html=renderHotel();
  else if(id==='branding')   html=renderBranding();
  else if(id==='chambres')   html=renderChambres();
  else if(id==='tarifs')     html=renderTarifs();
  else if(id==='devises')    html=renderDevises();
  else if(id==='restaurant') html=renderRestaurant();
  else if(id==='notifs')     html=renderNotifs();
  else if(id==='permissions')html=renderPermissions();
  else if(id==='integrations')html=renderIntegrations();
  else if(id==='email')      html=renderEmail();
  else if(id==='systeme')    html=renderSysteme();
  wrap.innerHTML = html;
  wrap.scrollTop = 0;
}

/* ── Actions ── */
function onPermChange(el, role, mod){
  if(!S.permissions[role]) S.permissions[role]={};
  S.permissions[role][mod]=el.checked; markDirty();
}
function resetPerms(){
  S.permissions=JSON.parse(JSON.stringify(DEFAULTS.permissions));
  renderSection('permissions'); toast('Permissions réinitialisées');
}
function previewLogo(url){
  var prev=document.getElementById('logo-preview');
  if(!prev) return;
  prev.innerHTML=url?'<img src="'+escH(url)+'" onerror="this.parentNode.innerHTML=\'<div class=&quot;lp-placeholder&quot;>Image introuvable</div>\'">'
    :'<div class="lp-placeholder">Cliquer pour définir<br>le logo</div>';
}
function uploadLogo(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var dataUrl=e.target.result;
    S.branding.logo_url=dataUrl;
    var urlInput=document.getElementById('logo-url-input');
    if(urlInput){ urlInput.value='[image uploadée]'; urlInput.setAttribute('data-field-override','true'); }
    previewLogo(dataUrl);
    try{ localStorage.setItem('vz_logo_data', dataUrl); }catch(e2){}
    markDirty();
    toast('✓ Logo chargé');
  };
  reader.readAsDataURL(file);
}
function updateRoom(i, key, val){ S.chambres[i][key]=val; markDirty(); }
function addRoom(){
  S.chambres.push({id:'rm_'+Date.now(),name:'Nouvelle catégorie',count:1,capacity:2,price:50000,amenities:'WiFi, Climatisation'});
  renderSection('chambres'); markDirty();
}
function removeRoom(i){ S.chambres.splice(i,1); renderSection('chambres'); markDirty(); }
function exportSettings(){
  var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='veraluz_settings_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importSettings(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{ S=JSON.parse(e.target.result); localStorage.setItem(LS_KEY,JSON.stringify(S));
      renderSection(currentSection); toast('✓ Paramètres importés'); markClean(); }
    catch(err){ toast('❌ Fichier JSON invalide',false); }
  }; reader.readAsText(file);
}
function confirmReset(){
  if(confirm('Réinitialiser tous les paramètres aux valeurs par défaut ?')){
    S=JSON.parse(JSON.stringify(DEFAULTS));
    localStorage.removeItem(LS_KEY);
    renderSection(currentSection); markClean();
    toast('✓ Paramètres réinitialisés');
  }
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }

/* ── Collect form values ── */
function collectForm(){
  var inputs=document.querySelectorAll('#section-wrap [data-field]');
  inputs.forEach(function(el){
    var path=el.getAttribute('data-field').split('.'); var obj=S;
    for(var i=0;i<path.length-1;i++){ if(!obj[path[i]]) obj[path[i]]={};  obj=obj[path[i]]; }
    var last=path[path.length-1];
    if(el.type==='checkbox') obj[last]=el.checked;
    else if(el.type==='number') obj[last]=parseFloat(el.value)||0;
    else obj[last]=el.value;
  });
}

/* ── Auth-context from Core ── */
window.addEventListener('message', function(ev){
  if(!ev.data || ev.data.source !== 'veraluz-core') return;
  var msg=ev.data;
  if(msg.type==='auth-context'){
    var d=msg.data||{};
    var adminRoles=['admin','gerant','manager','super_admin','superadmin'];
    if(d.role && !adminRoles.includes(d.role)){
      document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:var(--red);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg><br><br><strong>Accès réservé aux administrateurs</strong><br><p style="color:var(--text3);font-size:12px;margin-top:8px;">Contactez votre administrateur pour accéder aux paramètres.</p></div>';
    }
    return;
  }
  if(msg.type==='refresh'){ loadSettings(); renderSection(currentSection); }
  if(msg.type==='email-sent'){ var d=msg.data||{}; logEmailSent(d.to||'', d.subject||'', d.status||'ok'); }
});

/* ── Init ── */
window.addEventListener('load', function(){
  loadSettings();
  goSection('hotel');
  emit('module-ready', {module:'settings', version:'3.0'});
});
</script>
