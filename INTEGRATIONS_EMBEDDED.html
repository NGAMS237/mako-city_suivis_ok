<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intégrations — Veraluz OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#1e293b;border-bottom:1px solid #334155;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-weight:700;font-size:15px;color:#f1f5f9;}
.tabbar{background:#1e293b;border-bottom:1px solid #334155;padding:0 8px;display:flex;gap:1px;flex-shrink:0;}
.tb{background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;font-size:13px;font-weight:500;padding:10px 14px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tb:hover{color:#e2e8f0;}
.tb.wa.on{color:#25d366;border-bottom-color:#25d366;}
.tb.cp.on{color:#f97316;border-bottom-color:#f97316;}
.tb.jl.on{color:#818cf8;border-bottom-color:#818cf8;}
.content{flex:1;overflow-y:auto;padding:16px;}
.content::-webkit-scrollbar{width:4px;}.content::-webkit-scrollbar-thumb{background:#334155;}
/* Cards */
.card{background:#1e293b;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #334155;}
.card-title{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
/* Form */
label{font-size:11px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;}
input,textarea,select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;margin-bottom:12px;outline:none;font-family:inherit;resize:vertical;}
input:focus,textarea:focus,select:focus{border-color:#25d366;}
input.cp:focus,select.cp:focus{border-color:#f97316;}
.form-row{display:flex;gap:8px;}.form-row>div{flex:1;}
/* Buttons */
.btn{border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:6px;}
.btn-wa{background:#25d366;color:#fff;}.btn-wa:hover{background:#128c7e;}
.btn-cp{background:#f97316;color:#fff;}.btn-cp:hover{background:#ea6c0a;}
.btn-secondary{background:#1e293b;color:#e2e8f0;border:1px solid #334155;}.btn-secondary:hover{background:#334155;}
.wa-composer{background:linear-gradient(135deg,rgba(37,211,102,.08),rgba(37,211,102,.04));border:1.5px solid rgba(37,211,102,.4);border-radius:8px;padding:16px;margin-top:12px;display:none}
.wa-composer-phone{font-size:13px;color:#25d366;font-weight:700;margin-bottom:8px}
.wa-composer-msg{background:rgba(0,0,0,.2);border-radius:6px;padding:12px;font-size:13px;line-height:1.5;color:#e2e8f0;white-space:pre-wrap;word-break:break-word;border:1px solid #334155;min-height:60px;max-height:150px;overflow-y:auto}
.wa-composer-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn-wa-copy{padding:8px 14px;background:rgba(37,211,102,.15);color:#25d366;border:1px solid rgba(37,211,102,.4);border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.btn-wa-open{padding:8px 14px;background:#25d366;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.wa-note{font-size:11px;color:#64748b;margin-top:8px}
.sim-step{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:#64748b}
.sim-step.active{color:#f97316;font-weight:700}
.sim-step.done{color:#25d366}
.sim-dot{width:8px;height:8px;border-radius:50%;background:#334155;flex-shrink:0}
.sim-step.active .sim-dot{background:#f97316}
.sim-step.done .sim-dot{background:#25d366}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-full{width:100%;}
/* Status badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:#064e3b;color:#34d399;}
.badge-warn{background:#78350f;color:#fbbf24;}
.badge-err{background:#7f1d1d;color:#fca5a5;}
.badge-info{background:#1e3a5f;color:#60a5fa;}
.badge-wa{background:#0d3d24;color:#25d366;}
.badge-cp{background:#431407;color:#f97316;}
/* Template cards */
.tpl-card{background:#0f172a;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #1e293b;cursor:pointer;transition:border .12s;}
.tpl-card:hover{border-color:#25d366;}
.tpl-card.cp:hover{border-color:#f97316;}
.tpl-label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.tpl-text{font-size:12px;color:#94a3b8;line-height:1.5;}
/* Test zone */
.test-zone{background:#0f172a;border-radius:10px;padding:14px;border:1px solid #334155;}
.test-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
/* Payment simulation */
.pay-step{display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;margin-bottom:8px;background:#0f172a;border:1px solid #334155;}
.pay-step-num{width:28px;height:28px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#f1f5f9;flex-shrink:0;}
.pay-step-num.active{background:#f97316;}.pay-step-num.done{background:#10b981;}
.pay-step-body{flex:1;}
.pay-step-title{font-size:13px;font-weight:600;color:#f1f5f9;}
.pay-step-sub{font-size:11px;color:#64748b;margin-top:2px;}
/* Transaction list */
.tx-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:6px;background:#1e293b;border:1px solid #334155;}
.tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.tx-wa{background:#0d3d24;}.tx-cp{background:#431407;}
/* Progress bar */
.prog{height:6px;background:#0f172a;border-radius:4px;margin-top:6px;}
.prog-bar{height:6px;border-radius:4px;transition:width .5s;}
/* Toggle switch */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;}
.toggle-lbl{font-size:13px;color:#e2e8f0;}
.toggle{position:relative;display:inline-block;width:44px;height:24px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#334155;border-radius:12px;cursor:pointer;transition:.3s;}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:#f97316;}
input:checked+.slider:before{transform:translateX(20px);}
/* Overlay modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#1e293b;border-radius:16px;width:100%;max-width:420px;padding:24px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:16px;}
/* Info box */
.info-box{background:#0f172a;border-radius:8px;padding:10px 12px;font-size:12px;color:#64748b;border-left:3px solid #334155;margin-bottom:12px;}
.info-box.wa{border-left-color:#25d366;}.info-box.cp{border-left-color:#f97316;}
/* Success/Error toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;color:#f1f5f9;z-index:300;display:none;white-space:nowrap;}
.toast.ok{border-color:#10b981;color:#34d399;}
.toast.err{border-color:#ef4444;color:#fca5a5;}
.sep{border-top:1px solid #1e293b;margin:12px 0;}
</style>
</head>

<script>
var SB='https://dfdmasejsoibxrvubegu.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY';
var MID='integrations';

/* ── Supabase helpers ── */
function sbPost(t,b){return fetch(SB+'/rest/v1/'+t,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(b)}).then(function(r){return r.json();}).catch(function(e){return null;});}
function sbGet(p){return fetch(SB+'/rest/v1/'+p,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}}).then(function(r){return r.json();}).catch(function(){return[];});}

/* ── State ── */
var currentTab='whatsapp';
var waLog=[],cpLog=[];
var cpPayStep=0;

/* ── Default WA config ── */
var WA_DEFAULTS={
  phone:'',
  templates:{
    reservation:'Bonjour {client_name}, votre réservation à la Résidence Veraluz est confirmée du {checkin} au {checkout}. Chambre: {room}. Montant: {amount} FCFA. À bientôt !',
    acompte:'Bonjour {client_name}, nous avons bien reçu votre acompte de {amount} FCFA pour votre séjour du {checkin} au {checkout}. Merci !',
    checkin:'Bonjour {client_name}, nous vous attendons demain pour votre check-in à la Résidence Veraluz Kribi. N\'hésitez pas à nous contacter. À demain !',
    checkout:'Bonjour {client_name}, nous espérons que votre séjour à Veraluz Kribi vous a plu. Merci et à bientôt !',
    support:'Bonjour, bienvenue à la Résidence Veraluz Kribi. Comment pouvons-nous vous aider ?'
  }
};

/* ── CinetPay config defaults ── */
var CP_DEFAULTS={
  apikey:'',
  site_id:'',
  notify_url:'https://dfdmasejsoibxrvubegu.supabase.co/functions/v1/cinetpay-webhook',
  return_url:'https://ngams237.github.io/veraluz-os/',
  sandbox:true
};

/* ── Load / Save config ── */
function getWAConfig(){ try{ return Object.assign({},WA_DEFAULTS,JSON.parse(localStorage.getItem('vz_whatsapp_settings')||'{}')); }catch(e){ return WA_DEFAULTS; } }
function saveWAConfig(cfg){ try{ localStorage.setItem('vz_whatsapp_settings',JSON.stringify(cfg)); }catch(e){} }
function getCPConfig(){ try{ return Object.assign({},CP_DEFAULTS,JSON.parse(localStorage.getItem('vz_cinetpay_settings')||'{}')); }catch(e){ return CP_DEFAULTS; } }
function saveCPConfig(cfg){ try{ localStorage.setItem('vz_cinetpay_settings',JSON.stringify(cfg)); }catch(e){} }
function getJournal(){ try{ return JSON.parse(localStorage.getItem('vz_integrations_log')||'[]'); }catch(e){ return []; } }
function addToJournal(entry){
  var log=getJournal(); log.unshift(entry);
  if(log.length>100) log=log.slice(0,100);
  try{ localStorage.setItem('vz_integrations_log',JSON.stringify(log)); }catch(e){}
}

window.addEventListener('load',function(){ buildTabs(); goTab('whatsapp'); });

function buildTabs(){
  document.getElementById('tabbar').innerHTML=[
    {id:'whatsapp',lbl:'💬 WhatsApp',cls:'wa'},
    {id:'cinetpay',lbl:'💳 CinetPay',cls:'cp'},
    {id:'journal',lbl:'📋 Journal',cls:'jl'}
  ].map(function(t){
    return '<button class="tb '+t.cls+'" id="tab_'+t.id+'" data-id="'+t.id+'" onclick="goTab(this.dataset.id)">'+t.lbl+'</button>';
  }).join('');
}

function goTab(id){
  currentTab=id;
  ['whatsapp','cinetpay','journal'].forEach(function(tid){
    var el=document.getElementById('tab_'+tid);
    if(el) el.className='tb '+(tid==='whatsapp'?'wa':tid==='cinetpay'?'cp':'jl')+(tid===id?' on':'');
  });
  if(id==='whatsapp') renderWhatsApp();
  else if(id==='cinetpay') renderCinetPay();
  else renderJournal();
}

/* ════════════════════════════════════════
   WHATSAPP TAB
════════════════════════════════════════ */
function renderWhatsApp(){
  var cfg=getWAConfig();
  var h='';

  /* Status banner */
  var hasPhone=cfg.phone&&cfg.phone.length>5;
  h+='<div class="card">';
  h+='<div class="card-title">💬 WhatsApp Business <span class="badge '+(hasPhone?'badge-ok':'badge-warn')+'" style="margin-left:auto">'+(hasPhone?'Configuré':'Non configuré')+'</span></div>';
  h+='<div class="info-box wa">Mode semi-automatique via liens wa.me · 1 clic · Message pré-rempli · Aucune API requise · Architecture prête pour WhatsApp Cloud API</div>';
  h+='</div>';

  /* Config */
  h+='<div class="card"><div class="card-title">⚙️ Configuration</div>';
  h+='<label>Numéro WhatsApp Business (format international)</label>';
  h+='<input id="wa_phone" value="'+esc(cfg.phone||'')+'" placeholder="+237 6XX XXX XXX">';
  h+='<button class="btn btn-wa btn-full" onclick="saveWA()">💾 Sauvegarder</button>';
  h+='</div>';

  /* Templates */
  h+='<div class="card"><div class="card-title">📝 Templates de messages</div>';
  h+='<div class="info-box wa">Variables disponibles: {client_name} {checkin} {checkout} {room} {amount} {hotel_name}</div>';
  var tpls=[
    {key:'reservation',label:'✅ Confirmation réservation',color:'#25d366'},
    {key:'acompte',label:'💰 Acompte reçu',color:'#f59e0b'},
    {key:'checkin',label:'🏨 Rappel check-in',color:'#818cf8'},
    {key:'checkout',label:'👋 Au revoir checkout',color:'#94a3b8'},
    {key:'support',label:'🆘 Support client',color:'#60a5fa'}
  ];
  tpls.forEach(function(t){
    h+='<label>'+t.label+'</label>';
    h+='<textarea id="wa_tpl_'+t.key+'" rows="3" style="font-size:12px;border-color:#1e293b">'+esc(cfg.templates&&cfg.templates[t.key]?cfg.templates[t.key]:WA_DEFAULTS.templates[t.key])+'</textarea>';
  });
  h+='<button class="btn btn-wa btn-full" onclick="saveWATemplates()">💾 Sauvegarder les templates</button>';
  h+='</div>';

  /* Test rapide */
  h+='<div class="card"><div class="card-title">🧪 Test rapide</div>';
  h+='<div class="test-zone">';
  h+='<div class="form-row"><div><label>Numéro destinataire</label><input id="wa_test_phone" placeholder="+237 6XX XXX XXX"></div>';
  h+='<div><label>Template</label><select id="wa_test_tpl">';
  tpls.forEach(function(t){ h+='<option value="'+t.key+'">'+t.label+'</option>'; });
  h+='</select></div></div>';
  h+='<label>Message (éditable)</label>';
  h+='<textarea id="wa_test_msg" rows="4" style="font-size:12px"></textarea>';
  h+='<div style="display:flex;gap:8px">';
  h+='<button class="btn btn-secondary btn-sm" onclick="previewWAMessage()">👁️ Prévisualiser</button>';
  h+='<button class="btn btn-wa" onclick="sendTestWA()">📤 Préparer message</button>';
  h+='</div>';
  h+='<div class="wa-composer" id="wa-composer">';
  h+='<div class="wa-composer-phone" id="wa-composer-phone"></div>';
  h+='<div class="wa-composer-msg" id="wa-composer-msg"></div>';
  h+='<div class="wa-composer-actions">';
  h+='<button class="btn-wa-copy" onclick="copyWAMsg()">📋 Copier le message</button>';
  h+='<a class="btn-wa-open" id="wa-composer-link" href="#" target="_blank" rel="noopener noreferrer">💬 Ouvrir WhatsApp Web</a>';
  h+='</div>';
  h+='<div class="wa-note">💡 Cliquez le bouton vert — WhatsApp Web s\'ouvre avec le message pré-rempli</div>';
  h+='</div>';
  h+='</div></div>';

  /* Scénarios démo */
  h+='<div class="card"><div class="card-title">🎭 Scénarios de démonstration</div>';
  var scenarios=[
    {icon:'✅',label:'Réservation confirmée',key:'reservation',data:{client_name:'Mme Nguema',checkin:'20 juin',checkout:'25 juin',room:'Suite 301',amount:'75 000'}},
    {icon:'💰',label:'Acompte reçu',key:'acompte',data:{client_name:'M. Mbarga',checkin:'15 juil.',checkout:'18 juil.',amount:'22 500'}},
    {icon:'🏨',label:'Check-in demain',key:'checkin',data:{client_name:'Dr. Atanga'}},
    {icon:'👋',label:'Après checkout',key:'checkout',data:{client_name:'Mme Belinga'}},
    {icon:'🆘',label:'Support accueil',key:'support',data:{}}
  ];
  scenarios.forEach(function(s,idx){
    h+='<div class="tpl-card" data-idx="'+idx+'" onclick="launchScenario(this.dataset.idx)">';
    h+='<div class="tpl-label">'+s.icon+' '+s.label+'</div>';
    var msg=fillTemplate(getWAConfig().templates&&getWAConfig().templates[s.key]?getWAConfig().templates[s.key]:WA_DEFAULTS.templates[s.key],s.data);
    h+='<div class="tpl-text">'+esc(msg.substring(0,120))+' …</div>';
    h+='</div>';
  });
  h+='</div>';

  setContent(h);
  /* Listener pour select template */
  var selEl=document.getElementById('wa_test_tpl');
  if(selEl) selEl.addEventListener('change',function(){ previewWAMessage(); });
  previewWAMessage();
}

var WA_SCENARIOS=[
  {key:'reservation',data:{client_name:'Mme Nguema',checkin:'20 juin',checkout:'25 juin',room:'Suite 301',amount:'75 000',hotel_name:'Résidence Veraluz'}},
  {key:'acompte',data:{client_name:'M. Mbarga',checkin:'15 juil.',checkout:'18 juil.',amount:'22 500',hotel_name:'Résidence Veraluz'}},
  {key:'checkin',data:{client_name:'Dr. Atanga',hotel_name:'Résidence Veraluz'}},
  {key:'checkout',data:{client_name:'Mme Belinga',hotel_name:'Résidence Veraluz'}},
  {key:'support',data:{hotel_name:'Résidence Veraluz'}}
];

function fillTemplate(tpl,data){
  var msg=tpl||'';
  var d=Object.assign({client_name:'Client',checkin:'—',checkout:'—',room:'—',amount:'—',hotel_name:'Résidence Veraluz'},data);
  Object.keys(d).forEach(function(k){ msg=msg.replace(new RegExp('\{'+k+'\}','g'),d[k]); });
  return msg;
}

function previewWAMessage(){
  var selEl=document.getElementById('wa_test_tpl');
  var msgEl=document.getElementById('wa_test_msg');
  if(!selEl||!msgEl) return;
  var key=selEl.value;
  var cfg=getWAConfig();
  var tpl=cfg.templates&&cfg.templates[key]?cfg.templates[key]:WA_DEFAULTS.templates[key];
  msgEl.value=fillTemplate(tpl,{client_name:'Mme Nguema',checkin:'20 juin',checkout:'25 juin',room:'Suite 301',amount:'75 000',hotel_name:'Résidence Veraluz'});
}

function saveWA(){
  var cfg=getWAConfig();
  cfg.phone=(document.getElementById('wa_phone').value||'').replace(/\s/g,'');
  saveWAConfig(cfg);
  showToast('Configuration WhatsApp sauvegardée',true);
  renderWhatsApp();
}
function saveWATemplates(){
  var cfg=getWAConfig();
  if(!cfg.templates) cfg.templates={};
  ['reservation','acompte','checkin','checkout','support'].forEach(function(k){
    var el=document.getElementById('wa_tpl_'+k);
    if(el) cfg.templates[k]=el.value;
  });
  saveWAConfig(cfg);
  showToast('Templates sauvegardés',true);
}
function sendTestWA(){
  var phone=(document.getElementById('wa_test_phone').value||'').replace(/\s/g,'');
  var msg=document.getElementById('wa_test_msg').value||'';
  if(!phone){showToast('Numéro requis',false);return;}
  openWhatsApp(phone,msg,'Test depuis Veraluz OS');
}
function launchScenario(idx){
  var s=WA_SCENARIOS[parseInt(idx)];
  if(!s) return;
  var cfg=getWAConfig();
  var tpl=cfg.templates&&cfg.templates[s.key]?cfg.templates[s.key]:WA_DEFAULTS.templates[s.key];
  var msg=fillTemplate(tpl,s.data);
  var phone=cfg.phone||'+237600000000';
  openWhatsApp(phone,msg,'Scénario: '+s.key);
}

var _lastWA=null;
function openWhatsApp(phone,message,context){
  var clean=phone.replace(/[^0-9+]/g,'').replace(/^00/,'+');
  if(!clean.startsWith('+')) clean='+'+clean;
  var url='https://wa.me/'+clean+'?text='+encodeURIComponent(message);
  _lastWA={phone:clean,url:url,message:message};
  showWAComposer(clean,url,message);
  addToJournal({id:Date.now(),type:'whatsapp',icon:'💬',label:context||'Message WhatsApp',detail:message.substring(0,80),to:clean,date:new Date().toISOString(),status:'sent'});
  showToast('Message prêt — cliquez le bouton vert pour envoyer',true);
  window.parent.postMessage({veraluzEvent:true,source:MID,type:'wa-log',data:{phone:clean,message:message,context:context}},'*');
}
function showWAComposer(phone,url,message){
  var panel=document.getElementById('wa-composer');
  var ph=document.getElementById('wa-composer-phone');
  var msg=document.getElementById('wa-composer-msg');
  var lnk=document.getElementById('wa-composer-link');
  if(!panel){
    /* Panel absent (autre tab active) — on switche vers WA */
    switchTab('whatsapp');
    setTimeout(function(){showWAComposer(phone,url,message);},200);
    return;
  }
  if(ph) ph.textContent='📞 '+phone;
  if(msg) msg.textContent=message;
  if(lnk){ lnk.href=url; }
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function copyWAMsg(){
  var el=document.getElementById('wa-composer-msg');
  if(!el) return;
  var text=el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){showToast('Message copié !',true);});
  } else {
    var ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    try{document.execCommand('copy');showToast('Message copié !',true);}catch(e){}
    document.body.removeChild(ta);
  }
}

/* ════════════════════════════════════════

function saveCPConf(){
  var cfg=getCPConfig();
  cfg.apikey=document.getElementById('cp_key').value;
  cfg.site_id=document.getElementById('cp_site').value;
  cfg.notify_url=document.getElementById('cp_notify').value;
  cfg.return_url=document.getElementById('cp_return').value;
  cfg.sandbox=document.getElementById('cp_sandbox').checked;
  saveCPConfig(cfg);
  showToast('Configuration CinetPay sauvegardée',true);
  renderCinetPay();
}
function toggleSandbox(el){
  var cfg=getCPConfig(); cfg.sandbox=el.checked; saveCPConfig(cfg);
  showToast(el.checked?'Mode Sandbox activé':'Mode Production activé',true);
}

function calcAcompte(){
  var total=parseFloat(document.getElementById('calc_total').value)||0;
  var pct=parseFloat(document.getElementById('calc_pct').value)||30;
  var acompte=Math.round(total*pct/100);
  var reste=total-acompte;
  var el=document.getElementById('calc_result');
  if(el) el.innerHTML='Acompte '+pct+'% = <strong>'+fmtXAF(acompte)+'</strong>  ·  Reste à payer: '+fmtXAF(reste);
}

function launchFromCalc(){
  var total=parseFloat(document.getElementById('calc_total').value)||0;
  var pct=parseFloat(document.getElementById('calc_pct').value)||30;
  var acompte=Math.round(total*pct/100);
  document.getElementById('cp_amount').value=acompte;
  launchCinetPay();
}

function launchCinetPay(){
  var cfg=getCPConfig();
  var amount=parseInt(document.getElementById('cp_amount').value)||0;
  var cname=document.getElementById('cp_cname').value||'Client';
  var email=document.getElementById('cp_email').value||'client@veraluz.cm';
  var phone=document.getElementById('cp_phone').value||'';
  var desc=document.getElementById('cp_desc').value||'Paiement Veraluz';
  var method=document.getElementById('cp_method').value;
  if(amount<100){showToast('Montant minimum 100 FCFA',false);return;}
  var txId='VLZ-'+Date.now();
  /* Sandbox ou pas de clés → simulation in-module directe */
  if(cfg.sandbox || !cfg.apikey || cfg.apikey.length<8){
    runSimulation(txId,amount,cname,desc,method);
    return;
  }
  /* Production avec vraies clés → SDK CinetPay */
  if(typeof CinetPay==='undefined'){
    var script=document.createElement('script');
    script.src='https://cdn.cinetpay.com/seamless/main.js';
    script.onload=function(){ initCinetPay(cfg,txId,amount,cname,email,phone,desc,method); };
    script.onerror=function(){ runSimulation(txId,amount,cname,desc,method); };
    document.head.appendChild(script);
  } else {
    initCinetPay(cfg,txId,amount,cname,email,phone,desc,method);
  }
}

function initCinetPay(cfg,txId,amount,cname,email,phone,desc,method){
  try{
    CinetPay.setConfig({
      apikey: cfg.apikey||'_DEMO_KEY_',
      site_id: cfg.site_id||'_DEMO_SITE_',
      notify_url: cfg.notify_url,
      return_url: cfg.return_url,
      mode: cfg.sandbox?'TEST':'PRODUCTION'
    });
    CinetPay.getCheckout({
      transaction_id: txId,
      amount: amount,
      currency: 'XAF',
      channels: method,
      description: desc,
      customer_name: cname.split(' ').slice(1).join(' ')||cname,
      customer_surname: cname.split(' ')[0]||cname,
      customer_email: email,
      customer_phone_number: phone,
      customer_address: 'Kribi',
      customer_city: 'Kribi',
      customer_country: 'CM',
      customer_state: 'SU',
      customer_zip_code: '00237',
      lang: 'fr'
    });
    cpPayStep=3;
    addToJournal({id:Date.now(),type:'cinetpay',icon:'💳',label:'Paiement initié',detail:desc+' — '+fmtXAF(amount),to:phone,date:new Date().toISOString(),status:'pending',txId:txId,amount:amount});
    notifyPayment(txId,amount,desc,'pending');
  } catch(err){
    simulateCinetPayFallback(txId,amount,cname,desc);
  }
}

function simulateCinetPayFallback(txId,amount,cname,desc){
  runSimulation(txId,amount,cname,desc,'ALL');
}
function runSimulation(txId,amount,cname,desc,method){
  var STEPS=[
    {n:1,icon:'🔒',label:'Connexion sécurisée'},
    {n:2,icon:'📋',label:'Validation du montant'},
    {n:3,icon:'📱',label:'Envoi code OTP'},
    {n:4,icon:'✍️',label:'Confirmation client'},
    {n:5,icon:'⚙️',label:'Traitement bancaire'},
    {n:6,icon:'✅',label:'Paiement confirmé'}
  ];
  /* Afficher le stepper dans un conteneur in-module */
  var methodLabel={'ALL':'Orange Money / MTN / Carte','MOBILE_MONEY':'Orange Money / MTN','CREDIT_CARD':'Carte bancaire','WALLET':'Portefeuille'}[method]||'Mobile Money';
  var html='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0" id="sim-panel">';
  html+='<div style="font-weight:800;font-size:14px;color:#f97316;margin-bottom:4px">💳 Simulation — '+methodLabel+'</div>';
  html+='<div style="font-size:12px;color:var(--text2);margin-bottom:12px">'+fmtXAF(amount)+' · '+esc(desc)+'</div>';
  html+='<div class="sim-progress" id="sim-steps">';
  STEPS.forEach(function(s){
    html+='<div class="sim-step" id="sim-step-'+s.n+'"><div class="sim-dot"></div>'+s.icon+' '+s.label+'</div>';
  });
  html+='</div>';
  html+='<div style="font-size:11px;color:var(--text3)" id="sim-note">Simulation en cours…</div>';
  html+='</div>';
  /* Insérer dans le tab CinetPay si visible */
  var cont=document.querySelector('#tab-cinetpay .card:last-child') || document.getElementById('tab-cinetpay');
  if(cont){ cont.insertAdjacentHTML('afterend',html); }
  else { /* fallback scroll */ }
  /* Journal + notif */
  addToJournal({id:Date.now(),type:'cinetpay',icon:'💳',label:'Simulation initiée',detail:desc+' — '+fmtXAF(amount),to:cname,date:new Date().toISOString(),status:'pending',txId:txId,amount:amount});
  notifyPayment(txId,amount,desc,'pending');
  cpPayStep=1; renderCinetPay();
  /* Animer les étapes */
  [1,2,3,4,5].forEach(function(s,i){
    setTimeout(function(){
      cpPayStep=s+1; renderCinetPay();
      var el=document.getElementById('sim-step-'+( s+1));
      if(el){ el.className='sim-step active'; }
      /* Marquer précédentes done */
      for(var j=1;j<=s;j++){
        var prev=document.getElementById('sim-step-'+j);
        if(prev) prev.className='sim-step done';
      }
    },(i+1)*1000);
  });
  setTimeout(function(){
    handlePaymentSuccess(txId,amount,desc);
    var note=document.getElementById('sim-note');
    if(note) note.textContent='✅ Simulation terminée avec succès';
    var simP=document.getElementById('sim-panel');
    if(simP) simP.style.borderColor='#25d366';
  },6200);
}

function simulateCPSuccess(){
  var amount=parseInt(document.getElementById('cp_amount').value)||22500;
  var desc=document.getElementById('cp_desc').value||'Acompte réservation';
  var txId='VLZ-SIM-'+Date.now();
  handlePaymentSuccess(txId,amount,desc);
}

function handlePaymentSuccess(txId,amount,desc){
  cpPayStep=6;
  addToJournal({id:Date.now(),type:'cinetpay',icon:'✅',label:'Paiement confirmé',detail:desc+' — '+fmtXAF(amount),date:new Date().toISOString(),status:'success',txId:txId,amount:amount});
  notifyPayment(txId,amount,desc,'success');
  showToast('Paiement confirmé ! '+fmtXAF(amount),true);
  /* Mettre à jour l'affichage */
  renderCinetPay();
}

function notifyPayment(txId,amount,desc,status){
  window.parent.postMessage({veraluzEvent:true,source:MID,type:'payment-update',data:{txId:txId,amount:amount,description:desc,status:status,method:'cinetpay',date:new Date().toISOString()}},'*');
  if(status==='success'){
    window.parent.postMessage({veraluzEvent:true,source:MID,type:'expense-created',data:{label:desc,amount:amount,date:new Date().toISOString()}},'*');
  }
}

/* ════════════════════════════════════════
   JOURNAL TAB
════════════════════════════════════════ */
function renderJournal(){
  var log=getJournal();
  var h='<div class="card"><div class="card-title">📋 Journal des intégrations';
  h+='<button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="clearJournal()">Effacer</button></div>';

  var waCount=log.filter(function(e){return e.type==='whatsapp';}).length;
  var cpCount=log.filter(function(e){return e.type==='cinetpay';}).length;
  var cpSuccess=log.filter(function(e){return e.type==='cinetpay'&&e.status==='success';}).length;
  var cpTotal=log.filter(function(e){return e.type==='cinetpay'&&e.status==='success';}).reduce(function(a,e){return a+(e.amount||0);},0);

  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px">';
  h+='<div style="background:#0f172a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#25d366">'+waCount+'</div><div style="font-size:10px;color:#64748b">Messages WA</div></div>';
  h+='<div style="background:#0f172a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#f97316">'+cpCount+'</div><div style="font-size:10px;color:#64748b">TX CinetPay</div></div>';
  h+='<div style="background:#0f172a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#10b981">'+cpSuccess+'</div><div style="font-size:10px;color:#64748b">Confirmés</div></div>';
  h+='<div style="background:#0f172a;border-radius:8px;padding:10px;text-align:center"><div style="font-size:13px;font-weight:800;color:#10b981">'+fmtXAF(cpTotal)+'</div><div style="font-size:10px;color:#64748b">Encaissé</div></div>';
  h+='</div></div>';

  if(!log.length){
    h+='<div class="empty" style="padding:30px;text-align:center;color:#475569"><div style="font-size:32px;margin-bottom:8px">📋</div><div>Aucune activité enregistrée</div></div>';
  } else {
    log.forEach(function(e){
      var cls=e.type==='whatsapp'?'tx-wa':'tx-cp';
      var stBadge=e.status==='success'?'badge-ok':e.status==='pending'?'badge-warn':e.status==='sent'?'badge-wa':'badge-err';
      h+='<div class="tx-row"><div class="tx-icon '+cls+'">'+e.icon+'</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:13px;font-weight:600;color:#f1f5f9">'+esc(e.label)+'</div>';
      h+='<div style="font-size:11px;color:#64748b;margin-top:2px">'+esc((e.detail||'').substring(0,70))+'</div>';
      if(e.txId) h+='<div style="font-size:10px;color:#475569;margin-top:1px">TX: '+esc(e.txId)+'</div>';
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0">';
      h+='<span class="badge '+stBadge+'" style="display:block;margin-bottom:3px">'+esc(e.status)+'</span>';
      if(e.amount) h+='<div style="font-size:12px;color:#f97316;font-weight:700">'+fmtXAF(e.amount)+'</div>';
      h+='<div style="font-size:10px;color:#475569">'+fmtDateTime(e.date)+'</div>';
      h+='</div></div>';
    });
  }
  setContent(h);
}

function clearJournal(){
  if(confirm('Effacer tout le journal ?')){ localStorage.removeItem('vz_integrations_log'); renderJournal(); }
}

/* ════════════════════════════════════════
   SHARED UTILS
════════════════════════════════════════ */
function setContent(h){ document.getElementById('content').innerHTML=h; }
function showToast(msg,ok){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(ok?'ok':'err');
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},2500);
}
function showModal(h){ document.getElementById('modals').innerHTML='<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+h+'</div></div>'; }
function closeModal(){ document.getElementById('modals').innerHTML=''; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtXAF(n){ return Number(n||0).toLocaleString('fr-FR')+' FCFA'; }
function fmtDateTime(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return s; } }

/* ── Listen pour événements depuis d'autres modules ── */
window.addEventListener('message',function(e){
  if(!e.data||!e.data.veraluzEvent) return;
  /* Réception d'un événement whatsapp-open depuis un autre module */
  if(e.data.type==='whatsapp-open'&&e.data.data){
    var d=e.data.data;
    openWhatsApp(d.phone||'',d.message||'',d.context||'Module '+e.data.source);
  }
});
</script>
