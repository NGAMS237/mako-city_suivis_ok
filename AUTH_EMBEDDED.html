<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>Auth — Veraluz OS</title>
<style>

:root{--bg1:#0e1117;--bg2:#161b22;--bg3:#1c2230;--bg4:#21293a;--bg5:#283245;
--acc1:#22d3a5;--acc2:#1aab87;--text1:#e8eaf0;--text2:#a0aec0;--text3:#64748b;
--danger:#f43f5e;--warn:#f59e0b;--success:#22d3a5;--purple:#a855f7;--blue:#3b82f6;
--orange:#f97316;--border:rgba(255,255,255,0.07);--r:10px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg1);color:var(--text1);font-size:14px;overflow-x:hidden;}
.app{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto;}
.tab-bar{display:flex;gap:4px;padding:10px 12px 0;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);}
.tab{padding:8px 14px;border-radius:8px 8px 0 0;cursor:pointer;color:var(--text2);white-space:nowrap;
  font-size:13px;font-weight:500;transition:all .15s;}
.tab:hover{color:var(--text1);background:var(--bg3);}
.tab.on{color:var(--acc1);background:var(--bg2);border-bottom:2px solid var(--acc1);}
.content{flex:1;overflow-y:auto;padding:16px 12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:12px;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-title{font-weight:600;color:var(--text1);}
.fl{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:10px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;color:var(--text1);font-size:14px;outline:none;}
.fi:focus{border-color:var(--acc1);}
select.fi option{background:var(--bg3);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;
  border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--acc1);color:#000;}
.btn-primary:hover{background:var(--acc2);}
.btn-sec{background:var(--bg4);color:var(--text1);border:1px solid var(--border);}
.btn-sec:hover{background:var(--bg5);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warn{background:var(--warn);color:#000;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bdg-acc{background:rgba(34,211,165,.15);color:var(--acc1);}
.bdg-green{background:rgba(34,211,165,.15);color:var(--acc1);}
.bdg-yellow{background:rgba(245,158,11,.15);color:var(--warn);}
.bdg-red{background:rgba(244,63,94,.15);color:var(--danger);}
.bdg-gray{background:var(--bg4);color:var(--text3);}
.bdg-purple{background:rgba(168,85,247,.15);color:var(--purple);}
.bdg-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.empty{text-align:center;padding:40px 20px;color:var(--text3);}
.empty-ico{font-size:32px;margin-bottom:8px;}
.entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.entry-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.entry-body{flex:1;min-width:0;}
.entry-name{font-weight:600;font-size:14px;}
.entry-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entry-actions{display:flex;gap:4px;flex-shrink:0;}
.role-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.role-card:hover{border-color:var(--acc1);}
.role-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.perm-module{background:var(--bg3);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
.perm-module-hdr{padding:12px;font-weight:600;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;}
.perm-module-body{padding:0 12px 12px;display:none;}
.perm-module-body.on{display:block;}
.perm-sub{margin-bottom:10px;}
.perm-sub-title{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.5px;}
.perm-actions{display:flex;flex-wrap:wrap;gap:6px;}
.perm-chk{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;
  background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:4px 8px;}
.perm-chk input{accent-color:var(--acc1);}
.session-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.audit-entry{background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.fchip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text2);}
.fchip.on{background:var(--acc1);color:#000;border-color:var(--acc1);}
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.search-row .fi{margin:0;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px;
  width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg4);color:var(--text1);padding:10px 20px;border-radius:8px;
  font-size:13px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.err{background:var(--danger);}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--bg3);border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-size:22px;font-weight:700;color:var(--acc1);}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;}
.pol-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid var(--border);}
.pol-row:last-child{border:none;}
.switch{position:relative;width:40px;height:22px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.switch-sl{position:absolute;inset:0;background:var(--bg4);border-radius:11px;cursor:pointer;transition:.3s;}
.switch-sl:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s;}
input:checked+.switch-sl{background:var(--acc1);}
input:checked+.switch-sl:before{transform:translateX(18px);}
@media(min-width:600px){.tab-bar{padding:12px 16px 0;}.content{padding:20px 16px;}}

</style>
</head>

function loadSBEmployees(cb) {
  fetch(_SB_URL + '/rest/v1/veraluz_employees_public?select=id,full_name,role,status,team_name,email,phone&order=full_name.asc', {
    headers: { apikey: _SB_KEY, Authorization: 'Bearer ' + _SB_KEY }

/* ── Réinitialisation PIN employé ─────────────────────────────────────────── */
function openResetPinMd(empId, empName) {
  var cu = getCurrentUser();
  var cuRole = (cu && cu.role) || 'unknown';
  document.getElementById('md-reset-pin-body').innerHTML
    = '<div class="modal-title">🔑 Réinitialiser le PIN</div>'
    + '<div style="color:var(--text2);font-size:13px;margin-bottom:14px;">'
    + 'Employé : <strong>' + esc(empName) + '</strong><br>'
    + 'Un PIN temporaire à 6 chiffres sera généré et affiché une seule fois.<br>'
    + "L'employé devra le changer à sa prochaine connexion."
    + '</div>'
    + '<div id="rp-result" style="display:none;background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:14px;text-align:center;">'
    + '<div style="font-size:12px;color:var(--text2);margin-bottom:6px;">PIN temporaire (valable 24h)</div>'
    + '<div id="rp-pin" style="font-size:32px;font-weight:900;letter-spacing:8px;color:var(--acc1);font-family:monospace"></div>'
    + '<div id="rp-exp" style="font-size:12px;color:var(--text2);margin-top:6px;"></div>'
    + '<div style="font-size:12px;color:#ef4444;margin-top:6px;font-weight:600">⚠️ Notez ce PIN maintenant — il ne sera plus affiché.</div>'
    + '</div>'
    + '<div class="btn-row" id="rp-btn-row">'
    + '<button class="btn btn-sec" onclick="closeMd(\'md-reset-pin\')">Annuler</button>'
    + '<button class="btn btn-warn" id="rp-confirm-btn" data-eid="' + esc(empId) + '" data-ename="' + esc(empName) + '" data-role="' + esc(cuRole) + '" onclick="doResetPin(this)">🔑 Générer PIN temporaire</button>'
    + '</div>';
  openMd('md-reset-pin');
}

function doResetPin(btn) {
  var empId   = btn.dataset.eid;
  var empName = btn.dataset.ename;
  var cuRole  = btn.dataset.role;
  var cu      = getCurrentUser();
  var cuName  = (cu && (cu.name || cu.username)) || 'Admin';

  btn.disabled = true;
  btn.textContent = '⏳ Génération…';

  fetch(_EDGE_RESET_PIN, {
    method: 'POST', mode: 'cors', credentials: 'omit',
    headers: { 'Content-Type': 'application/json', 'apikey': _SB_KEY, 'Authorization': 'Bearer ' + _SB_KEY },
    body: JSON.stringify({
      employee_id:       empId,
      requested_by:      cuName,
      requested_by_role: cuRole,
      reason:            'manual_reset_via_auth_module'
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(result){
    if (!result.ok) {
      toast('Erreur : ' + (result.error || 'Échec reset PIN'), true);
      btn.disabled = false; btn.textContent = '🔑 Générer PIN temporaire';
      return;
    }
    /* Afficher le PIN une seule fois */
    document.getElementById('rp-result').style.display = 'block';
    document.getElementById('rp-pin').textContent = result.temporary_pin;
    var exp = result.expires_at ? new Date(result.expires_at).toLocaleString('fr-FR') : '24h';
    document.getElementById('rp-exp').textContent = 'Expire le : ' + exp;
    document.getElementById('rp-btn-row').innerHTML
      = '<button class="btn btn-primary" onclick="closeMd(\'md-reset-pin\')">✅ Fermé — PIN noté</button>';
    audit('reset_pin', { employee_id: empId, employee_name: empName, by: cuName });
  })
  .catch(function(e){
    toast('Erreur réseau : impossible de contacter le serveur', true);
    btn.disabled = false; btn.textContent = '🔑 Générer PIN temporaire';
  });
}

function allPerms(){
  var p={};
  Object.keys(PERM_SCHEMA).forEach(function(mod){
    p[mod]={};
    Object.keys(PERM_SCHEMA[mod].sub).forEach(function(sub){
      p[mod][sub]={};
      PERM_SCHEMA[mod].sub[sub].actions.forEach(function(a){ p[mod][sub][a]=true; });
    });
  });
  return p;
}

function modPerms(mods){
  var p={};
  (mods||[]).forEach(function(mod){
    if(!PERM_SCHEMA[mod])return;
    p[mod]={};
    Object.keys(PERM_SCHEMA[mod].sub).forEach(function(sub){
      p[mod][sub]={};
      PERM_SCHEMA[mod].sub[sub].actions.forEach(function(a){ p[mod][sub][a]=true; });
    });
  });
  return p;
}

function emit(type,data){

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt_date(d){ if(!d)return '—'; try{return new Date(d).toLocaleDateString('fr-FR');}catch(e){return d;} }
function fmt_ago(d){
  if(!d) return '—';
  try{
    var s=Math.round((Date.now()-new Date(d))/1000);
    if(s<60) return 'À lʾinstant';
    if(s<3600) return Math.floor(s/60)+'min';
    if(s<86400) return Math.floor(s/3600)+'h';
    return Math.floor(s/86400)+'j';
  }catch(e){return d;}
}
function fmt_ts(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch(e){return d;}
}
function gid(){ return 'u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function avatarColor(name){
  var colors=['#22d3a5','#818cf8','#f59e0b','#f43f5e','#10b981','#3b82f6','#a855f7','#f97316'];
  var h=0;
  for(var i=0;i<(name||'').length;i++){ h=(h*31+name.charCodeAt(i))%colors.length; }
  return colors[Math.abs(h)%colors.length];
}
function avatarInitials(name){
  if(!name) return '?';
  var p=name.trim().split(' ');
  return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();
}
function toast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='on'+(err?' err':'');
  setTimeout(function(){ t.className=''; },3000);
}
function openMd(id){ document.getElementById(id).classList.add('on'); }
function closeMd(id){ document.getElementById(id).classList.remove('on'); }
function goTab(el){
  if(typeof el==='string'){ el=document.querySelector('.tab[data-tab="'+el+'"]'); }
  if(!el) return;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  currentTabId=el.dataset.tab;
  renderTab(currentTabId);
}

  var u=getCurrentUser();

  entries.unshift({
    id:'a'+Date.now(), ts:new Date().toISOString(),
    action:action, user_id:u.id, user_name:u.name||'System', data:data||{}

  try{ localStorage.setItem(STORE_AUDIT,JSON.stringify(entries)); }catch(e){}
}

    +'<button class="btn btn-sec btn-sm" onclick="reloadSBUsers()" title="Rafraîchir depuis Supabase">↻</button></div>';

  }

  var filtered = source.filter(function(u){
    var status = usingReal ? u.status : u.status;
    var name   = usingReal ? u.full_name : u.name;
    var email  = u.email || '';
    if (_uFilter !== 'all' && status !== _uFilter) return false;
    if (_uSearch && name.toLowerCase().indexOf(_uSearch.toLowerCase()) < 0 &&
        email.toLowerCase().indexOf(_uSearch.toLowerCase()) < 0) return false;
    return true;
  });

  if (!filtered.length) { html += '<div class="empty"><div class="empty-ico">👥</div>Aucun employé trouvé</div>'; return html; }

  filtered.forEach(function(u){
    var empId   = usingReal ? u.id   : u.employee_id || u.id;
    var empName = usingReal ? u.full_name : u.name;
    var empRole = u.role || '—';
    var empStatus = u.status || '—';
    var empEmail  = u.email || '';

      + '<div class="entry-av" style="background:' + ac + '20;color:' + ac + '">' + av + '</div>'
      + '<div class="entry-body">'
      + '<div class="entry-name">' + esc(empName) + '</div>'
      + '<div class="entry-sub">' + esc(empEmail) + '&nbsp;&middot;&nbsp;<span class="bdg ' + esc(roleConf.badge) + '">' + esc(roleConf.label) + '</span></div>'
      + '<div class="entry-sub" style="margin-top:2px;">' + sbStatusBadge(empStatus)
      + (u.team_name ? ' &middot; ' + esc(u.team_name) : '') + '</div>'
      + '</div>'

    +'<label class="fl">Description</label><input class="fi" id="nr-desc" placeholder="Description...">'
    +'<div class="btn-row">'
    +'<button class="btn btn-sec" onclick="closeMd(\'md-role\')">Annuler</button>'
    +'<button class="btn btn-primary" onclick="createRole()">Créer</button>'
    +'</div>';
  openMd('md-role');
}
function createRole(){
  var label=(document.getElementById('nr-label')||{}).value.trim();
  var desc =(document.getElementById('nr-desc')||{}).value.trim();
  if(!label){ toast('Nom requis',true); return; }
  var roles=getRoles();
  var newRole={
    id:'r'+Date.now().toString(36), label:label, icon:label[0].toUpperCase(),
    color:'#64748b', badge:'bdg-gray', desc:desc,
    locked:false, custom:true, perms:{}
  };
  roles.push(newRole);
  saveRoles(roles);
  audit('role-create',{label:label});
  closeMd('md-role');
  renderTab('roles');
  toast('Rôle créé');
}
function saveRoleEdit(rid){
  var roles=getRoles();
  var idx=roles.findIndex(function(r){ return r.id===rid; });
  if(idx<0) return;
  roles[idx].label=(document.getElementById('er-label')||{}).value||roles[idx].label;
  roles[idx].desc =(document.getElementById('er-desc')||{}).value||roles[idx].desc;
  saveRoles(roles);
  audit('role-edit',{rid:rid,label:roles[idx].label});
  closeMd('md-role');
  renderTab('roles');
  toast('Rôle mis à jour');
}
function deleteRole(rid){
  var roles=getRoles();
  var r=roles.find(function(x){ return x.id===rid; });
  if(!r||r.locked){ toast('Ce rôle ne peut pas être supprimé',true); return; }
  if(!confirm('Supprimer le rôle '+r.label+' ?')) return;
  roles=roles.filter(function(x){ return x.id!==rid; });
  saveRoles(roles);
  audit('role-delete',{rid:rid,label:r.label});
  closeMd('md-role');
  _selectedRole=null;
  renderTab('roles');
  toast('Rôle supprimé');
}
function saveRolePerms(rid){
  var roles=getRoles();
  var idx=roles.findIndex(function(r){ return r.id===rid; });
  if(idx<0) return;
  var p={};
  Object.keys(PERM_SCHEMA).forEach(function(mod){
    Object.keys(PERM_SCHEMA[mod].sub).forEach(function(sub){
      PERM_SCHEMA[mod].sub[sub].actions.forEach(function(a){
        var chk=document.getElementById('pck-'+mod+'-'+sub+'-'+a);
        if(chk&&chk.checked){
          if(!p[mod]) p[mod]={};
          if(!p[mod][sub]) p[mod][sub]={};
          p[mod][sub][a]=true;
        }
      });
    });
  });
  roles[idx].perms=p;
  saveRoles(roles);
  audit('role-perms',{rid:rid,label:roles[idx].label});
  renderTab('roles');
  toast('Permissions enregistrées');
}
function togglePermModule(mod){
  var body=document.getElementById('pm-body-'+mod);
  var arrow=document.getElementById('pm-arrow-'+mod);
  if(!body) return;
  body.classList.toggle('on');
  if(arrow) arrow.textContent=body.classList.contains('on')?' ▴':' ▾';
}

function renderRoles(){
  var roles=getRoles();
  var selRole=_selectedRole?roles.find(function(r){ return r.id===_selectedRole; }):null;
  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    +'<div style="font-weight:600;">'+roles.length+' rôles configurés</div>'
    +'<button class="btn btn-primary btn-sm" onclick="openNewRole()">➕ Rôle</button>'
    +'</div>';
  
  roles.forEach(function(r){
    var isSelected=_selectedRole===r.id;
    html+='<div class="role-card'+(isSelected?' on':'')+'" style="'+(isSelected?'border-color:var(--acc1);':'')+'" data-rid="'+esc(r.id)+'" onclick="selectRole(this.dataset.rid)">'
      +'<div style="display:flex;align-items:center;gap:10px;">'
      +'<div class="role-av" style="background:'+r.color+'20;color:'+r.color+'">'+esc(r.icon)+'</div>'
      +'<div style="flex:1;">'
      +'<div style="font-weight:600;">'+esc(r.label)+(r.locked?' <span class="bdg bdg-gray">🔒 Système</span>':'')+'</div>'
      +'<div style="font-size:12px;color:var(--text2);">'+esc(r.desc||'')+'</div>'
      +'</div>'
      +(!r.locked?'<button class="btn btn-primary btn-sm" data-rid="'+esc(r.id)+'" onclick="event.stopPropagation();openEditRole(this.dataset.rid)">✏</button>':'')
      +'</div>';
    if(isSelected){
      html+='<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">'
        +'<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;">PERMISSIONS</div>';
      Object.keys(PERM_SCHEMA).forEach(function(mod){
        var schema=PERM_SCHEMA[mod];
        html+='<div class="perm-module">'
          +'<div class="perm-module-hdr" data-mod="'+mod+'" onclick="event.stopPropagation();togglePermModule(this.dataset.mod)">'
          +esc(schema.label)+'<span id="pm-arrow-'+mod+'"> ▾</span>'
          +'</div>'
          +'<div class="perm-module-body" id="pm-body-'+mod+'">';
        Object.keys(schema.sub).forEach(function(sub){
          var subDef=schema.sub[sub];
          html+='<div class="perm-sub"><div class="perm-sub-title">'+esc(subDef.label)+'</div>'
            +'<div class="perm-actions">';
          subDef.actions.forEach(function(a){
            var checked=r.perms&&r.perms[mod]&&r.perms[mod][sub]&&r.perms[mod][sub][a];
            html+='<label class="perm-chk"><input type="checkbox" onclick="event.stopPropagation()" id="pck-'+mod+'-'+sub+'-'+a+'"'+(checked?' checked':'')
              +(r.locked?' disabled':'')+'>'+a+'</label>';
          });
          html+='</div></div>';
        });
        html+='</div></div>';
      });
      if(!r.locked){
        html+='<div class="btn-row">'
          +'<button class="btn btn-primary" data-rid="'+esc(r.id)+'" onclick="event.stopPropagation();saveRolePerms(this.dataset.rid)">Enregistrer permissions</button>'
          +'</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  return html;
}

/* ══════════════════════════════════════════════════════════════
   USER PERMISSIONS OVERRIDE
═══════════════════════════════════════════════════════════════ */
function openUserPerms(uid){
  var users=getUsers(); var roles=getRoles();
  var u=users.find(function(x){ return x.id===uid; });
  if(!u) return;
  var role=roles.find(function(r){ return r.id===u.role; })||{label:u.role,perms:{}};
  var overrides=u.perms_override||{};
  var html='<div class="modal-title">🔒 Permissions — '+esc(u.name)+'</div>'
    +'<div style="font-size:12px;color:var(--acc1);margin-bottom:10px;">'
    +'ℹ Les cases cochées s’appliquent en plus des permissions du rôle '+esc(role.label)+'.</div>';
  Object.keys(PERM_SCHEMA).forEach(function(mod){
    var schema=PERM_SCHEMA[mod];
    html+='<div style="margin-bottom:10px;"><div style="font-weight:600;font-size:13px;margin-bottom:6px;">'+esc(schema.label)+'</div>';
    Object.keys(schema.sub).forEach(function(sub){
      var subDef=schema.sub[sub];
      html+='<div class="perm-sub"><div class="perm-sub-title">'+esc(subDef.label)+'</div><div class="perm-actions">';
      subDef.actions.forEach(function(a){
        var checked=overrides[mod]&&overrides[mod][sub]&&overrides[mod][sub][a];
        html+='<label class="perm-chk"><input type="checkbox" id="upck-'+mod+'-'+sub+'-'+a+'"'+(checked?' checked':'')+'>'+a+'</label>';
      });
      html+='</div></div>';
    });
    html+='</div>';
  });
  html+='<div class="btn-row">'
    +'<button class="btn btn-sec" onclick="closeMd(\'md-perms\')">Annuler</button>'
    +'<button class="btn btn-primary" data-uid="'+esc(uid)+'" onclick="saveUserPerms(this.dataset.uid)">Enregistrer</button>'
    +'</div>';
  document.getElementById('md-perms-body').innerHTML=html;
  openMd('md-perms');
}
function saveUserPerms(uid){
  var users=getUsers();
  var idx=users.findIndex(function(u){ return u.id===uid; });
  if(idx<0) return;
  var p={};
  Object.keys(PERM_SCHEMA).forEach(function(mod){
    Object.keys(PERM_SCHEMA[mod].sub).forEach(function(sub){
      PERM_SCHEMA[mod].sub[sub].actions.forEach(function(a){
        var chk=document.getElementById('upck-'+mod+'-'+sub+'-'+a);
        if(chk&&chk.checked){
          if(!p[mod]) p[mod]={};
          if(!p[mod][sub]) p[mod][sub]={};
          p[mod][sub][a]=true;
        }
      });
    });
  });
  users[idx].perms_override=p;
  saveUsers(users);
  audit('user-perms',{uid:uid,name:users[idx].name});
  closeMd('md-perms');
  toast('Permissions mises à jour');
}

/* ══════════════════════════════════════════════════════════════
   TAB: SESSIONS
═══════════════════════════════════════════════════════════════ */
function killSession(sid){
  if(!confirm('Terminer cette session ?')) return;
  var sessions=getSessions();
  var idx=sessions.findIndex(function(s){ return s.id===sid; });
  if(idx>=0){ sessions[idx].active=false; }
  try{ localStorage.setItem(STORE_SESS,JSON.stringify(sessions)); }catch(e){}
  audit('session-kill',{sid:sid});
  renderTab('sessions');
  toast('Session terminée');
}
function purgeExpired(){
  var sessions=getSessions().filter(function(s){ return s.active; });
  try{ localStorage.setItem(STORE_SESS,JSON.stringify(sessions)); }catch(e){}
  renderTab('sessions');
  toast('Sessions expirées supprimées');
}
function renderSessions(){
  var sessions=getSessions();
  if(!sessions.length){
    return '<div class="empty"><div class="empty-ico">🔑</div>Aucune session</div>';
  }
  var active=sessions.filter(function(s){ return s.active; }).length;
  var html='<div class="stat-row">'
    +'<div class="stat"><div class="stat-val">'+sessions.length+'</div><div class="stat-lbl">Sessions totales</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:var(--success);">'+active+'</div><div class="stat-lbl">Actives</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:var(--text3);">'+(sessions.length-active)+'</div><div class="stat-lbl">Expirées</div></div>'
    +'</div>'
    +'<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">'
    +'<button class="btn btn-sec btn-sm" onclick="purgeExpired()">🗑 Purger</button></div>';
  sessions.forEach(function(s){
    html+='<div class="session-entry">'
      +'<div style="flex:1;">'
      +'<div style="font-weight:600;">'+esc(s.user_name)+'</div>'
      +'<div style="font-size:12px;color:var(--text2);margin-top:2px;">'
      +'🖥 '+esc(s.device)+' &nbsp;&middot;&nbsp; 🌐 '+esc(s.ip)+'</div>'
      +'<div style="font-size:11px;color:var(--text3);margin-top:2px);">'
      +'Début: '+fmt_ts(s.created)+' &nbsp;&middot;&nbsp; Actif: '+fmt_ago(s.last_active)+'</div>'
      +'</div>'
      +(s.active
        ?'<button class="btn btn-danger btn-sm" data-sid="'+esc(s.id)+'" onclick="killSession(this.dataset.sid)">✕</button>'
        :'<span class="bdg bdg-gray">Expirée</span>')
      +'</div>';
  });
  return html;
}

/* ══════════════════════════════════════════════════════════════
   TAB: AUDIT
═══════════════════════════════════════════════════════════════ */
var _auditFilter='all';
var AUDIT_ACTIONS={
  'user-invite':'Invitation',
  'user-edit':'Modification',
  'user-delete':'Suppression',
  'user-disabled':'Désactivation',
  'user-enabled':'Activation',
  'user-perms':'Permissions',
  'profile-update':'Profil',
  'password-change':'Mot de passe',
  'role-create':'Rôle créé',
  'role-edit':'Rôle modifié',
  'role-delete':'Rôle supprimé',
  'role-perms':'Permissions rôle',
  'session-kill':'Session terminée',
  'invite-resent':'Invitation renvoyée',
  'logout':'Déconnexion'
};
function setAuditFilter(f){ _auditFilter=f; renderTab('audit'); }
function renderAudit(){
  var entries=getAudit();
  var filters=['all','user-invite','user-edit','user-delete','profile-update','password-change','role-create','session-kill'];
  var html='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
  filters.forEach(function(f){
    var lbl=f==='all'?'Tous':(AUDIT_ACTIONS[f]||f);
    html+='<button class="fchip'+(_auditFilter===f?' on':'')+'" data-f="'+f+'" onclick="setAuditFilter(this.dataset.f)">'+lbl+'</button>';
  });
  html+='</div>';
  var filtered=entries.filter(function(e){
    return _auditFilter==='all'||e.action===_auditFilter;
  });
  if(!filtered.length){
    html+='<div class="empty"><div class="empty-ico">📋</div>Aucune entrée dans l’audit</div>';
    return html;
  }
  filtered.forEach(function(e){
    var lbl=AUDIT_ACTIONS[e.action]||e.action;
    html+='<div class="audit-entry">'
      +'<div style="font-size:11px;color:var(--text3);flex-shrink:0;">'+fmt_ts(e.ts)+'</div>'
      +'<div style="flex:1;">'
      +'<span class="bdg bdg-acc">'+esc(lbl)+'</span> '
      +'<span style="font-size:13px;">'+esc(e.user_name)+'</span>'
      +(e.data&&e.data.name?' → '+esc(e.data.name):'')
      +(e.data&&e.data.email?' ('+esc(e.data.email)+')':'')
      +'</div>'
      +'</div>';
  });
  return html;
}

/* ══════════════════════════════════════════════════════════════
   TAB: SECURITY
═══════════════════════════════════════════════════════════════ */
function saveSecurityPolicy(){
  var pol={
    session_timeout: parseInt((document.getElementById('pol-timeout')||{}).value)||480,
    max_sessions:    parseInt((document.getElementById('pol-max-sess')||{}).value)||3,
    password_min_length: parseInt((document.getElementById('pol-pw-len')||{}).value)||8,
    require_2fa:    (document.getElementById('pol-2fa')||{}).checked||false,
    invite_expiry_days: parseInt((document.getElementById('pol-invite')||{}).value)||7,
    log_retention_days: parseInt((document.getElementById('pol-logs')||{}).value)||90,
    auto_lock:      (document.getElementById('pol-autolock')||{}).checked||false
  };
  savePolicy(pol);
  audit('security-policy-update',{});
  toast('🔒 Politique de sécurité enregistrée');
}
function renderSecurite(){
  var pol=getPolicy();
  return '<div class="card"><div class="card-hdr"><div class="card-title">🔒 Politique de sécurité</div></div>'
    +'<div class="pol-row"><span>Timeout session (minutes)</span>'
    +'<input class="fi" id="pol-timeout" type="number" value="'+pol.session_timeout+'" style="width:80px;"></div>'
    +'<div class="pol-row"><span>Sessions simultanées max</span>'
    +'<input class="fi" id="pol-max-sess" type="number" value="'+pol.max_sessions+'" style="width:80px;"></div>'
    +'<div class="pol-row"><span>Longueur min. mot de passe</span>'
    +'<input class="fi" id="pol-pw-len" type="number" value="'+pol.password_min_length+'" style="width:80px;"></div>'
    +'<div class="pol-row"><span>Expiration invitation (jours)</span>'
    +'<input class="fi" id="pol-invite" type="number" value="'+pol.invite_expiry_days+'" style="width:80px;"></div>'
    +'<div class="pol-row"><span>Rétention logs (jours)</span>'
    +'<input class="fi" id="pol-logs" type="number" value="'+pol.log_retention_days+'" style="width:80px;"></div>'
    +'<div class="pol-row"><span>Authentification 2FA obligatoire</span>'
    +'<label class="switch"><input type="checkbox" id="pol-2fa"'+(pol.require_2fa?' checked':'')+' onchange="saveSecurityPolicy()"><span class="switch-sl"></span></label></div>'
    +'<div class="pol-row"><span>Verrouillage auto après timeout</span>'
    +'<label class="switch"><input type="checkbox" id="pol-autolock"'+(pol.auto_lock?' checked':'')+' onchange="saveSecurityPolicy()"><span class="switch-sl"></span></label></div>'
    +'<div class="btn-row"><button class="btn btn-primary" onclick="saveSecurityPolicy()">💾 Enregistrer</button></div>'
    +'</div>'
    +'<div class="card"><div class="card-hdr"><div class="card-title">Intégrations à venir</div></div>'
    +'<div style="color:var(--text2);font-size:13px;line-height:1.6;">'
    +'🔧 Supabase Auth JWT — en cours<br>'
    +'📱 Invitations SMS/WhatsApp — planifié<br>'
    +'🔐 MFA (TOTP) — planifié<br>'
    +'📊 SSO OAuth2 — planifié</div></div>';
}

</script>
