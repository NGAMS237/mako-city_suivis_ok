<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Paiements — Veraluz OS</title>
<style>
:root {
  --bg:#0d0d1a;--bg2:#11112a;--bg3:#181830;--bg4:#1e1e3a;--bg-hover:#252546;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#6c63ff;--accent2:#8b7fff;--accent3:#a89dff;
  --success:#22d3a5;--warning:#f59e0b;--danger:#f43f5e;--info:#38bdf8;
  --gold:#d4af37;
  --text:#e8e6ff;--text2:#9990cc;--text3:#5a5580;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;height:100%;overflow:hidden}

/* ── Shell ── */
.pay-shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.pay-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.pay-header h1{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.pay-header h1 svg{opacity:.7}
.hdr-actions{display:flex;gap:8px;align-items:center}

/* ── Tabs ── */
.pay-tabs{display:flex;gap:2px;padding:10px 12px 0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.pay-tabs::-webkit-scrollbar{display:none}
.pay-tab{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px 8px 0 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);border:none;background:none;white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent}
.pay-tab:hover{color:var(--text);background:var(--bg3)}
.pay-tab.active{color:var(--accent2);border-bottom-color:var(--accent);background:var(--bg3)}
.pay-tab .tbadge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center}
.pay-tab .tbadge.warn{background:var(--warning)}

/* ── Content ── */
.pay-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 12px}
.pay-pane{display:none}.pay-pane.active{display:block}

/* ── Toolbar ── */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.search-wrap{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px}
.search-wrap svg{color:var(--text3);flex-shrink:0}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
.search-wrap input::placeholder{color:var(--text3)}
.filter-sel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;padding:7px 10px;cursor:pointer;outline:none}
.filter-sel:focus{border-color:var(--accent)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:var(--bg3)}
.btn-success{background:var(--success);color:#000}.btn-success:hover{opacity:.85}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-icon{padding:6px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{color:var(--text);border-color:var(--border2)}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.green::before{background:var(--success)}
.stat-card.yellow::before{background:var(--warning)}
.stat-card.red::before{background:var(--danger)}
.stat-card.blue::before{background:var(--info)}
.stat-card.purple::before{background:var(--accent)}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:20px;font-weight:800;color:var(--text)}
.stat-sub{font-size:10px;color:var(--text2)}
.stat-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);opacity:.08;font-size:36px}

/* ── Cards & Lists ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .15s;cursor:default}
.card:hover{border-color:var(--border2)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-sub{font-size:11px;color:var(--text2);margin-top:2px}
.card-body{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.card-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.card-row:last-child{border:none}
.card-row .label{color:var(--text2)}
.card-row .value{font-weight:600;color:var(--text)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-green{background:rgba(34,211,165,.15);color:var(--success)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--warning)}
.badge-red{background:rgba(244,63,94,.15);color:var(--danger)}
.badge-blue{background:rgba(56,189,248,.15);color:var(--info)}
.badge-purple{background:rgba(108,99,255,.15);color:var(--accent2)}
.badge-gray{background:rgba(255,255,255,.07);color:var(--text2)}

/* ── Amount display ── */
.amount{font-size:16px;font-weight:800;color:var(--text)}
.amount.positive{color:var(--success)}
.amount.negative{color:var(--danger)}
.amount-sm{font-size:13px;font-weight:700}

/* ── Progress bar ── */
.progress-wrap{background:var(--bg4);border-radius:20px;height:6px;overflow:hidden;margin-top:6px}
.progress-bar{height:100%;border-radius:20px;background:var(--accent);transition:width .4s}
.progress-bar.full{background:var(--success)}
.progress-bar.low{background:var(--danger)}

/* ── Table ── */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--bg4);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.data-table tr:last-child td{border:none}
.data-table tr:hover td{background:var(--bg-hover)}
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;overflow-x:auto}

/* ── Method icons ── */
.method-icon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--bg4);flex-shrink:0}

/* ── Caisse ── */
.caisse-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.caisse-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.caisse-box .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.caisse-box .val{font-size:22px;font-weight:800}
.caisse-box.in .val{color:var(--success)}
.caisse-box.out .val{color:var(--danger)}
.caisse-box.total .val{color:var(--accent2)}

/* ── Methods config ── */
.method-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.method-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
.method-card .minfo{flex:1}
.method-card .mname{font-size:13px;font-weight:600;color:var(--text)}
.method-card .mdesc{font-size:11px;color:var(--text2);margin-top:2px}
.method-card .toggle{width:36px;height:20px;border-radius:10px;background:var(--bg4);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.method-card .toggle.on{background:var(--success)}
.method-card .toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.method-card .toggle.on::after{left:18px}

/* ── Reports ── */
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.report-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px}
.report-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.chart-bar-wrap{display:flex;flex-direction:column;gap:8px}
.chart-bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.chart-bar-label{width:90px;color:var(--text2);font-size:11px;text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;background:var(--bg4);border-radius:4px;height:10px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.chart-bar-val{width:70px;font-size:11px;font-weight:600;color:var(--text);text-align:right}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;padding:0;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,1,.1,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h3{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.modal-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* ── Form ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
.form-control:focus{border-color:var(--accent)}
.form-control::placeholder{color:var(--text3)}
select.form-control option{background:var(--bg2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:10px;color:var(--text3);margin-top:4px}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty svg{margin-bottom:12px;opacity:.3}
.empty p{font-size:13px;margin-top:6px}

/* ── Loading ── */
.loading{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;z-index:9999;transition:transform .3s;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}

/* ── Responsive ── */
@media(max-width:480px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .caisse-summary{grid-template-columns:1fr 1fr}
  .report-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="pay-shell">

  <!-- Header -->
  <div class="pay-header">
    <h1>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      Paiements
    </h1>
    <div class="hdr-actions">
      <button class="btn btn-primary btn-sm" onclick="openPayModal()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau
      </button>
      <button class="btn-icon btn-sm" onclick="loadAll(refresh)" title="Actualiser">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="pay-tabs">
    <button class="pay-tab active" id="tab-transactions" onclick="goTab('transactions')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
      Transactions<span class="tbadge" id="badge-tx">0</span>
    </button>
    <button class="pay-tab" id="tab-reservations" onclick="goTab('reservations')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Réservations<span class="tbadge warn" id="badge-rez">0</span>
    </button>
    <button class="pay-tab" id="tab-restaurant" onclick="goTab('restaurant')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2M7 2v20M21 15V2v0a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg>
      Restaurant<span class="tbadge" id="badge-resto">0</span>
    </button>
    <button class="pay-tab" id="tab-factures" onclick="goTab('factures')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Factures<span class="tbadge" id="badge-inv">0</span>
    </button>
    <button class="pay-tab" id="tab-remboursements" onclick="goTab('remboursements')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Remboursements<span class="tbadge warn" id="badge-ref">0</span>
    </button>
    <button class="pay-tab" id="tab-caisse" onclick="goTab('caisse')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Caisse
    </button>
    <button class="pay-tab" id="tab-methodes" onclick="goTab('methodes')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 19.07l1.41-1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12H4M20 12h2"/></svg>
      Méthodes
    </button>
    <button class="pay-tab" id="tab-rapports" onclick="goTab('rapports')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Rapports
    </button>
  </div>

  <!-- Content -->
  <div class="pay-content">

    <!-- ── TRANSACTIONS ── -->
    <div class="pay-pane active" id="pane-transactions">
      <div class="stat-grid" id="tx-stats"></div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="tx-search" placeholder="Client, référence, montant..." oninput="renderTransactions()"/>
        </div>
        <select class="filter-sel" id="tx-status" onchange="renderTransactions()">
          <option value="all">Tous statuts</option>
          <option value="validated">Validé</option>
          <option value="pending">En attente</option>
          <option value="rejected">Rejeté</option>
          <option value="refunded">Remboursé</option>
        </select>
        <select class="filter-sel" id="tx-method" onchange="renderTransactions()">
          <option value="all">Toutes méthodes</option>
          <option value="cash">Espèces</option>
          <option value="orange">Orange Money</option>
          <option value="mtn">MTN MoMo</option>
          <option value="virement">Virement</option>
          <option value="card">Carte</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
      <div id="tx-list"></div>
    </div>

    <!-- ── RESERVATIONS ── -->
    <div class="pay-pane" id="pane-reservations">
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="rez-search" placeholder="Nom du client..." oninput="renderReservationsTab()"/>
        </div>
        <select class="filter-sel" id="rez-pay-filter" onchange="renderReservationsTab()">
          <option value="all">Tous</option>
          <option value="unpaid">Non payé</option>
          <option value="partial">Partiel</option>
          <option value="paid">Payé</option>
        </select>
      </div>
      <div id="rez-list"></div>
    </div>

    <!-- ── RESTAURANT ── -->
    <div class="pay-pane" id="pane-restaurant">
      <div class="stat-grid" id="resto-stats"></div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="resto-search" placeholder="Table, client..." oninput="renderRestaurant()"/>
        </div>
        <select class="filter-sel" id="resto-status" onchange="renderRestaurant()">
          <option value="all">Tous</option>
          <option value="open">Ouverte</option>
          <option value="paid">Payée</option>
          <option value="room_charge">Chambre</option>
          <option value="cancelled">Annulée</option>
        </select>
        <select class="filter-sel" id="resto-type" onchange="renderRestaurant()">
          <option value="all">Tous types</option>
          <option value="restaurant">Restaurant</option>
          <option value="bar">Bar</option>
          <option value="room_service">Room Service</option>
        </select>
      </div>

<script>
/* ── CONFIG ── */
var SB_URL = (window.__SUPABASE_URL__||'https://dfdmasejsoibxrvubegu.supabase.co');
var SB_KEY = (window.__SUPABASE_KEY__||'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY');

/* ── STATE ── */
var _payments = [];
var _reservations = [];
var _restaurant = [];
var _invoices = [];
var _refunds = [];
var _caisse = [];
/* ── Status helpers (Restaurant écrit 'paye'/'pret', normalisation bilingue) ── */
function restoIsPaid(s){ return s==='paid'||s==='paye'; }
function restoIsOpen(s){ return s==='open'||s==='pret'||s==='ouvert'||s==='en_cours'||s==='new'; }
var _activeTab = 'transactions';

/* ── UTILITIES ── */
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  var v = parseInt(n) || 0;
  return v.toLocaleString('fr-FR') + ' FCFA';
}

function fmtD(d) {
  if (!d) return '—';
  try {
    var dt = new Date(d);
    return dt.toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'});
  } catch(e) { return d; }
}

function fmtDT(d) {
  if (!d) return '—';
  try {
    var dt = new Date(d);
    return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) + ' ' +
           dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  } catch(e) { return d; }
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function methodLabel(m) {
  var map = {cash:'Espèces',orange:'Orange Money',mtn:'MTN MoMo',virement:'Virement',card:'Carte',mobile:'Mobile Money'};
  return map[m] || m || '—';
}

function methodIcon(m) {
  var icons = {
    cash:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
    orange:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>',
    mtn:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
    virement:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>',
    card:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>'
  };
  return icons[m] || icons['cash'];
}

function typeLabel(t) {
  var map = {acompte:'Acompte',solde:'Solde',total:'Paiement complet',payment:'Paiement',restaurant:'Restaurant',bar:'Bar',room_service:'Room Service',remboursement:'Remboursement',divers:'Divers'};
  return map[t] || t || 'Paiement';
}

function statusBadge(s) {
  if (!s) return '<span class="badge badge-gray">—</span>';
  var cfg = {
    validated:['badge-green','Validé'],
    pending:['badge-yellow','En attente'],
    rejected:['badge-red','Rejeté'],
    refunded:['badge-blue','Remboursé'],
    paid:['badge-green','Payé'],
    partial:['badge-yellow','Partiel'],
    unpaid:['badge-red','Impayé'],
    open:['badge-blue','Ouvert'],
    room_charge:['badge-purple','Chambre'],
    cancelled:['badge-red','Annulé'],
    draft:['badge-gray','Brouillon'],
    sent:['badge-blue','Envoyée'],
    overdue:['badge-red','En retard'],
    approved:['badge-green','Approuvé'],
    processed:['badge-blue','Traité'],
    entree:['badge-green','Entrée'],
    sortie:['badge-red','Sortie']
  };
  var c = cfg[s] || ['badge-gray', s];
  return '<span class="badge '+c[0]+'">'+esc(c[1])+'</span>';
}

/* ── SUPABASE FETCH ── */
function sbFetch(path, opts) {
  var url = SB_URL + '/rest/v1/' + path;
  var headers = {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json'};
  if (opts && opts.method && opts.method !== 'GET') {
    headers['Prefer'] = 'return=minimal';
  }
  return fetch(url, Object.assign({headers: headers}, opts || {}));
}

/* ── LOAD ALL DATA ── */
function loadAll(cb) {
  var done = 0;
  var total = 5;
  function checkDone() { done++; if (done >= total && cb) cb(); }

  // Cache restore
  try { var c = localStorage.getItem('vlz_pay_cache'); if(c) _payments = JSON.parse(c); } catch(e){}
  try { var c = localStorage.getItem('vlz_cache_rooms'); } catch(e){}
  try { var c = localStorage.getItem('vlz_cache_rez'); if(c) _reservations = JSON.parse(c); } catch(e){}

  // Payments
  sbFetch('veraluz_payments?select=*&order=created_at.desc&limit=200')
    .then(function(r){return r.json();})
    .then(function(d){
      if(Array.isArray(d)) {
        _payments = d;
        try{localStorage.setItem('vlz_pay_cache', JSON.stringify(d));}catch(e){}
      }
      checkDone();
    }).catch(function(){checkDone();});

  // Reservations
  sbFetch('veraluz_reservations?select=id,client_name,client_phone,client_email,check_in,check_out,total,paid,status,unit_id&order=check_in.desc&limit=100')
    .then(function(r){return r.json();})
    .then(function(d){
      if(Array.isArray(d)) {
        _reservations = d;
        try{localStorage.setItem('vlz_cache_rez', JSON.stringify(d));}catch(e){}
      }
      checkDone();
    }).catch(function(){checkDone();});

  // Restaurant orders
  sbFetch('veraluz_restaurant_orders?select=*&order=created_at.desc&limit=100')
    .then(function(r){return r.json();})
    .then(function(d){
      if(Array.isArray(d)) _restaurant = d;
      checkDone();
    }).catch(function(){checkDone();});

  // Invoices
  sbFetch('veraluz_invoices?select=*&order=issued_at.desc&limit=100')
    .then(function(r){return r.json();})
    .then(function(d){
      if(Array.isArray(d)) _invoices = d;
      checkDone();
    }).catch(function(){checkDone();});

  // Refunds + Caisse in parallel (count as 1)
  Promise.all([
    sbFetch('veraluz_refunds?select=*&order=created_at.desc&limit=100').then(function(r){return r.json();}),
    sbFetch('veraluz_caisse?select=*&order=created_at.desc&limit=200').then(function(r){return r.json();})
  ]).then(function(results){
    if(Array.isArray(results[0])) _refunds = results[0];
    if(Array.isArray(results[1])) _caisse = results[1];
    checkDone();
  }).catch(function(){checkDone();});
}

/* ── MODAL HELPERS ── */
function openModal(id) {
  var el = document.getElementById(id);
  if(el) el.classList.add('open');
}

function closeModal(id) {
  var el = document.getElementById(id);
  if(el) el.classList.remove('open');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function(){ t.className = 'toast'; }, 3000);
}

/* ── TAB NAVIGATION ── */
function goTab(t) {
  _activeTab = t;
  document.querySelectorAll('.pay-tab').forEach(function(btn){
    btn.classList.toggle('active', btn.id === 'tab-' + t);
  });
  document.querySelectorAll('.pay-pane').forEach(function(p){
    p.classList.toggle('active', p.id === 'pane-' + t);
  });
  var renders = {
    transactions: renderTransactions,
    reservations: renderReservationsTab,
    restaurant: renderRestaurant,
    factures: renderFactures,
    remboursements: renderRefunds,
    caisse: renderCaisse,
    methodes: renderMethods,
    rapports: renderRapports
  };
  if(renders[t]) renders[t]();
}

  updateBadges();

}

function updateBadges() {
  var pending = _payments.filter(function(p){return p.status==='pending';}).length;

  var unpaidRez = _reservations.filter(function(r){

  if(bTx) bTx.textContent = _payments.length;

}

  if(period==='today') cutoff = new Date(now.toDateString());
  else if(period==='week') { cutoff=new Date(now); cutoff.setDate(cutoff.getDate()-7); }
  else if(period==='month') { cutoff=new Date(now.getFullYear(),now.getMonth(),1); }
  var list = period==='all' ? _payments : _payments.filter(function(p){return new Date(p.created_at)>=cutoff;});
  var validated = list.filter(function(p){return p.status==='validated';});
  var totalRev = validated.reduce(function(s,p){return s+(parseInt(p.amount)||0);},0);
  var totalPend = list.filter(function(p){return p.status==='pending';}).reduce(function(s,p){return s+(parseInt(p.amount)||0);},0);
  var avgTx = validated.length>0?Math.round(totalRev/validated.length):0;
  var sg = document.getElementById('rpt-stats');
  if(sg) sg.innerHTML =
    '<div class="stat-card green"><div class="stat-label">Revenus validés</div><div class="stat-val">'+fmtNum(totalRev)+'</div><div class="stat-sub">'+validated.length+' tx</div></div>'+
    '<div class="stat-card yellow"><div class="stat-label">En attente</div><div class="stat-val">'+fmtNum(totalPend)+'</div><div class="stat-sub">à valider</div></div>'+
    '<div class="stat-card blue"><div class="stat-label">Ticket moyen</div><div class="stat-val">'+fmtNum(avgTx)+'</div><div class="stat-sub">par transaction</div></div>'+
    '<div class="stat-card purple"><div class="stat-label">Volume</div><div class="stat-val">'+list.length+'</div><div class="stat-sub">transactions</div></div>';
  var byMethod = {}, byType = {};
  validated.forEach(function(p){
    var m=p.method||'cash', t=p.payment_type||'payment';
    byMethod[m]=(byMethod[m]||0)+(parseInt(p.amount)||0);
    byType[t]=(byType[t]||0)+(parseInt(p.amount)||0);
  });
  function barRows(obj, labelFn, color) {
    var maxV = Math.max.apply(null, Object.values(obj).concat([1]));
    return Object.keys(obj).sort(function(a,b){return obj[b]-obj[a];}).map(function(k){
      return '<div class="chart-bar-row">'+
        '<div class="chart-bar-label">'+esc(labelFn(k))+'</div>'+
        '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+Math.round(obj[k]/maxV*100)+'%;'+(color?'background:'+color:'')+'"></div></div>'+
        '<div class="chart-bar-val">'+fmtNum(obj[k])+'</div>'+
      '</div>';
    }).join('');
  }
  var rezPaid = _reservations.filter(function(r){return parseInt(r.paid)>=parseInt(r.total)&&parseInt(r.total)>0;}).length;
  var rezPartial = _reservations.filter(function(r){var t=parseInt(r.total)||0,p=parseInt(r.paid)||0;return p>0&&p<t;}).length;
  var rezUnpaid = _reservations.filter(function(r){return (parseInt(r.paid)||0)===0&&parseInt(r.total)>0;}).length;
  var N = Math.max(1,_reservations.length);
  var el = document.getElementById('rpt-charts');
  if(el) el.innerHTML =
    '<div class="report-card"><div class="report-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Par méthode</div><div class="chart-bar-wrap">'+(barRows(byMethod,methodLabel,'')||'<p style="color:var(--text3);font-size:12px">Aucune donnée</p>')+'</div></div>'+
    '<div class="report-card"><div class="report-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Par type</div><div class="chart-bar-wrap">'+(barRows(byType,typeLabel,'var(--success)')||'<p style="color:var(--text3);font-size:12px">Aucune donnée</p>')+'</div></div>'+
    '<div class="report-card"><div class="report-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Statut réservations</div>'+
    '<div class="chart-bar-wrap">'+
    '<div class="chart-bar-row"><div class="chart-bar-label">Soldé</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+Math.round(rezPaid/N*100)+'%;background:var(--success)"></div></div><div class="chart-bar-val">'+rezPaid+'</div></div>'+
    '<div class="chart-bar-row"><div class="chart-bar-label">Partiel</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+Math.round(rezPartial/N*100)+'%;background:var(--warning)"></div></div><div class="chart-bar-val">'+rezPartial+'</div></div>'+
    '<div class="chart-bar-row"><div class="chart-bar-label">Impayé</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+Math.round(rezUnpaid/N*100)+'%;background:var(--danger)"></div></div><div class="chart-bar-val">'+rezUnpaid+'</div></div>'+
    '</div></div>';
}

/* ── SAVE PAYMENT ── */
function savePayment() {
  var rezId = document.getElementById('pay-rez-select').value;
  var guest = document.getElementById('pay-guest').value.trim();
  var amount = parseInt(document.getElementById('pay-amount').value)||0;
  var type = document.getElementById('pay-type').value;
  var method = document.getElementById('pay-method').value;
  var source = document.getElementById('pay-source').value;
  var ref = document.getElementById('pay-ref').value.trim();
  var notes = document.getElementById('pay-notes').value.trim();

  if(amount <= 0) { showToast('Veuillez saisir un montant valide', 'error'); return; }

  // If no guest name, try to get from reservation
  if(!guest && rezId) {
    var rez = _reservations.find(function(r){return r.id===rezId;});
    if(rez) guest = rez.client_name;
  }

  var body = {
    amount: amount,
    method: method,
    payment_type: type,
    source: source,
    status: 'validated',
    reference: ref || '',
    notes: notes || null,
    guest_name: guest || null,
    currency: 'XAF'
  };
  if(rezId) body.reservation_id = rezId;

  var btn = document.querySelector('#payModal .btn-primary');
  if(btn) btn.textContent = 'Enregistrement...';

  sbFetch('veraluz_payments', {method:'POST', body:JSON.stringify(body)})
    .then(function(r) {
      if(r.ok || r.status === 201) {
        // Update reservation paid amount if linked
        if(rezId && (type==='acompte'||type==='solde'||type==='total')) {
          var rez = _reservations.find(function(r){return r.id===rezId;});
          if(rez) {
            var newPaid = (parseInt(rez.paid)||0) + amount;
            sbFetch('veraluz_reservations?id=eq.'+rezId, {
              method:'PATCH',
              body:JSON.stringify({paid: newPaid}),
              headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'}
            });
            rez.paid = newPaid;
          }
        }
        closeModal('payModal');
        showToast('Paiement enregistré avec succès', 'success');
        loadAll(refresh);
      } else {
        showToast('Erreur lors de l\'enregistrement', 'error');
        if(btn) btn.textContent = 'Enregistrer paiement';
      }
    }).catch(function(){
      showToast('Erreur réseau', 'error');
      if(btn) btn.textContent = 'Enregistrer paiement';
    });
}

function saveRefund() {

function saveCaisseEntry() {
  var type = document.getElementById('caisse-type').value;
  var amount = parseInt(document.getElementById('caisse-amount').value)||0;
  var date = document.getElementById('caisse-entry-date').value || today();
  var libelle = document.getElementById('caisse-libelle').value.trim();
  var source = document.getElementById('caisse-source').value;

  if(amount <= 0) { showToast('Montant invalide', 'error'); return; }
  if(!libelle) { showToast('Veuillez saisir un libellé', 'error'); return; }

  // Calculate running balance
  var lastEntry = _caisse[0];
  var soldeAvant = lastEntry ? (parseInt(lastEntry.solde_apres)||0) : 50000;
  var soldeApres = type === 'entree' ? soldeAvant + amount : soldeAvant - amount;

  var body = {
    date: date,
    type: type,
    montant: amount,
    solde_avant: soldeAvant,
    solde_apres: soldeApres,
    libelle: libelle,
    source: source,
    created_by: 'Réception'
  };

  sbFetch('veraluz_caisse', {method:'POST', body:JSON.stringify(body)})
    .then(function(r){
      if(r.ok || r.status===201) {
        closeModal('caisseModal');
        showToast((type==='entree'?'Entrée':'Sortie')+' de caisse enregistrée', 'success');
        loadAll(refresh);
      } else {
        r.json().then(function(e){showToast('Erreur: '+(e&&e.message||'enregistrement caisse'),'error');}).catch(function(){showToast('Erreur enregistrement caisse','error');});
      }
    }).catch(function(){ showToast('Erreur réseau', 'error'); });
}

/* ── EXPORT CSV ── */
function exportCSV() {
  var headers = ['ID','Client','Montant','Méthode','Type','Statut','Référence','Date'];
  var rows = _payments.map(function(p){
    var rez = _reservations.find(function(r){return r.id===p.reservation_id;});
    return [
      p.id, rez?rez.client_name:(p.guest_name||'—'),
      p.amount, methodLabel(p.method), typeLabel(p.payment_type||'payment'),
      p.status, p.reference||'', (p.created_at||'').split('T')[0]
    ].map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(',');
  });
  var csv = [headers.join(',')].concat(rows).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'veraluz_paiements_'+today()+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Export CSV téléchargé', 'success');
}

/* ── CLOSE MODALS ON OVERLAY CLICK ── */
document.querySelectorAll('.modal-overlay').forEach(function(overlay){
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) overlay.classList.remove('open');
  });
});

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', function(){
  // Set today's date in caisse filter
  var cd = document.getElementById('caisse-date');
  if(cd) cd.value = today();

  goTab('transactions');
  loadAll(function(){
    refresh();
  });

  /* Auto-sync : détecte les paiements créés depuis le module Réservations */
  var _lastPaySync = 0;
  setInterval(function(){
    try{
      var ts = parseInt(localStorage.getItem('vlz_pay_updated')||'0');
      if(ts > _lastPaySync){
        _lastPaySync = ts;
        loadAll(refresh);
        showToast('Paiement reçu depuis Réservations ✓', 'success');
      }
    }catch(e){}
  }, 4000);
});
</script>
