*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#1e293b;border-bottom:1px solid #334155;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-title{font-weight:700;font-size:15px;color:#f1f5f9;}
.add-btn{background:#10b981;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;}

.tabbar{background:#1e293b;border-bottom:1px solid #334155;padding:0 8px;display:flex;gap:1px;overflow-x:auto;flex-shrink:0;}
.tabbar::-webkit-scrollbar{height:3px;}.tabbar::-webkit-scrollbar-thumb{background:#334155;}
.tb{background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;font-size:12px;font-weight:500;padding:8px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tb:hover{color:#e2e8f0;}.tb.on{color:#10b981;border-bottom-color:#10b981;}
.content{flex:1;overflow-y:auto;padding:14px;}
.content::-webkit-scrollbar{width:4px;}.content::-webkit-scrollbar-thumb{background:#334155;}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:#1e293b;border-radius:12px;padding:14px;border:1px solid #334155;}
.kpi-val{font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:3px;}
.kpi-lbl{font-size:11px;color:#64748b;font-weight:500;}
.kpi-icon{font-size:22px;margin-bottom:6px;}
.kpi.alert .kpi-val{color:#ef4444;}.kpi.warn .kpi-val{color:#f59e0b;}.kpi.ok .kpi-val{color:#10b981;}
.sec-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;}
.item-card{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #334155;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .12s;}
.item-card:hover{background:#273348;}
.ic-icon{width:40px;height:40px;border-radius:10px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ic-body{flex:1;min-width:0;}
.ic-name{font-size:13px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ic-sub{font-size:11px;color:#64748b;margin-top:2px;}
.ic-right{text-align:right;flex-shrink:0;}
.stock-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.stock-ok{background:#064e3b;color:#34d399;}.stock-low{background:#78350f;color:#fbbf24;}.stock-crit{background:#7f1d1d;color:#fca5a5;}
.status-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.s-pending{background:#1e3a5f;color:#60a5fa;}.s-approved{background:#064e3b;color:#34d399;}
.s-rejected{background:#7f1d1d;color:#fca5a5;}.s-ordered{background:#2d1b69;color:#a78bfa;}
.s-received{background:#064e3b;color:#34d399;}.s-draft{background:#1e293b;color:#94a3b8;}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;}
.btn-primary{background:#10b981;color:#fff;}.btn-primary:hover{background:#059669;}
.btn-secondary{background:#1e293b;color:#e2e8f0;border:1px solid #334155;}.btn-secondary:hover{background:#334155;}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;}
.btn-sm{padding:5px 11px;font-size:12px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#1e293b;border-radius:16px 16px 0 0;width:100%;max-width:580px;max-height:92vh;overflow-y:auto;padding:20px;}
.modal-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:16px;}
.modal input,.modal textarea,.modal select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:9px 12px;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:#10b981;}
.modal label{font-size:11px;color:#64748b;font-weight:600;display:block;margin-bottom:4px;}
.modal-row{display:flex;gap:8px;}.modal-row>div{flex:1;}
.modal-footer{display:flex;gap:8px;margin-top:4px;justify-content:flex-end;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.fbtn{background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;}
.fbtn.on{background:#064e3b;border-color:#10b981;color:#34d399;}
.search-box{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:0 10px;display:flex;align-items:center;gap:6px;flex:1;min-width:150px;}
.search-box input{background:none;border:none;outline:none;color:#e2e8f0;font-size:13px;padding:7px 0;width:100%;}
.prog-wrap{background:#0f172a;border-radius:4px;height:6px;margin-top:5px;}
.prog-bar{height:6px;border-radius:4px;transition:width .3s;}
.mv-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;margin-bottom:6px;background:#1e293b;border:1px solid #334155;}
.mv-type{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.mv-in{background:#064e3b;}.mv-out{background:#7f1d1d;}.mv-adj{background:#1e3a5f;}.mv-loss{background:#451a03;}
.chart-wrap{background:#1e293b;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #334155;}
.chart-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px;}
.upload-zone{border:2px dashed #334155;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border .2s;margin-bottom:10px;}
.upload-zone:hover{border-color:#10b981;}
.uz-icon{font-size:28px;margin-bottom:4px;}.uz-text{font-size:12px;color:#64748b;}
.empty{text-align:center;padding:40px 20px;color:#475569;}
.empty-icon{font-size:38px;margin-bottom:10px;opacity:.5;}
.urg-high{color:#ef4444;font-weight:700;}.urg-med{color:#f59e0b;}.urg-low{color:#94a3b8;}
.dp-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0f172a;font-size:13px;}
.dp-lbl{color:#64748b;}.dp-val{color:#f1f5f9;font-weight:500;text-align:right;}
.detail-panel{background:#0f172a;border-radius:10px;padding:12px;margin-top:10px;}
.prix-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;margin-bottom:6px;background:#1e293b;border:1px solid #334155;}
.prix-badge{background:#064e3b;color:#34d399;font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;}
.amount-row{display:flex;gap:8px;}
.amount-box{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px;text-align:center;}
.amount-box .amt-val{font-size:16px;font-weight:700;color:#f1f5f9;}
.amount-box .amt-lbl{font-size:10px;color:#64748b;margin-top:2px;}
.amount-box.real .amt-val{color:#10b981;}
.info-box{background:#0f172a;border-radius:8px;padding:10px 12px;font-size:12px;color:#64748b;margin-bottom:10px;border-left:3px solid #10b981;}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
</style>

/* ── State ── */
var currentTab='dashboard';
var allItems=[],allRequests=[],allOrders=[],allReceptions=[],allSuppliers=[],allMovements=[],allPrices=[];
var filterStatus='all',searchQ='';

var TABS=[

  {id:'inventaire',label:'Inventaire'},

var UNITS=['pcs','kg','L','m','boîte','carton','sac','rouleau','lot'];

  {id:4,name:'Ampoules LED E27',category:'Maintenance',quantity:3,min_quantity:10,unit:'pcs',location:'Local technique',notes:''},
  {id:5,name:'Produit WC',category:'Nettoyage',quantity:8,min_quantity:5,unit:'L',location:'Buanderie',notes:''},
  {id:6,name:'Savon main 500ml',category:'Réception',quantity:12,min_quantity:6,unit:'pcs',location:'Réception',notes:''},
  {id:7,name:'Draps 2 places',category:'Housekeeping',quantity:18,min_quantity:10,unit:'pcs',location:'Buanderie',notes:''},
  {id:8,name:'Piles AA',category:'Maintenance',quantity:4,min_quantity:12,unit:'pcs',location:'Local technique',notes:''}
];

  {id:1,item_name:'Gel douche 250ml',quantity:30,justification:'Rupture imminente',urgency:'high',status:'pending',requested_by:'Fatima H.',created_at:'2026-05-17T09:00:00'},
  {id:2,item_name:'Ampoules LED E27',quantity:20,justification:'Chambres sans lumière',urgency:'high',status:'approved',requested_by:'Jean-Paul M.',created_at:'2026-05-16T14:30:00'},
  {id:3,item_name:'Piles AA',quantity:24,justification:'Télécommandes clim.',urgency:'med',status:'ordered',requested_by:'Marie N.',created_at:'2026-05-15T10:00:00'}
];

  {id:1,po_number:'PO-2026-001',supplier:'Marché Central Kribi',items:'Ampoules LED E27 x20',items_detail:[{name:'Ampoules LED E27',qty:20,unit:'pcs'}],total_amount:15000,status:'received',created_by:'Admin',created_at:'2026-05-16T15:00:00',notes:''},
  {id:2,po_number:'PO-2026-002',supplier:'Huileries du Cameroun',items:'Piles AA x24',items_detail:[{name:'Piles AA',qty:24,unit:'pcs'}],total_amount:8500,status:'ordered',created_by:'Manager',created_at:'2026-05-15T11:00:00',notes:''},
  {id:3,po_number:'PO-2026-003',supplier:'BRECAM Electricité',items:'Gel douche 250ml x30',items_detail:[{name:'Gel douche 250ml',qty:30,unit:'pcs'}],total_amount:12000,status:'draft',created_by:'Admin',created_at:'2026-05-18T09:00:00',notes:''}
];

  {id:3,name:'BRECAM Electricité',phone:'+237 655 003 003',email:'',category:'Maintenance',notes:'Urgences 24h/24'}
];

  {id:1,item_name:'Serviettes blanches',type:'out',quantity:6,user_name:'Fatima H.',note:'Housekeeping ch. 3,4,5',created_at:'2026-05-18T07:30:00'},
  {id:2,item_name:'Ampoules LED E27',type:'in',quantity:20,user_name:'Jean-Paul M.',note:'Réception PO-2026-001',created_at:'2026-05-17T14:00:00'},
  {id:3,item_name:'Piles AA',type:'out',quantity:2,user_name:'Marie N.',note:'Bureau réception',created_at:'2026-05-17T10:15:00'}
];
var MOCK_RECEPTIONS=[
  {id:1,po_id:1,po_number:'PO-2026-001',items:'Ampoules LED E27 x20',supplier_name:'Marché Central Kribi',estimated_amount:15000,real_amount:14500,received_by:'Jean-Paul M.',received_at:'2026-05-17T14:00:00',notes:'Conforme',price_entries:[{item_name:'Ampoules LED E27',qty:20,unit:'pcs',unit_price:725,total_price:14500,supplier:'Marché Central Kribi'}]}
];
var MOCK_PRICES=[
  {id:1,item_name:'Ampoules LED E27',supplier_name:'Marché Central Kribi',unit_price:725,unit:'pcs',quantity:20,total_price:14500,date:'2026-05-17',reception_id:1}
];

window.addEventListener('load',function(){ buildTabs(); loadAll(); goTab('dashboard'); });

function buildTabs(){
  var bar=document.getElementById('tabbar');
  bar.innerHTML=TABS.map(function(t){
    return '<button class="tb" id="tab_'+t.id+'" data-id="'+t.id+'" onclick="goTab(this.dataset.id)">'+TAB_ICONS[t.id]+' '+t.label+'</button>';
  }).join('');
}
function goTab(id){ currentTab=id; filterStatus='all'; searchQ=''; TABS.forEach(function(t){ var el=document.getElementById('tab_'+t.id); if(el) el.className='tb'+(t.id===id?' on':''); }); render(); }

async function loadAll(){
  try{ var it=await sbGet('vz_inventory_items?order=name.asc'); allItems=Array.isArray(it)&&it.length?it:MOCK_ITEMS; }catch(e){ allItems=MOCK_ITEMS; }
  try{ var rq=await sbGet('vz_purchase_requests?order=created_at.desc'); allRequests=Array.isArray(rq)&&rq.length?rq:MOCK_REQUESTS; }catch(e){ allRequests=MOCK_REQUESTS; }
  try{ var od=await sbGet('vz_purchase_orders?order=created_at.desc'); allOrders=Array.isArray(od)&&od.length?od:MOCK_ORDERS; }catch(e){ allOrders=MOCK_ORDERS; }
  try{ var rc=await sbGet('vz_receptions?order=received_at.desc'); allReceptions=Array.isArray(rc)&&rc.length?rc:MOCK_RECEPTIONS; }catch(e){ allReceptions=MOCK_RECEPTIONS; }
  try{ var sp=await sbGet('vz_appro_suppliers?order=name.asc'); allSuppliers=Array.isArray(sp)&&sp.length?sp:MOCK_SUPPLIERS; }catch(e){ allSuppliers=MOCK_SUPPLIERS; }
  try{ var mv=await sbGet('vz_inventory_movements?order=created_at.desc&limit=100'); allMovements=Array.isArray(mv)&&mv.length?mv:MOCK_MOVEMENTS; }catch(e){ allMovements=MOCK_MOVEMENTS; }
  /* Prix: Supabase ou localStorage cache */
  try{ var pr=await sbGet('vz_price_catalog?order=date.desc'); allPrices=Array.isArray(pr)&&pr.length?pr:loadPricesLocal(); }catch(e){ allPrices=loadPricesLocal(); }
  if(!allPrices.length) allPrices=MOCK_PRICES;
  render();
}
function loadPricesLocal(){ try{ return JSON.parse(localStorage.getItem('vz_price_catalog')||'[]'); }catch(e){ return []; } }
function savePricesLocal(){ try{ localStorage.setItem('vz_price_catalog',JSON.stringify(allPrices)); }catch(e){} }

function render(){
  var map={dashboard:renderDashboard,inventaire:renderInventaire,demandes:renderDemandes,bons:renderBons,receptions:renderReceptions,prix:renderPrix,fournisseurs:renderFournisseurs,mouvements:renderMouvements,rapports:renderRapports};
  if(map[currentTab]) map[currentTab]();
}

/* ══ UTILS ══ */
function setContent(h){ document.getElementById('content').innerHTML=h; }
function showModal(h){ document.getElementById('modals').innerHTML=h; }
function closeModal(){ document.getElementById('modals').innerHTML=''; }
function kpiCard(icon,val,lbl,cls){ return '<div class="kpi'+(cls?' '+cls:'')+'"><div class="kpi-icon">'+icon+'</div><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+lbl+'</div></div>'; }
function dpRow(lbl,val){ return '<div class="dp-row"><span class="dp-lbl">'+lbl+'</span><span class="dp-val">'+val+'</span></div>'; }
function catIcon(c){ var m={Housekeeping:'🛏️',Maintenance:'🔧','Réception':'🛎️',Chambres:'🚪',Nettoyage:'🧴','Équipements':'⚙️',Fournitures:'📁'}; return m[c]||'📦'; }
function fmtXAF(n){ return Number(n||0).toLocaleString('fr-FR')+' FCFA'; }
function fmtDate(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return s; } }
function fmtDateTime(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return s; } }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stockLvl(i){ return i.quantity===0?'crit':i.quantity<=i.min_quantity?'low':'ok'; }
function setFilter(el){ filterStatus=el.dataset.fs||'all'; render(); }

/* ══ DASHBOARD ══ */
function renderDashboard(){
  var low=allItems.filter(function(i){return i.quantity<=i.min_quantity;});
  var crit=allItems.filter(function(i){return i.quantity===0;});
  var pending=allRequests.filter(function(r){return r.status==='pending';});
  var ordered=allOrders.filter(function(o){return o.status==='ordered';});
  var totalSpend=allOrders.filter(function(o){return o.status==='received';}).reduce(function(a,o){return a+(o.total_amount||0);},0);
  var h='<div class="kpi-grid">';
  h+=kpiCard('🔴',''+crit.length,'Ruptures','alert');
  h+=kpiCard('🟡',''+low.length,'Stock faible','warn');
  h+=kpiCard('📋',''+pending.length,'Demandes','');
  h+=kpiCard('💰',fmtXAF(totalSpend),'Dépenses','ok');
  h+='</div>';
  if(low.length){
    h+='<div class="sec-title">⚠️ Alertes stock</div>';
    low.forEach(function(i){ var lvl=stockLvl(i);
      h+='<div class="item-card" data-tab="inventaire" onclick="goTab(this.dataset.tab)">';
      h+='<div class="ic-icon">'+catIcon(i.category)+'</div>';
      h+='<div class="ic-body"><div class="ic-name">'+esc(i.name)+'</div><div class="ic-sub">'+esc(i.category)+'</div></div>';
      h+='<div class="ic-right"><span class="stock-badge stock-'+lvl+'">'+i.quantity+' '+esc(i.unit)+'</span></div></div>';
    });
  }
  if(ordered.length){
    h+='<div class="sec-title">🚚 Commandes en cours</div>';
    ordered.forEach(function(o){
      h+='<div class="item-card" data-tab="bons" onclick="goTab(this.dataset.tab)">';
      h+='<div class="ic-icon">🧾</div>';
      h+='<div class="ic-body"><div class="ic-name">'+esc(o.po_number||'PO-'+o.id)+'</div><div class="ic-sub">'+esc(o.supplier||'')+'</div></div>';
      h+='<div class="ic-right" style="font-size:12px;color:#10b981;font-weight:700;">'+fmtXAF(o.total_amount)+'</div></div>';
    });
  }
  h+='<div class="sec-title">🔄 Derniers mouvements</div>';
  allMovements.slice(0,4).forEach(function(m){

async function saveBon(reqId){
  var sup=document.getElementById('b_sup').value;
  var by=document.getElementById('b_by').value||getCurrentUser();
  var items=document.getElementById('b_items').value;
  var amt=parseInt(document.getElementById('b_amt').value)||0;
  var notes=document.getElementById('b_notes').value;
  if(!items){alert('Articles requis');return;}
  var poNum='PO-'+new Date().getFullYear()+'-'+String(allOrders.length+1).padStart(3,'0');
  var bon={id:Date.now(),po_number:poNum,supplier:sup,items:items,total_amount:amt,notes:notes,status:'draft',created_by:by,created_at:new Date().toISOString()};
  allOrders.unshift(bon);
  await sbPost('vz_purchase_orders',bon);
  if(reqId&&reqId!=0) await sbPatch('vz_purchase_requests',reqId,{status:'ordered'});
  closeModal(); goTab('bons');
}

function prefillFromPO(poId){
  if(!poId) return;
  var o=allOrders.find(function(x){return x.id==poId;});
  if(!o) return;
  var supEl=document.getElementById('r_sup');
  var itemsEl=document.getElementById('r_items');
  var estEl=document.getElementById('r_est');
  var realEl=document.getElementById('r_real');
  if(supEl && o.supplier){ for(var i=0;i<supEl.options.length;i++){ if(supEl.options[i].value===o.supplier){ supEl.selectedIndex=i; break; } } }
  if(itemsEl) itemsEl.value=o.items||'';
  if(estEl) estEl.value=o.total_amount||'';
  if(realEl && !realEl.value) realEl.value=o.total_amount||'';
  calcUnitPrice();
}

function calcUnitPrice(){
  var real=parseFloat(document.getElementById('r_real').value)||0;
  var qty=parseFloat(document.getElementById('r_qty').value)||1;
  var el=document.getElementById('r_unitprice');
  if(el && real>0 && qty>0){
    var unit=document.getElementById('r_unit').value;
    el.innerHTML='Prix unitaire calculé: <strong>'+fmtXAF(Math.round(real/qty))+'</strong> / '+esc(unit);
  } else if(el){ el.innerHTML=''; }
}

function previewReceipt(input){
  if(!input.files||!input.files[0]) return;
  var reader=new FileReader();
  reader.onload=function(e){ document.getElementById('r_preview').innerHTML='<img src="'+e.target.result+'" style="max-width:100%;max-height:130px;border-radius:8px;margin-top:8px">'; };
  reader.readAsDataURL(input.files[0]);
}

async function saveReception(){
  var poId=document.getElementById('r_po').value;
  var sup=document.getElementById('r_sup').value;
  var items=document.getElementById('r_items').value;
  var qty=parseFloat(document.getElementById('r_qty').value)||1;
  var unit=document.getElementById('r_unit').value;
  var est=parseFloat(document.getElementById('r_est').value)||0;
  var real=parseFloat(document.getElementById('r_real').value)||est;
  var by=document.getElementById('r_by').value||getCurrentUser();
  var notes=document.getElementById('r_notes').value;
  if(!items){alert('Articles requis');return;}

  var po=poId?allOrders.find(function(x){return x.id==poId;}):null;
  var poNum=po?po.po_number:'';

  /* Construire entrée prix */
  var itemName=items.split(' x')[0].trim()||items.trim();
  var unitPrice=qty>0?Math.round(real/qty):0;
  var priceEntry={
    id:Date.now(),
    item_name:itemName,
    supplier_name:sup,
    unit_price:unitPrice,
    unit:unit,
    quantity:qty,
    total_price:real,
    date:new Date().toISOString().split('T')[0],
    reception_id:Date.now(),
    po_number:poNum
  };

  var rec={
    id:Date.now(),
    po_id:poId||null,
    po_number:poNum,
    items:items,
    supplier_name:sup,
    estimated_amount:est,
    real_amount:real,
    received_by:by,
    notes:notes,
    received_at:new Date().toISOString(),
    price_entries:[priceEntry]
  };

  allReceptions.unshift(rec);

  /* Mettre à jour catalogue prix */
  var existIdx=allPrices.findIndex(function(p){ return p.item_name===itemName&&p.supplier_name===sup; });
  if(existIdx>=0){ allPrices[existIdx]=priceEntry; }
  else { allPrices.unshift(priceEntry); }
  savePricesLocal();

  /* Marquer PO comme reçu */
  if(po){ po.status='received'; await sbPatch('vz_purchase_orders',po.id,{status:'received'}); }

  await sbPost('vz_receptions',rec);
  try{ await sbPost('vz_price_catalog',priceEntry); }catch(e){}

  /* Notifier Finance */
  window.parent.postMessage({veraluzEvent:true,source:MID,type:'expense-created',data:{label:'Appro: '+items,amount:real,date:new Date().toISOString()}},'*');

  closeModal(); goTab('receptions');
}

/* ══ PRIX ACTUELS ══ */
function renderPrix(){
  var filtered=allPrices.filter(function(p){
    return !searchQ||p.item_name.toLowerCase().indexOf(searchQ.toLowerCase())>=0||
      (p.supplier_name||'').toLowerCase().indexOf(searchQ.toLowerCase())>=0;
  });
  var h='<div class="filter-bar">';
  h+='<div class="search-box"><span>🔍</span><input placeholder="Article ou fournisseur..." oninput="searchQ=this.value;renderPrix()" value="'+esc(searchQ)+'"></div>';
  h+='</div>';
  h+='<div class="info-box" style="margin-bottom:12px">Ces prix proviennent de vos réceptions enregistrées. Ils servent de référence pour les prochaines commandes.</div>';

  if(!filtered.length){
    h+='<div class="empty"><div class="empty-icon">🏷️</div>';
    h+='<div>Aucun prix enregistré</div>';
    h+='<div style="font-size:12px;color:#475569;margin-top:8px">Enregistrez une réception pour alimenter ce catalogue.</div></div>';
  } else {
    /* Trier par date décroissante */
    filtered.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    filtered.forEach(function(p){
      h+='<div class="prix-row">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:13px;font-weight:600;color:#f1f5f9">'+esc(p.item_name)+'</div>';
      h+='<div style="font-size:11px;color:#64748b;margin-top:2px">'+esc(p.supplier_name||'—')+'  ·  '+fmtDate(p.date)+'  ·  x'+p.quantity+' '+esc(p.unit||'')+'</div>';
      h+='<div style="font-size:11px;color:#475569;margin-top:1px">Total payé: '+fmtXAF(p.total_price)+'</div>';
      h+='</div>';
      h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">';
      h+='<span class="prix-badge">'+fmtXAF(p.unit_price)+' / '+esc(p.unit||'u.')+'</span>';
      h+='<button class="btn btn-secondary btn-sm" data-pname="'+esc(p.item_name)+'" data-psup="'+esc(p.supplier_name||'')+'" onclick="commanderDepuisPrix(this.dataset.pname,this.dataset.psup)">Commander</button>';
      h+='</div></div>';
    });
  }
  setContent(h);
}

function commanderDepuisPrix(itemName,supplierName){
  goTab('bons');
  setTimeout(function(){
    openBonModal(0);
    setTimeout(function(){
      var items=document.getElementById('b_items');
      var sup=document.getElementById('b_sup');
      if(items) items.value=itemName;
      if(sup){ for(var i=0;i<sup.options.length;i++){ if(sup.options[i].value===supplierName){ sup.selectedIndex=i; break; } } }
      /* Pré-remplir avec dernier prix connu */
      var lastP=allPrices.find(function(p){return p.item_name===itemName&&p.supplier_name===supplierName;});
      if(lastP){
        var amt=document.getElementById('b_amt');
        if(amt) amt.value=lastP.total_price||lastP.unit_price||'';
      }
    },100);
  },200);
}

/* ══ MOUVEMENTS ══ */
function renderMouvements(){
  var h='<div class="filter-bar">';

  }); }

/* ══ RAPPORTS ══ */
function renderRapports(){
  var totalSpend=allReceptions.reduce(function(a,r){return a+(r.real_amount||0);},0);
  var avgPrice=allPrices.length>0?Math.round(allPrices.reduce(function(a,p){return a+p.unit_price;},0)/allPrices.length):0;
  var h='<div class="kpi-grid">';

  h+=kpiCard('🏷️',''+allPrices.length,'Prix référencés','');
  h+=kpiCard('🔄',''+allMovements.filter(function(m){return m.type==='out';}).length,'Sorties','');

  var catMap={};

  Object.keys(catMap).sort(function(a,b){return catMap[b]-catMap[a];}).forEach(function(c){
    var p=Math.round(catMap[c]/allItems.length*100);
    h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8;margin-bottom:3px"><span>'+catIcon(c)+' '+c+'</span><span>'+catMap[c]+'</span></div>';
    h+='<div class="prog-wrap"><div class="prog-bar" style="width:'+p+'%;background:#10b981"></div></div></div>';
  });
  h+='</div>';

  h+='<div class="chart-wrap"><div class="chart-title">Historique réceptions</div>';
  if(allReceptions.length){
    allReceptions.slice(0,5).forEach(function(r){
      h+='<div class="dp-row"><span class="dp-lbl">'+esc(r.po_number||'Direct')+'</span><span class="dp-val">'+fmtXAF(r.real_amount||0)+'</span></div>';
    });
  } else { h+='<div style="color:#475569;font-size:13px">Aucune réception</div>'; }
  h+='</div>';
  setContent(h);
}

function openItemModal(id){

  h+='<div class="modal-row"><div><label>Catégorie</label><select id="m_cat">';
  CATS.forEach(function(c){ h+='<option'+(i&&i.category===c?' selected':'')+'>'+c+'</option>'; });
  h+='</select></div><div><label>Unité</label><select id="m_unit">';

  h+='</select></div></div>';
  h+='<div class="modal-row"><div><label>Quantité</label><input type="number" id="m_qty" value="'+(i?i.quantity:0)+'" min="0"></div>';

  h+='<label>Notes</label><textarea id="m_notes" rows="2">'+(i?esc(i.notes||''):'')+'</textarea>';

async function saveItem(id){
  var body={name:document.getElementById('m_name').value,category:document.getElementById('m_cat').value,unit:document.getElementById('m_unit').value,quantity:parseInt(document.getElementById('m_qty').value)||0,min_quantity:parseInt(document.getElementById('m_min').value)||0,location:document.getElementById('m_loc').value,notes:document.getElementById('m_notes').value};
  if(!body.name){alert('Nom requis');return;}
  if(id&&id!=0){ await sbPatch('vz_inventory_items',id,body); var idx=allItems.findIndex(function(x){return x.id==id;}); if(idx>=0) allItems[idx]=Object.assign(allItems[idx],body); }
  else { body.id=Date.now(); var res=await sbPost('vz_inventory_items',body); allItems.push(res&&res[0]?res[0]:body); }
  closeModal(); render();
}

function openMvtModal(itemId,type){
  var i=allItems.find(function(x){return x.id==itemId;}); if(!i) return;
  var lbl=type==='in'?'Entrée stock':'Sortie stock';
  var h='<div class="overlay" onclick="if(event.target===this)closeModal()">';
  h+='<div class="modal"><div class="modal-title">'+lbl+' — '+esc(i.name)+'</div>';
  h+='<label>Quantité</label><input type="number" id="mv_qty" value="1" min="1" style="font-size:24px;text-align:center;padding:14px">';
  h+='<label>Note</label><input id="mv_note" placeholder="Raison, destination...">';
  h+='<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Annuler</button>';
  h+='<button class="btn btn-primary" data-iid="'+i.id+'" data-type="'+type+'" onclick="saveMvt(this.dataset.iid,this.dataset.type)">Confirmer</button></div>';
  h+='</div></div>';
  showModal(h);
}
async function saveMvt(itemId,type){
  var qty=parseInt(document.getElementById('mv_qty').value)||1;
  var note=document.getElementById('mv_note').value;
  var i=allItems.find(function(x){return x.id==itemId;}); if(!i) return;
  var mvt={id:Date.now(),item_id:itemId,item_name:i.name,type:type,quantity:type==='out'?-qty:qty,note:note,user_name:getCurrentUser(),created_at:new Date().toISOString()};
  allMovements.unshift(mvt);
  if(type==='in') i.quantity+=qty; else i.quantity=Math.max(0,i.quantity-qty);
  await sbPost('vz_inventory_movements',mvt);
  await sbPatch('vz_inventory_items',itemId,{quantity:i.quantity});
  closeModal(); render();
}
