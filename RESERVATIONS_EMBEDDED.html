    '<input class="photo-url-inp" id="edit-photo-url" placeholder="Coller une URL de photo…">'+
    '<button class="btn-add-photo" onclick="addEditPhoto()">+ URL</button>'+
    '<label class="btn-add-photo" style="cursor:pointer;background:#5a6474;margin-left:4px">📁 Fichier<input type="file" accept="image/*" style="display:none" onchange="addEditPhotoFile(this)"></label>'+
    '</div></div>'+

    '<div style="display:flex;gap:8px;margin-top:14px">'+
    '<button class="btn-save-p" style="flex:1;margin-top:0" onclick="saveUnitFull()">'+(_editUnitId?'✓ Enregistrer les modifications':'✓ Créer l\'unité')+'</button>'+
    '</div>'+
    '</div>';
}

function addEditPhoto(){
  var inp = document.getElementById('edit-photo-url'); if(!inp||!inp.value.trim()) return;
  _editPhotos.push(inp.value.trim()); inp.value='';
  refreshEditPhotosGrid();
}
function addEditPhotoFile(inp){
  if(!inp||!inp.files||!inp.files[0]) return;
  var reader=new FileReader();
  reader.onload=function(e){ _editPhotos.push(e.target.result); refreshEditPhotosGrid(); inp.value=''; };
  reader.readAsDataURL(inp.files[0]);
}
function removeEditPhoto(i){
  _editPhotos.splice(i,1);
  refreshEditPhotosGrid();
}
function refreshEditPhotosGrid(){
  var g = document.getElementById('edit-photos-grid'); if(!g) return;
  g.innerHTML = _editPhotos.map(function(url,i){
    return '<div class="photo-thumb"><img src="'+esc(url)+'" onerror="this.style.display=\'none\'"><button class="photo-del" onclick="removeEditPhoto('+i+')">×</button></div>';
  }).join('');
}
function closeUnitForm(){
  var w = document.getElementById('unit-form-wrap');
  if(w){ w.style.display='none'; w.innerHTML=''; }
  _editUnitId=null; _editPhotos=[];
}
function syncRoomsCache(){
  /* Notifie tous les modules (dont Booking Engine) que les unités ont changé */
  try{
    localStorage.setItem('vlz_cache_rooms', JSON.stringify(_rooms.map(function(r){
      return {id:r.id,name:r.name,type:r.type,capacity:r.capacity,price:r.price||0,
              status:r.status||'active',description:r.description||'',
              amenities:r.amenities||[],images:r.images||[],floor:r.floor||1};
    })));
    localStorage.setItem('vlz_units_updated', String(Date.now()));
    try{ window.parent.postMessage({veraluzEvent:true,source:'veraluz-reservations',type:'units_updated'},'*'); }catch(e){}
  }catch(e){}
}

function saveUnitFull(){
  var name  = (document.getElementById('uf-name')||{}).value||'';
  if(!name.trim()){toast('Nom requis','danger');return;}
  var type   = (document.getElementById('uf-type')||{}).value||'chambre';
  var price  = parseFloat((document.getElementById('uf-price')||{}).value||0);
  var cap    = parseInt((document.getElementById('uf-cap')||{}).value||2);
  var floor  = parseInt((document.getElementById('uf-floor')||{}).value||1);
  var status = (document.getElementById('uf-status')||{}).value||'active';
  var desc   = (document.getElementById('uf-desc')||{}).value||'';
  /* Amenities */
  var amens = AMENITIES.map(function(a){
    var cb=document.getElementById('am-'+a.k);
    return (cb&&cb.checked)?a.k:null;
  }).filter(Boolean);
  var body = {
    name:name.trim(), type:type, price:price, capacity:cap,
    floor:floor, status:status, description:desc,
    amenities:amens, images:_editPhotos
  };

  var btn = document.querySelector('#unit-form-wrap .btn-save-p');
  if(btn){btn.disabled=true;btn.textContent='Enregistrement…';}

  if(_editUnitId){
    /* PATCH */
    sbPatch('veraluz_units?id=eq.'+_editUnitId, body).then(function(){
      var r=_rooms.find(function(r){return r.id===_editUnitId;});
      if(r){ Object.assign(r,body); r._images=_editPhotos.slice(); r.images=_editPhotos.slice(); }
      try{localStorage.setItem('vlz_room_images_'+_editUnitId,JSON.stringify(_editPhotos));}catch(e){}
      syncRoomsCache();
      toast('Unité mise à jour ✓','success');
      closeUnitForm(); renderParams(); renderRooms();
    }).catch(function(){
      toast('Erreur mise à jour','danger');
      if(btn){btn.disabled=false;btn.textContent='✓ Enregistrer les modifications';}
    });
  } else {
    /* POST */
    sbPost('veraluz_units', body).then(function(data){
      var saved=Array.isArray(data)?data[0]:data;
      if(saved&&saved.id){
        saved._images=_editPhotos.slice(); saved.images=_editPhotos.slice(); saved._dynStatus='available';
        seedRoomImages(saved); _rooms.push(saved);
        try{localStorage.setItem('vlz_room_images_'+saved.id,JSON.stringify(_editPhotos));}catch(e){}
        syncRoomsCache();
        toast('Unité créée ✓','success');
        closeUnitForm(); renderParams(); renderRooms(); updateBadges();
      } else {
        toast('Erreur création unité','danger');
        if(btn){btn.disabled=false;btn.textContent='✓ Créer l\'unité';}
      }
    }).catch(function(){
      toast('Erreur réseau','danger');
      if(btn){btn.disabled=false;btn.textContent='✓ Créer l\'unité';}
    });
  }
}

function deleteUnit(uid, name){
  if(!confirm('Supprimer "'+name+'" ? Cette action est irréversible.')) return;
  sbFetch('veraluz_units?id=eq.'+uid,{method:'DELETE'}).then(function(r){
    if(r.ok||r.status===204){
      _rooms=_rooms.filter(function(r){return r.id!==uid;});
      syncRoomsCache();
      toast('Unité supprimée','success'); renderParams(); renderRooms(); updateBadges();
    } else { toast('Erreur suppression','danger'); }
  }).catch(function(){toast('Erreur réseau','danger');});
}

function sbFetch(path,opts){
  return fetch(SB+'/rest/v1/'+path,Object.assign({headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'}},opts||{}));
}

function saveSettings(){
  _settings.hotel_name   =(document.getElementById('p-hotel')||{}).value||'Veraluz';
  _settings.checkin_time =(document.getElementById('p-ci-time')||{}).value||'14:00';
  _settings.checkout_time=(document.getElementById('p-co-time')||{}).value||'11:00';
  _settings.currency     =(document.getElementById('p-currency')||{}).value||'FCFA';
  _settings.whatsapp     =(document.getElementById('p-wa')||{}).value||'';
  _settings.breakfast_price=parseFloat((document.getElementById('p-bkf')||{}).value||0);
  _settings.transfer_price =parseFloat((document.getElementById('p-trf')||{}).value||0);
  _settings.tax_pct        =parseFloat((document.getElementById('p-tax')||{}).value||0);
  try{localStorage.setItem('vlz_settings',JSON.stringify(_settings));}catch(e){}
  toast('Paramètres sauvegardés ✓','success');
}

      updateBadges();
    }

    }
  });
});
