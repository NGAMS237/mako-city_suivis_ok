<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VERALUZ Intelligence IA</title>
<style>
:root{
  --bg:#0d0d1a;--bg2:#12121f;--bg3:#1a1a2e;--bg4:#22223a;--bg5:#2a2a45;
  --accent:#22d3a5;--acc2:#818cf8;--acc3:#a855f7;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(255,255,255,.07);--border2:rgba(34,211,165,.2);
  --warn:#f59e0b;--err:#f43f5e;--ok:#22d3a5;--info:#3b82f6;
  --red:#ef4444;--green:#10b981;--blue:#3b82f6;--yellow:#f59e0b;
  --orange:#f97316;--purple:#8b5cf6;--cyan:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-size:13px;}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.tb-icon{font-size:20px;}
.tb-title{font-size:15px;font-weight:700;flex:1;}
.tb-sub{font-size:11px;color:var(--text3);}
.mode-badge{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;}
.mode-mock{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
.mode-edge{background:rgba(34,211,165,.15);color:var(--accent);border:1px solid rgba(34,211,165,.3);}
/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;padding:0 12px;overflow-x:auto;flex-shrink:0;gap:2px;}
.tab{padding:10px 14px;font-size:12px;color:var(--text2);cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-badge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;
  border-radius:8px;margin-left:4px;font-weight:700;}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:16px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:13px;font-weight:700;color:var(--text);}
.sec-sub{font-size:11px;color:var(--text3);margin-top:2px;}
/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;position:relative;}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-val{font-size:24px;font-weight:700;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.kpi-icon{position:absolute;top:12px;right:12px;font-size:20px;opacity:.4;}
/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
.agent-card:hover{border-color:var(--border2);}
.ac-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.ac-icon{font-size:22px;width:40px;height:40px;border-radius:10px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ac-name{font-size:13px;font-weight:700;}
.ac-cat{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.ac-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.ac-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:12px;min-height:32px;}
.ac-meta{font-size:10px;color:var(--text3);margin-bottom:10px;}
.ac-actions{display:flex;gap:6px;flex-wrap:wrap;}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;}
.bdg-active{background:rgba(16,185,129,.12);color:var(--green);}
.bdg-draft{background:rgba(100,116,139,.12);color:var(--text2);}
.bdg-paused{background:rgba(245,158,11,.12);color:var(--yellow);}
.bdg-archived{background:rgba(239,68,68,.08);color:var(--red);}
.bdg-low{background:rgba(16,185,129,.1);color:var(--green);}
.bdg-medium{background:rgba(245,158,11,.1);color:var(--yellow);}
.bdg-high{background:rgba(239,68,68,.1);color:var(--red);}
.bdg-critical{background:rgba(168,85,247,.1);color:var(--purple);}
.bdg-pending{background:rgba(59,130,246,.1);color:var(--blue);}
.bdg-approved{background:rgba(16,185,129,.1);color:var(--green);}
.bdg-rejected{background:rgba(239,68,68,.1);color:var(--red);}
.bdg-done{background:rgba(100,116,139,.1);color:var(--text3);}
.bdg-info{background:rgba(59,130,246,.1);color:var(--blue);}
/* BUTTONS */
.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:.15s;}
.btn-primary{background:var(--accent);color:#0d0d1a;}
.btn-primary:hover{opacity:.9;}
.btn-sec{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-sec:hover{color:var(--text);background:var(--bg4);}
.btn-warn{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
.btn-warn:hover{background:rgba(245,158,11,.25);}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.btn-danger:hover{background:rgba(239,68,68,.22);}
.btn-ok{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.btn-ok:hover{background:rgba(16,185,129,.22);}
.btn-sm{padding:4px 9px;font-size:10px;}
.btn-lg{padding:10px 20px;font-size:13px;}
/* REPORT CARD */
.report-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px;}
.report-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.report-title{font-size:14px;font-weight:700;}
.report-sub{font-size:11px;color:var(--text3);}
.report-section{margin-bottom:14px;}
.report-section-title{font-size:11px;font-weight:700;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;
  display:flex;align-items:center;gap:5px;}
.metric-row{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid var(--bg4);}
.metric-row:last-child{border-bottom:none;}
.metric-lbl{font-size:12px;color:var(--text2);}
.metric-val{font-size:12px;font-weight:600;}
.alert-row{display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:7px;margin-bottom:5px;font-size:12px;}
.alert-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--yellow);}
.alert-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:var(--blue);}
.alert-ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--green);}
.rec-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
  border-radius:7px;margin-bottom:5px;background:var(--bg3);border:1px solid var(--border);}
.rec-icon{font-size:14px;margin-top:1px;}
.rec-content{flex:1;}
.rec-title{font-size:12px;font-weight:600;}
.rec-desc{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4;}
/* TABLE */
.tbl-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:11px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:9px 12px;font-size:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg3);}
td{padding:10px 12px;border-bottom:1px solid var(--bg4);font-size:12px;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
/* PROMPT EDITOR */
.prompt-editor{width:100%;min-height:200px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:12px;
  padding:12px;resize:vertical;line-height:1.6;}
.prompt-editor:focus{outline:none;border-color:var(--border2);}
/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.form-input{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:12px;}
.form-input:focus{outline:none;border-color:var(--border2);}
select.form-input option{background:var(--bg3);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-size:14px;font-weight:700;flex:1;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
/* EMPTY STATE */
.empty{padding:40px;text-align:center;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.5;}
/* LOADER */
.spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:10px 16px;font-size:12px;z-index:9999;
  box-shadow:0 8px 24px rgba(0,0,0,.4);animation:toastIn .2s ease;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* GRID 2 */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:600px){
  .g2,.kpi-grid,.cards-grid{grid-template-columns:1fr;}
  .tabs{padding:0 6px;}
  .tab{padding:8px 10px;font-size:11px;}
}
/* SECURITY BOX */
.sec-rule{display:flex;align-items:flex-start;gap:10px;padding:10px;
  background:var(--bg3);border-radius:8px;margin-bottom:6px;}
.sec-rule-icon{font-size:14px;margin-top:1px;flex-shrink:0;}
.sec-rule-text{font-size:12px;color:var(--text2);line-height:1.4;}
/* OVERVIEW GENERATE AREA */
.generate-area{background:linear-gradient(135deg,rgba(34,211,165,.06),rgba(129,140,248,.06));
  border:1px solid var(--border2);border-radius:12px;padding:20px;margin-bottom:16px;
  display:flex;align-items:center;gap:16px;}
.generate-icon{font-size:36px;flex-shrink:0;}
.generate-text{flex:1;}
.generate-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.generate-sub{font-size:12px;color:var(--text3);line-height:1.4;}
/* VERSION TAG */
.vtag{background:var(--bg4);color:var(--text3);padding:1px 6px;border-radius:4px;font-size:10px;font-family:monospace;}
/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="tb-icon">🧠</span>
  <div style="flex:1">
    <div class="tb-title">VERALUZ Intelligence IA</div>
    <div class="tb-sub">Agents configurables · Mode mock · Validation humaine obligatoire</div>
  </div>
  <span class="mode-badge mode-mock" id="mode-badge">⚙ MOCK</span>
  <div id="tb-user" style="font-size:11px;color:var(--text3);"></div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs-bar"></div>

<!-- CONTENT -->
<div class="content" id="content">
  <div class="tab-pane active" id="pane-overview"></div>
  <div class="tab-pane" id="pane-agents"></div>
  <div class="tab-pane" id="pane-reports"></div>
  <div class="tab-pane" id="pane-recommendations"></div>
  <div class="tab-pane" id="pane-prompts"></div>
  <div class="tab-pane" id="pane-history"></div>
  <div class="tab-pane" id="pane-guide"></div>
  <div class="tab-pane" id="pane-settings"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="modal-title">—</span>
      <button class="btn btn-sec btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

/* ── Supabase helpers ────────────────────────────────────────── */
function sbGet(path) {
  return fetch(SB + path, {
    headers:{ apikey:KEY, Authorization:'Bearer '+KEY, Accept:'application/json' }
  }).then(function(r){ return r.ok ? r.json() : []; }).catch(function(){ return []; });
}
function sbPost(table, data) {
  return fetch(SB+'/rest/v1/'+table, {
    method:'POST', headers:{ apikey:KEY, Authorization:'Bearer '+KEY,
      'Content-Type':'application/json', Prefer:'return=representation' },
    body:JSON.stringify(data)
  }).then(function(r){
    _sbAvailable = r.ok || r.status < 500; /* PROMPT 016B — tracker disponibilité */
    return r.json();
  }).catch(function(e){
    _sbAvailable = false; /* PROMPT 016B — Supabase indisponible */
    console.warn('[AI]',e);
    return null;
  });
}
function sbPatch(table, filter, data) {
  return fetch(SB+'/rest/v1/'+table+'?'+filter, {
    method:'PATCH', headers:{ apikey:KEY, Authorization:'Bearer '+KEY,
      'Content-Type':'application/json', Prefer:'return=representation' },
    body:JSON.stringify(data)
  }).then(function(r){ return r.json(); }).catch(function(e){ console.warn('[AI]',e); return null; });
}

/* ── Mock Report Generation ──────────────────────────────────── */
function runDirectorReport() {
  if (_loadingReport) return;
  _loadingReport = true;
  var btn = document.getElementById('btn-generate');
  var modeLabel = VERALUZ_AI_MODE === 'edge' ? 'IA Réelle' : 'MOCK';
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span> Génération '+modeLabel+'…'; }
  var reportArea = document.getElementById('report-area');
  if (reportArea) reportArea.innerHTML = '<div class="empty"><div class="empty-icon"><span class="spin" style="font-size:32px;">⟳</span></div><div class="empty-title">Analyse en cours…</div><div class="empty-sub">Mode '+modeLabel+' · Chargement données Supabase</div></div>';

  /* SÉCURITÉ : aucune clé IA ici — mode edge passe par Edge Function serveur */
  if (VERALUZ_AI_MODE === 'edge') {
    runDirectorReportEdge();
    return;
  }

  /* Essai snapshot parent */
  var parentSnap = null;
  try { parentSnap = window.parent.VeraluzAnalyticsSnapshot; } catch(e){}
  /* PROMPT 016B — Fallback snapshot en mode standalone (pas de Core parent) */
  if (!parentSnap && AI_CENTER_STANDALONE_PREVIEW) {
    parentSnap = {
      reservations: { today: 0, arrivals: 0, departures: 0, occupancy_rate: 0 },
      revenues: { total: 0, pending: 0 },
      expenses: { total: 0 },
      housekeeping: { pending: 0, urgent: 0 },
      food: { pending_orders: 0, delayed_orders: 0 },
      hr: { active_employees: 0 },
      alerts: [
        { priority:'normal', title:'Mode aperçu', description:'Données réelles Analytics non disponibles en mode standalone.' }
      ],
      _standalone_mock: true
    };
  }

  /* Charger données Supabase */
  Promise.all([
    sbGet('/rest/v1/veraluz_reservations?select=id,status,check_in,check_out,client_name,unit_id&order=created_at.desc&limit=100'),
    sbGet('/rest/v1/veraluz_payments?select=id,status,amount,client_name&order=created_at.desc&limit=200'),
    sbGet('/rest/v1/veraluz_employees?select=id,status,full_name,role&limit=100'),
    sbGet('/rest/v1/veraluz_housekeeping_tasks?select=id,status,unit_id&limit=200').catch(function(){ return []; }),
    sbGet('/rest/v1/veraluz_food_orders?select=id,status,total_amount&order=created_at.desc&limit=100').catch(function(){ return []; }),
    sbGet('/rest/v1/veraluz_units?select=id,status,name&limit=50').catch(function(){ return []; })
  ]).then(function(results) {
    var reservations = Array.isArray(results[0]) ? results[0] : [];
    var payments     = Array.isArray(results[1]) ? results[1] : [];
    var employees    = Array.isArray(results[2]) ? results[2] : [];
    var housekeeping = Array.isArray(results[3]) ? results[3] : [];
    var foodOrders   = Array.isArray(results[4]) ? results[4] : [];
    var units        = Array.isArray(results[5]) ? results[5] : [];

    var report = buildMockReport(parentSnap, reservations, payments, employees, housekeeping, foodOrders, units);
    _reportData = report;

    /* Enregistrer dans veraluz_ai_agent_runs */
    return sbPost('veraluz_ai_agent_runs', {
      agent_key: 'daily_director',
      run_type: 'daily_report',
      status: 'completed',
      input_snapshot_json: parentSnap || { source:'direct_supabase' },
      output_json: report,
      output_text: report.summary,
      recommendations_json: report.recommendations || [],
      created_by: _currentUser.username || 'ai_center'
    }).then(function(savedRun) {
      /* Enregistrer recommandations dans veraluz_ai_recommendations */
      var recs = report.recommendations || [];
      if (recs.length > 0) {
        return Promise.all(recs.map(function(rec) {
          return sbPost('veraluz_ai_recommendations', {
            agent_key: 'daily_director',
            category: rec.category || 'general',
            title: rec.title,
            description: rec.description,
            priority: rec.priority || 'normal',
            status: 'pending',
            requires_approval: true,
            related_module: rec.module || 'dashboard',
            suggested_action: rec.action || null
          });
        }));
      }
      return null;
    });
  }).then(function() {
    var ra = document.getElementById('report-area');
    if (ra) ra.innerHTML = renderReportHTML(_reportData);
    loadRuns(); loadRecs();
    /* PROMPT 016B — Badge sauvegarde conditionnel */
    var saveMsg = _sbAvailable
      ? 'Rapport généré et sauvegardé Supabase ✓'
      : 'Rapport généré · Non sauvegardé (Supabase indisponible)';
    showToast(saveMsg, _sbAvailable ? 'ok' : 'warn');
    if (!_sbAvailable && AI_CENTER_STANDALONE_PREVIEW) {
      var sbNote = document.createElement('div');
      sbNote.style.cssText = 'margin-top:8px;padding:8px 12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:7px;font-size:11px;color:var(--yellow);text-align:center;';
      sbNote.textContent = '📴 Non sauvegardé — aperçu local (Supabase indisponible)';
      if (ra) ra.insertBefore(sbNote, ra.firstChild);
    }
  }).catch(function(err) {
    console.error('[AI Director]', err);
    showToast('Erreur lors de la génération','err');
  }).finally(function() {
    _loadingReport = false;
    var b = document.getElementById('btn-generate');
    if (b) { b.disabled=false; b.innerHTML='🚀 Générer rapport'; }
  });
}

/* ── Mode Edge : appel Edge Function serveur ─────────────────── */
function runDirectorReportEdge() {
  /* Essai snapshot parent (Analytics) */
  var parentSnap = null;
  try { parentSnap = window.parent.VeraluzAnalyticsSnapshot; } catch(e){}

  var payload = {
    agent_key:    'daily_director',
    run_type:     'daily_report',
    snapshot:     parentSnap || {},
    requested_by: _currentUser.username || 'ai_center_user'
  };

  fetch(VERALUZ_EF_URL, {
    method:  'POST',
    headers: { 'Content-Type':'application/json', 'apikey': KEY, 'Authorization': 'Bearer '+KEY },
    body:    JSON.stringify(payload)
  })
  .then(function(r) {
    if (!r.ok && r.status !== 200) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(data) {
    if (!data.ok) {
      /* Edge Function a répondu mais IA non configurée → fallback mock */
      var errMsg = data.error || 'Edge Function non disponible';
      showToast('⚠ '+errMsg+' — Fallback mode MOCK', 'warn');
      /* Fallback vers mock */
      runDirectorReportMockFallback(errMsg);
      return;
    }
    /* Succès IA réelle */
    _reportData = data.report;
    _reportData._edge = true;
    _reportData._provider = data.provider || 'edge';
    _reportData._run_id = data.run_id;

    var ra = document.getElementById('report-area');
    if (ra) ra.innerHTML = renderReportHTML(_reportData);
    loadRuns(); loadRecs();
    showToast('Rapport IA réel généré ('+data.provider+') ✓','ok');
    updateModeBadge('edge', data.provider);
  })
  .catch(function(err) {
    console.error('[AI Edge]', err);
    showToast('Erreur Edge Function — Fallback mode MOCK', 'warn');
    runDirectorReportMockFallback(String(err));
  })
  .finally(function() {
    _loadingReport = false;
    var b = document.getElementById('btn-generate');
    if (b) { b.disabled=false; b.innerHTML='🚀 Générer rapport'; }
  });
}

/* ── Fallback mock si Edge échoue ─────────────────────────────── */
function runDirectorReportMockFallback(reason) {
  _loadingReport = false;
  var b = document.getElementById('btn-generate');
  if (b) { b.disabled=false; b.innerHTML='🚀 Générer rapport'; }
  /* Lancer le mode mock normal */
  VERALUZ_AI_MODE = 'mock';
  showToast('Basculé en mode MOCK (Edge indisponible)', 'warn');
  runDirectorReport();
  /* Rétablir edge pour prochaine tentative */
  setTimeout(function(){ VERALUZ_AI_MODE = 'edge'; }, 5000);
}

/* ── Mettre à jour le badge mode ─────────────────────────────── */
function updateModeBadge(mode, provider) {
  var bdg = document.getElementById('mode-badge');
  if (!bdg) return;
  if (mode === 'edge') {
    bdg.className = 'mode-badge mode-edge';
    bdg.textContent = '🟢 EDGE IA' + (provider ? ' · '+provider.toUpperCase() : '');
  } else {
    bdg.className = 'mode-badge mode-mock';
    bdg.textContent = '⚙ MOCK';
  }
}


function buildMockReport(snap, reservations, payments, employees, housekeeping, foodOrders, units) {
  var now = new Date();
  var todayStr = now.toISOString().slice(0,10);
  reservations = reservations||[]; payments=payments||[]; employees=employees||[];
  housekeeping=housekeeping||[]; foodOrders=foodOrders||[]; units=units||[];

  /* ── Métriques de base ──────────────────────────────────────────── */
  var checkedIn     = reservations.filter(function(r){ return r.status==='checkedin'; }).length;
  var arrivalsToday = reservations.filter(function(r){ return r.check_in===todayStr; }).length;
  var departures    = reservations.filter(function(r){ return r.check_out===todayStr; }).length;
  var pendingPays   = payments.filter(function(p){ return p.status==='pending'; });
  var pendingAmt    = pendingPays.reduce(function(s,p){ return s+Number(p.amount||0); }, 0);
  var validatedRev  = payments.filter(function(p){ return p.status==='validated'; }).reduce(function(s,p){ return s+Number(p.amount||0); }, 0);
  var activeEmp     = employees.filter(function(e){ return e.status==='actif'; }).length;
  var pendingTasks  = housekeeping.filter(function(h){ return ['pending','in_progress'].includes(h.status); }).length;
  var urgentTasks   = housekeeping.filter(function(h){ return h.priority==='urgent'; }).length;
  var doneTasks     = housekeeping.filter(function(h){ return h.status==='done'; }).length;
  var foodPending   = foodOrders.filter(function(f){ return f.status==='pending'; }).length;
  var unitsTotal    = units.length || (snap && snap.occupancy ? snap.occupancy.units_total : 11);
  var unitsOcc      = snap ? (snap.occupancy ? snap.occupancy.units_occupied : checkedIn) : checkedIn;
  var occPct        = unitsTotal > 0 ? Math.round(unitsOcc/unitsTotal*100) : 0;

  /* Override avec snapshot Analytics si disponible */
  if (snap && snap.occupancy) { unitsOcc=snap.occupancy.units_occupied||unitsOcc; occPct=snap.occupancy.current_pct||occPct; }
  if (snap && snap.revenues)  { validatedRev=snap.revenues.all_time_validated||validatedRev; }

  var dateLabel = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var heureLabel = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  /* ── Résumé exécutif dynamique ──────────────────────────────────── */
  var summaryParts = [];
  summaryParts.push('En date du '+dateLabel+', à '+heureLabel+', la résidence affiche '+unitsOcc+' unité'+(unitsOcc>1?'s':'')+' occupée'+(unitsOcc>1?'s':'')+' sur '+unitsTotal+', soit un taux d\'occupation de '+occPct+' %.');

  if (arrivalsToday > 0 && departures > 0) {
    summaryParts.push(arrivalsToday+' arrivée'+(arrivalsToday>1?'s':'')+' et '+departures+' départ'+(departures>1?'s':'')+' sont prévus aujourd\'hui — journée de rotation complète.');
  } else if (arrivalsToday > 0) {
    summaryParts.push(arrivalsToday+' arrivée'+(arrivalsToday>1?'s sont prévues':' est prévue')+' aujourd\'hui. La priorité opérationnelle est de confirmer la disponibilité '+(arrivalsToday>1?'des unités':'de l\'unité')+', la propreté et les instructions de check-in.');
  } else if (departures > 0) {
    summaryParts.push(departures+' départ'+(departures>1?'s sont prévus':' est prévu')+' aujourd\'hui. Prévoir le nettoyage et la remise en vente des unités libérées.');
  } else {
    summaryParts.push('Aucune arrivée ni départ prévu aujourd\'hui — journée de maintenance et suivi clients en cours.');
  }

  if (validatedRev > 0) {
    summaryParts.push('Les revenus validés s\'élèvent à '+fmtXAF(validatedRev)+'.');
  } else if (pendingPays.length > 0) {
    summaryParts.push('Les revenus validés sont actuellement à 0 FCFA — '+pendingPays.length+' paiement'+(pendingPays.length>1?'s':'')+' en attente ('+fmtXAF(pendingAmt)+') nécessite'+(pendingPays.length>1?'nt':'')+ ' une vérification urgente.');
  } else {
    summaryParts.push('Aucun paiement validé ni en attente détecté pour le moment.');
  }

  if (pendingTasks > 0) {
    summaryParts.push(pendingTasks+' tâche'+(pendingTasks>1?'s housekeeping sont':' housekeeping est')+' en cours ou en attente.'+(urgentTasks>0?' Dont '+urgentTasks+' urgente'+(urgentTasks>1?'s':'')+'!':''));
  }

  if (snap && snap._standalone_mock) {
    summaryParts.push('Note : données Analytics simulées (mode aperçu standalone).');
  }

  /* ── Priorités immédiates ───────────────────────────────────────── */
  var priorities = [];
  if (arrivalsToday > 0) {
    priorities.push({ icon:'🛬', urgency:'high', text:'Vérifier '+(arrivalsToday>1?'les '+arrivalsToday+' unités attendues':'l\'unité attendue')+' : propreté, inventaire, état général' });
    priorities.push({ icon:'💳', urgency:'high', text:'Confirmer '+(arrivalsToday>1?'les paiements liés aux arrivées':'le paiement lié à l\'arrivée')+' avant check-in' });
    priorities.push({ icon:'🔑', urgency:'high', text:'Préparer les instructions de check-in et remettre les clés/codes d\'accès' });
    if (pendingTasks === 0) {
      priorities.push({ icon:'🧹', urgency:'warn', text:'Aucune tâche housekeeping créée — vérifier ou créer les tâches ménage pour les arrivées' });
    }
  }
  if (departures > 0) {
    priorities.push({ icon:'🛫', urgency:'normal', text:'Planifier le nettoyage des '+(departures>1?departures+' unités libérées':'unité libérée')+' pour remise en vente rapide' });
    priorities.push({ icon:'🔍', urgency:'normal', text:'Vérifier l\'état de '+(departures>1?'chaque unité':'l\'unité')+' à la sortie (inventaire, dommages éventuels)' });
  }
  if (occPct < 30 && unitsTotal > 0) {
    priorities.push({ icon:'📣', urgency:'warn', text:'Taux d\'occupation faible ('+occPct+'%) — envisager une action marketing ou offre spéciale' });
  }
  if (pendingPays.length > 0 && validatedRev === 0) {
    priorities.push({ icon:'💰', urgency:'high', text:pendingPays.length+' paiement'+(pendingPays.length>1?'s':'')+' en attente ('+fmtXAF(pendingAmt)+') — vérifier et relancer les clients concernés' });
  }
  if (pendingTasks > 5) {
    priorities.push({ icon:'🧹', urgency:'warn', text:pendingTasks+' tâches housekeeping en retard — contacter le responsable ménage immédiatement' });
  }
  if (activeEmp === 0) {
    priorities.push({ icon:'👥', urgency:'warn', text:'Aucun employé actif détecté — vérifier la disponibilité du personnel' });
  }
  if (foodPending > 3) {
    priorities.push({ icon:'🍽', urgency:'normal', text:foodPending+' commandes food en attente — vérifier la cuisine et les livraisons' });
  }
  if (priorities.length === 0) {
    priorities.push({ icon:'✅', urgency:'ok', text:'Aucune priorité critique détectée. Journée opérationnelle normale.' });
  }

  /* ── Alertes ────────────────────────────────────────────────────── */
  var alerts = [];
  if (pendingPays.length > 0) alerts.push({ level:'warn', icon:'⚠', text: pendingPays.length+' paiement(s) en attente — '+fmtXAF(pendingAmt) });
  if (arrivalsToday > 0)      alerts.push({ level:'info', icon:'🛬', text: arrivalsToday+' arrivée(s) prévue(s) aujourd\'hui' });
  if (departures > 0)         alerts.push({ level:'info', icon:'🛫', text: departures+' départ(s) prévu(s) aujourd\'hui' });
  if (urgentTasks > 0)        alerts.push({ level:'warn', icon:'🧹', text: urgentTasks+' tâche(s) housekeeping urgente(s)' });
  else if (pendingTasks > 3)  alerts.push({ level:'info', icon:'🧹', text: pendingTasks+' tâches housekeeping en cours/attente' });
  if (activeEmp === 0)        alerts.push({ level:'warn', icon:'👥', text: 'Aucun employé actif détecté dans Supabase' });
  if (foodPending > 3)        alerts.push({ level:'info', icon:'🍽', text: foodPending+' commandes food en attente' });
  if (alerts.length === 0)    alerts.push({ level:'ok',   icon:'✅', text: 'Aucune alerte critique — situation opérationnelle normale' });

  /* ── Recommandations enrichies ──────────────────────────────────── */
  var recs = [];
  if (pendingPays.length >= 2) recs.push({
    title:'Relancer les paiements en attente',
    description:pendingPays.length+' paiements représentent '+fmtXAF(pendingAmt)+' non encaissés. Contacter les clients concernés par SMS ou email.',
    priority:'high', category:'finance', module:'paiements',
    action:'Envoyer une relance aux clients avec paiements en attente'
  });
  if (arrivalsToday > 0) recs.push({
    title:'Préparer les arrivées du jour',
    description:arrivalsToday+' client(s) attendu(s). Vérifier disponibilité et propreté des unités, confirmer le paiement, préparer les instructions de check-in.',
    priority:'high', category:'reservations', module:'reservations',
    action:'Vérifier le statut des unités avant 14h'
  });
  if (departures > 0) recs.push({
    title:'Gérer les départs du jour',
    description:departures+' départ(s) prévu(s). Planifier le nettoyage des unités, vérifier l\'état et préparer la remise en vente.',
    priority:'normal', category:'housekeeping', module:'housekeeping',
    action:'Créer les tâches ménage pour les unités libérées'
  });
  if (pendingTasks > 5) recs.push({
    title:'Accélérer le housekeeping',
    description:pendingTasks+' tâches non terminées. Prioriser les unités avec arrivée aujourd\'hui.',
    priority: urgentTasks > 0 ? 'high' : 'normal', category:'housekeeping', module:'housekeeping',
    action:'Contacter le responsable ménage pour répartir les tâches'
  });
  if (occPct < 30 && unitsTotal > 0) recs.push({
    title:'Taux d\'occupation faible — action marketing',
    description:'Occupation actuelle : '+occPct+'% ('+unitsOcc+'/'+unitsTotal+' unités). Envisager une offre promotionnelle, relancer les plateformes ou cibler les clients réguliers.',
    priority:'normal', category:'marketing', module:'analytics',
    action:'Proposer une offre promotionnelle ou contacter les clients réguliers'
  });
  if (activeEmp === 0) recs.push({
    title:'Vérifier la disponibilité du personnel',
    description:'Aucun employé actif détecté dans la base. Confirmer la présence du personnel pour assurer le service.',
    priority:'high', category:'rh', module:'rh',
    action:'Contacter le responsable RH pour confirmer les présences'
  });

  /* ── Décisions à valider (humaines uniquement) ──────────────────── */
  var decisions = [];
  if (pendingPays.length > 0) decisions.push({ icon:'💳', text:'Valider une relance client pour les paiements en attente ('+fmtXAF(pendingAmt)+')' });
  if (occPct < 30 && unitsTotal > 0) decisions.push({ icon:'📣', text:'Valider une offre promotionnelle pour augmenter le taux d\'occupation ('+occPct+'%)' });
  if (arrivalsToday > 0) decisions.push({ icon:'🔍', text:'Valider une vérification terrain des unités avant l\'arrivée des clients' });
  if (urgentTasks > 0) decisions.push({ icon:'🧹', text:'Valider la priorisation des '+urgentTasks+' tâche(s) housekeeping urgente(s)' });
  if (departures > 0) decisions.push({ icon:'📋', text:'Valider le processus de départ et la remise en vente des unités libérées' });
  if (decisions.length === 0) decisions.push({ icon:'✅', text:'Aucune décision urgente à valider pour le moment' });

  /* ── Checklist fin de journée ───────────────────────────────────── */
  var checklist = [];
  if (arrivalsToday > 0) {
    checklist.push({ done:false, text:'Confirmer l\'arrivée du jour ('+arrivalsToday+' client'+(arrivalsToday>1?'s':'')+')', priority:'high' });
    checklist.push({ done:false, text:'Vérifier l\'unité prête (propreté, équipements, inventaire)', priority:'high' });
    checklist.push({ done:false, text:'Vérifier le paiement avant check-in', priority:'high' });
  }
  checklist.push({ done:false, text:'Vérifier l\'état housekeeping ('+pendingTasks+' tâche'+(pendingTasks>1?'s':'')+' en cours)', priority: pendingTasks > 3 ? 'high' : 'normal' });
  checklist.push({ done:false, text:'Vérifier la disponibilité du personnel ('+activeEmp+' actif'+(activeEmp>1?'s':'')+')', priority: activeEmp === 0 ? 'high' : 'normal' });
  if (departures > 0) {
    checklist.push({ done:false, text:'Vérifier les départs et état des unités libérées', priority:'normal' });
    checklist.push({ done:false, text:'Créer les tâches ménage pour remise en vente', priority:'normal' });
  }
  checklist.push({ done:false, text:'Mettre à jour le statut des réservations dans le système', priority:'normal' });
  if (pendingPays.length > 0) {
    checklist.push({ done:false, text:'Relancer les clients avec paiements en attente ('+pendingPays.length+')', priority:'high' });
  }
  if (foodPending > 0) {
    checklist.push({ done:false, text:'Vérifier les commandes food en attente ('+foodPending+')', priority:'normal' });
  }

  /* ── Situation du jour ──────────────────────────────────────────── */
  var situationScore = 'normale';
  var highCount = recs.filter(function(r){ return r.priority==='high'; }).length;
  if (highCount >= 3 || urgentTasks > 0 || (pendingPays.length > 2 && validatedRev === 0)) {
    situationScore = 'attention requise';
  } else if (highCount === 0 && occPct >= 50) {
    situationScore = 'bonne';
  }

  return {
    title: 'Rapport Directeur Quotidien',
    agent: 'daily_director',
    generated_at: now.toISOString(),
    mode: 'mock',
    using_analytics_snapshot: !!snap,
    /* Résumé exécutif */
    summary: summaryParts.join(' '),
    situation_score: situationScore,
    /* Données structurées */
    metrics: {
      reservations: { checked_in:checkedIn, arrivals_today:arrivalsToday, departures_today:departures, total:reservations.length },
      finance: { validated_revenue:validatedRev, pending_payments:pendingPays.length, pending_amount:pendingAmt },
      occupancy: { units_occupied:unitsOcc, units_total:unitsTotal, pct:occPct },
      hr: { active_employees:activeEmp, total_employees:employees.length },
      housekeeping: { pending_tasks:pendingTasks, done_tasks:doneTasks, urgent_tasks:urgentTasks },
      food: { orders_today:foodOrders.length, pending_orders:foodPending }
    },
    /* Sections opérationnelles */
    priorities: priorities,
    alerts: alerts,
    recommendations: recs,
    decisions_required: decisions,
    checklist: checklist
  };
}

function renderReportHTML(r) {
  if (!r) return '';
  var m = r.metrics||{};
  var res=m.reservations||{}; var fin=m.finance||{}; var occ=m.occupancy||{};
  var hr=m.hr||{}; var hk=m.housekeeping||{}; var food=m.food||{};

  /* Helpers locaux */
  function section(icon, title, body, extraStyle) {
    return '<div class="report-section"'+(extraStyle?' style="'+extraStyle+'"':'')+'>'+
      '<div class="report-section-title">'+icon+' '+title+'</div>'+body+'</div>';
  }
  function tag(text, color) {
    return '<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;background:'+color+';margin-right:4px;">'+text+'</span>';
  }
  function priColor(p) {
    return p==='urgent'?'rgba(239,68,68,.18)':p==='high'?'rgba(251,146,60,.15)':p==='normal'?'rgba(34,211,165,.1)':'rgba(100,116,139,.12)';
  }
  function priLabel(p) {
    var colors = {urgent:'#ef4444',high:'#fb923c',normal:'var(--accent)',low:'#64748b'};
    return '<span style="font-size:10px;font-weight:800;color:'+(colors[p]||colors.normal)+';letter-spacing:.5px;text-transform:uppercase;">'+(p||'normal')+'</span>';
  }
  function urgColor(u) {
    return u==='high'?'#ef4444':u==='warn'?'#fb923c':u==='ok'?'var(--accent)':'var(--text2)';
  }

  /* Score situation */
  var scoreColor = r.situation_score==='attention requise'?'#fb923c':r.situation_score==='bonne'?'var(--accent)':'var(--text2)';
  var scoreIcon  = r.situation_score==='attention requise'?'⚠️':r.situation_score==='bonne'?'✅':'📊';

  var html = [
    /* ── EN-TÊTE ────────────────────────────────────────────────── */
    '<div class="report-card">',
    '<div class="report-hdr">',
      '<div style="font-size:26px;">📋</div>',
      '<div style="flex:1">',
        '<div class="report-title">'+esc(r.title)+'</div>',
        '<div class="report-sub">Généré le '+fmtDate(r.generated_at)+' · Mode '+(r.mode||'MOCK').toUpperCase()+(r.using_analytics_snapshot?' · Snapshot Analytics':'· Données Supabase directes')+'</div>',
      '</div>',
      (r._edge
        ? '<span class="bdg bdg-active" style="background:rgba(34,211,165,.15);color:var(--accent)">🟢 EDGE IA'+(r._provider?' · '+r._provider.toUpperCase():'')+'</span>'
        : '<span class="bdg bdg-draft" style="font-size:11px;padding:3px 10px;">⚡ MOCK</span>'),
    '</div>',

    /* ── 1. RÉSUMÉ EXÉCUTIF ─────────────────────────────────────── */
    '<div class="report-section" style="background:rgba(34,211,165,.04);border:1px solid rgba(34,211,165,.15);border-radius:10px;padding:14px;">',
    '<div class="report-section-title" style="color:var(--accent);">📝 Résumé exécutif</div>',
    '<div style="font-size:13px;line-height:1.75;color:var(--text2);">'+esc(r.summary)+'</div>',
    '<div style="margin-top:10px;display:flex;align-items:center;gap:8px;">',
      '<span style="font-size:16px;">'+scoreIcon+'</span>',
      '<span style="font-size:12px;font-weight:700;color:'+scoreColor+';">Situation du jour : '+esc(r.situation_score||'normale')+'</span>',
    '</div>',
    '</div>',

    /* ── 2. SITUATION DU JOUR ───────────────────────────────────── */
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:4px 0;">',
    [
      { icon:'🛏', lbl:'Occupation', val:(occ.units_occupied||0)+'/'+(occ.units_total||0)+' ('+( occ.pct||0)+'%)' },
      { icon:'💰', lbl:'Revenus validés', val:fmtXAF(fin.validated_revenue||0) },
      { icon:'💳', lbl:'Paiements en att.', val:(fin.pending_payments||0)+' ('+fmtXAF(fin.pending_amount||0)+')' },
      { icon:'🛬', lbl:'Arrivées', val:res.arrivals_today||0 },
      { icon:'🛫', lbl:'Départs', val:res.departures_today||0 },
      { icon:'👥', lbl:'Personnel actif', val:(hr.active_employees||0)+'/'+(hr.total_employees||0) },
    ].map(function(k){
      return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;">'
        +'<div style="font-size:17px;margin-bottom:4px;">'+k.icon+'</div>'
        +'<div style="font-size:11px;color:var(--text3);">'+k.lbl+'</div>'
        +'<div style="font-size:14px;font-weight:700;color:var(--text1);">'+esc(String(k.val))+'</div></div>';
    }).join(''),
    '</div>',

    /* ── 3. PRIORITÉS IMMÉDIATES ────────────────────────────────── */
    r.priorities && r.priorities.length ? section('🎯','Priorités immédiates',
      r.priorities.map(function(p){
        return '<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg3);">'
          +'<span style="font-size:16px;flex-shrink:0;">'+p.icon+'</span>'
          +'<div style="flex:1;font-size:12px;color:var(--text2);">'+esc(p.text)+'</div>'
          +'<span style="flex-shrink:0;font-size:10px;font-weight:700;color:'+urgColor(p.urgency)+';">'+esc((p.urgency||'').toUpperCase())+'</span>'
          +'</div>';
      }).join('')
    ) : '',

    /* ── 4. RÉSERVATIONS ET OCCUPATION ─────────────────────────── */
    '<div class="g2">',
    section('🛏','Réservations et occupation',
      metricRow('Occupées maintenant', res.checked_in||0)+
      metricRow('Arrivées aujourd\'hui', res.arrivals_today||0)+
      metricRow('Départs aujourd\'hui', res.departures_today||0)+
      metricRow('Total réservations actives', res.total||0)+
      metricRow('Taux occupation', (occ.pct||0)+'%')
    ),
    /* ── 5. HOUSEKEEPING ──────────────────────────────────────── */
    section('🧹','Housekeeping',
      metricRow('Tâches en cours/attente', hk.pending_tasks||0)+
      metricRow('Tâches urgentes', hk.urgent_tasks||0)+
      metricRow('Tâches terminées aujourd\'hui', hk.done_tasks||0)
    ),
    '</div>',

    /* ── 6. FOOD / RESTAURANT ───────────────────────────────────── */
    '<div class="g2">',
    section('🍽','Food / Restaurant',
      metricRow('Commandes du jour', food.orders_today||0)+
      metricRow('Commandes en attente', food.pending_orders||0)
    ),
    /* ── 7. FINANCE ─────────────────────────────────────────────── */
    section('💰','Finance',
      metricRow('Revenus validés', fmtXAF(fin.validated_revenue||0))+
      metricRow('Paiements en attente', fin.pending_payments||0)+
      metricRow('Montant en attente', fmtXAF(fin.pending_amount||0))
    ),
    '</div>',

    /* ── 8. RH / PERSONNEL ──────────────────────────────────────── */
    section('👥','RH / Personnel',
      metricRow('Employés actifs', (hr.active_employees||0)+' / '+(hr.total_employees||0))
    ),

    /* ── 9. ALERTES ─────────────────────────────────────────────── */
    r.alerts && r.alerts.length ? section('⚠️','Alertes',
      r.alerts.map(function(a){
        return '<div class="alert-row alert-'+esc(a.level||'info')+'">'+esc(a.icon||'•')+' '+esc(a.text)+'</div>';
      }).join('')
    ) : '',

    /* ── 10. RECOMMANDATIONS ─────────────────────────────────────── */
    r.recommendations && r.recommendations.length ? section('💡','Recommandations',
      r.recommendations.map(function(rc){
        return '<div class="rec-row" style="background:'+priColor(rc.priority)+';border-radius:8px;padding:10px 12px;margin-bottom:8px;">'
          +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">'
          +priLabel(rc.priority)
          +'<span style="font-size:10px;color:var(--text3);">'+esc(rc.category||'general')+' · '+esc(rc.module||'')+'</span>'
          +'</div>'
          +'<div style="font-size:13px;font-weight:700;color:var(--text1);margin-bottom:3px;">'+esc(rc.title)+'</div>'
          +'<div style="font-size:12px;color:var(--text2);margin-bottom:5px;">'+esc(rc.description)+'</div>'
          +'<div style="font-size:11px;color:var(--accent);">→ '+esc(rc.action||'')+'</div>'
          +'<div style="font-size:10px;color:var(--text3);margin-top:4px;">✋ Validation humaine requise</div>'
          +'</div>';
      }).join('')+
      '<div style="font-size:11px;color:var(--text3);margin-top:4px;">💾 Recommandations enregistrées dans veraluz_ai_recommendations</div>'
    ) : '',

    /* ── 11. DÉCISIONS À VALIDER ─────────────────────────────────── */
    r.decisions_required && r.decisions_required.length ? [
      '<div class="report-section" style="background:rgba(251,146,60,.05);border:1px solid rgba(251,146,60,.2);border-radius:10px;padding:14px;">',
      '<div class="report-section-title" style="color:#fb923c;">🙋 Décisions à valider</div>',
      '<div style="font-size:11px;color:var(--text3);margin-bottom:8px;">Ces décisions nécessitent votre approbation — aucune action automatique.</div>',
      r.decisions_required.map(function(d){

          +'<span style="width:7px;height:7px;border-radius:50%;background:'+dotColor+';flex-shrink:0;"></span>'
          +'</div>';
      }).join(''),
      '<div style="font-size:10px;color:var(--text3);margin-top:6px;">● Rouge = urgent · ● Vert = normal</div>',
      '</div>'
    ].join('') : '',

    /* ── PIED — MOCK vs EDGE ────────────────────────────────────── */
    '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:4px;">',
    '<div style="font-size:11px;color:var(--text3);line-height:1.7;">',

  sbPatch('veraluz_ai_recommendations','id=eq.'+id,{
    status:'approved', approved_by:_currentUser.username||'admin', approved_at:new Date().toISOString()
  }).then(function(){ loadRecs(); showToast('Recommandation approuvée ✓','ok'); });
}
function rejectRec(id) {
  sbPatch('veraluz_ai_recommendations','id=eq.'+id,{
    status:'rejected', rejected_by:_currentUser.username||'admin', rejected_at:new Date().toISOString()
  }).then(function(){ loadRecs(); showToast('Recommandation rejetée','warn'); });

  sbPatch('veraluz_ai_recommendations','id=eq.'+id,{status:'done'})
    .then(function(){ loadRecs(); showToast('Marquée comme faite ✓','ok'); });
}

}

/* ══════════════════════════════════════════════════════════════
   MODAL — Détail agent / Éditeur prompt / Détail run
══════════════════════════════════════════════════════════════ */
function openModal(title, bodyHTML, footerHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML||'<button class="btn btn-sec" onclick="closeModal()">Fermer</button>';
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').style.display = 'none';
}

function viewAgentDetail(key) {
  var list = _agents.length > 0 ? _agents : AI_AGENTS_DEFAULT;
  var a = list.find(function(x){ return x.agent_key===key; });
  if (!a) return;
  openModal('Agent : '+a.name, [
    '<div class="ac-badges" style="margin-bottom:12px;">'+statusBdg(a.status)+riskBdg(a.risk_level)+'<span class="vtag">v'+esc(String(a.version||1))+'</span>'+(a.approval_required?'<span class="bdg bdg-pending">VALIDATION</span>':'')+'</div>',
    '<div class="form-group"><div class="form-label">Mission</div><div style="background:var(--bg3);border-radius:7px;padding:10px;font-size:12px;color:var(--text2);">'+esc(a.description||'—')+'</div></div>',
    '<div class="form-group"><div class="form-label">Sources de données</div><div style="font-size:11px;color:var(--text3);">'+((a.data_sources_json&&a.data_sources_json.sources)||[]).map(function(s){ return '<span class="bdg bdg-info" style="margin:2px;">'+esc(s)+'</span>'; }).join(' ')+'</div></div>',
    '<div class="form-group"><div class="form-label" style="color:var(--green);">Actions autorisées</div><div>'+((a.allowed_actions_json&&a.allowed_actions_json.actions)||[]).map(function(x){ return '<span class="bdg bdg-active" style="margin:2px;">'+esc(x)+'</span>'; }).join(' ')+'</div></div>',
    '<div class="form-group"><div class="form-label" style="color:var(--red);">Actions interdites</div><div>'+((a.forbidden_actions_json&&a.forbidden_actions_json.actions)||[]).map(function(x){ return '<span class="bdg bdg-rejected" style="margin:2px;">'+esc(x)+'</span>'; }).join(' ')+'</div></div>',
  ].join(''),
  '<button class="btn btn-sec" onclick="closeModal()">Fermer</button><button class="btn btn-warn" onclick="closeModal();openPromptEditor(\''+esc(key)+'\')">✏ Modifier prompt</button>');
}

function openPromptEditor(key) {
  var list = _agents.length > 0 ? _agents : AI_AGENTS_DEFAULT;
  var a = list.find(function(x){ return x.agent_key===key; });
  if (!a) return;
  openModal('Modifier Prompt — '+a.name, [
    '<div style="font-size:11px;color:var(--yellow);background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:7px;padding:8px;margin-bottom:12px;">⚠ Toute modification incrémente la version (actuellement v'+esc(String(a.version||1))+' → v'+(esc(String((a.version||1)+1)))+').</div>',
    '<div class="form-group"><div class="form-label">Statut</div>',
    '<select class="form-input" id="edit-status" style="width:160px;">',
      ['draft','active','paused','archived'].map(function(s){ return '<option value="'+s+'"'+(a.status===s?' selected':'')+'>'+s+'</option>'; }).join(''),
    '</select></div>',
    '<div class="form-group"><div class="form-label">Prompt système</div>',
    '<textarea class="prompt-editor" id="edit-prompt" rows="10">'+esc(a.system_prompt||'')+'</textarea></div>',
  ].join(''),
  '<button class="btn btn-sec" onclick="closeModal()">Annuler</button><button class="btn btn-primary" onclick="savePrompt(\''+esc(key)+'\','+esc(String(a.version||1))+')">💾 Enregistrer + v'+(Number(a.version||1)+1)+'</button>');
}

function savePrompt(key, curVersion) {
  var newPrompt = document.getElementById('edit-prompt').value;
  var newStatus = document.getElementById('edit-status').value;
  var newVersion = (Number(curVersion)||1) + 1;
  var data = { system_prompt:newPrompt, status:newStatus, version:newVersion, updated_at:new Date().toISOString() };

  var list = _agents.length > 0 ? _agents : AI_AGENTS_DEFAULT;
  var a = list.find(function(x){ return x.agent_key===key; });
  var agentId = a ? a.id : null;

  var savePromise;
  if (agentId) {
    savePromise = sbPatch('veraluz_ai_agents','id=eq.'+agentId, data);
  } else {
    /* Agent local seulement — mise à jour locale */
    if (a) { a.system_prompt=newPrompt; a.status=newStatus; a.version=newVersion; }
    savePromise = Promise.resolve(null);
  }

  /* Enregistrer version dans veraluz_ai_prompt_versions (audit trail) */
  sbPost('veraluz_ai_prompt_versions',{
    agent_key: key,
    version: newVersion,
    system_prompt: newPrompt,
    data_sources_json: (a && a.data_sources_json) ? a.data_sources_json : {},
    allowed_actions_json: (a && a.allowed_actions_json) ? a.allowed_actions_json : {},
    forbidden_actions_json: (a && a.forbidden_actions_json) ? a.forbidden_actions_json : {},
    changed_by: _currentUser.username||'admin',
    change_note: 'Modification via AI Center — v'+newVersion
  });

  /* Enregistrer dans l'historique feedback */
  sbPost('veraluz_ai_feedback',{
    agent_key:key, rating:null,
    feedback_text:'Prompt modifié — version '+newVersion,
    created_by:_currentUser.username||'admin'
  });

  savePromise.then(function() {
    closeModal();
    showToast('Prompt mis à jour — v'+newVersion+' ✓','ok');
    loadAgents();
  });
}

function toggleAgentStatus(key, newStatus) {
  var list = _agents.length > 0 ? _agents : AI_AGENTS_DEFAULT;
  var a = list.find(function(x){ return x.agent_key===key; });
  if (!a) return;
  if (a.id) {
    sbPatch('veraluz_ai_agents','id=eq.'+a.id,{status:newStatus}).then(function(){ loadAgents(); showToast('Agent '+newStatus+' ✓','ok'); });
  } else {
    a.status = newStatus;
    renderAgents();
    showToast('Agent '+newStatus+' (local) ✓','ok');
  }
}

function viewRunDetail(id) {
  var r = _runs.find(function(x){ return x.id===id; });
  if (!r) return;
  var out = r.output_json || {};
  openModal('Run : '+r.agent_key, [
    '<div style="font-size:12px;color:var(--text2);margin-bottom:8px;">'+fmtDate(r.created_at)+' · Par '+esc(r.created_by||'—')+'</div>',
    statusBdg(r.status),
    '<div class="divider"></div>',
    '<div class="form-group"><div class="form-label">Résumé</div><div style="background:var(--bg3);border-radius:7px;padding:10px;font-size:12px;color:var(--text2);line-height:1.5;">'+esc(r.output_text||out.summary||'—')+'</div></div>',
    out.alerts&&out.alerts.length ? '<div class="form-group"><div class="form-label">Alertes</div>'+out.alerts.map(function(a){ return '<div class="alert-row alert-'+(a.level||'info')+'">'+esc(a.icon||'•')+' '+esc(a.text)+'</div>'; }).join('')+'</div>' : '',
  ].join(''));
}

/* ── Supabase data loaders ───────────────────────────────────── */
function loadAgents() {
  sbGet('/rest/v1/veraluz_ai_agents?select=id,agent_key,name,category,icon,description,system_prompt,data_sources_json,allowed_actions_json,forbidden_actions_json,risk_level,approval_required,status,version,created_at,updated_at&order=created_at.asc').then(function(data) {
    if (Array.isArray(data) && data.length > 0) {
      _agents = data;
    } else {
      _agents = AI_AGENTS_DEFAULT; /* Fallback vers agents par défaut */
    }
    if (_currentTab === 'agents' || _currentTab === 'prompts') renderCurrentTab();
  });
}
function loadRuns() {
  sbGet('/rest/v1/veraluz_ai_agent_runs?select=id,agent_key,run_type,status,output_text,output_json,recommendations_json,duration_ms,created_by,created_at&order=created_at.desc&limit=50').then(function(data) {
    _runs = Array.isArray(data) ? data : [];
    updateBadges();
    if (_currentTab === 'history' || _currentTab === 'reports' || _currentTab === 'overview') renderCurrentTab();
  });
}
function loadRecs() {
  sbGet('/rest/v1/veraluz_ai_recommendations?select=id,agent_key,category,title,description,priority,status,requires_approval,related_module,suggested_action,approved_by,approved_at,rejected_by,rejected_at,created_at&order=created_at.desc&limit=100').then(function(data) {
    _recs = Array.isArray(data) ? data : [];
    updateBadges();
    if (_currentTab === 'recommendations') renderCurrentTab();
  });
}

function updateBadges() {
  var cnt = pendingCount();
  var bdg = document.getElementById('badge-recommendations');
  if (!bdg) {
    var tab = document.querySelector('[data-tab="recommendations"]');
    if (tab && cnt > 0) {
      var s = document.createElement('span');
      s.className='tab-badge'; s.id='badge-recommendations'; s.textContent=cnt;
      tab.appendChild(s);
    }
  } else {
    if (cnt > 0) { bdg.textContent=cnt; bdg.style.display=''; }
    else bdg.style.display='none';
  }
}

/* ── Toast ───────────────────────────────────────────────────── */
function showToast(msg, type) {
  var colors = { ok:'var(--green)', warn:'var(--yellow)', err:'var(--red)', info:'var(--blue)' };
  var t = document.createElement('div');
  t.className='toast';
  t.style.borderLeftColor = colors[type]||colors.info;
  t.style.borderLeftWidth = '3px';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){ t.remove(); },300); }, 3000);
}
