<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Messages — Veraluz OS</title>
<style>
/* ── Base ── */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bg4:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#c9d1d9;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--err:#f85149;
  --blue:#58a6ff;--green:#3fb950;--purple:#bc8cff;--orange:#d29922;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;}
.topbar-title{font-weight:600;font-size:15px;flex:1;}
.topbar-badge{background:var(--err);color:#fff;border-radius:10px;font-size:10px;font-weight:700;
  padding:1px 6px;min-width:18px;text-align:center;}

/* ── Tab bar ── */
.tab-bar{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2);
  flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:9px 14px;font-size:12px;font-weight:500;color:var(--text2);
  border:none;background:none;cursor:pointer;white-space:nowrap;position:relative;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){background:var(--bg3);color:var(--text);}
.tbadge{position:absolute;top:6px;right:6px;background:var(--err);color:#fff;
  border-radius:8px;font-size:9px;font-weight:800;padding:0 4px;min-width:14px;text-align:center;}

/* ── Content area ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Filters bar ── */
.filters{display:flex;gap:8px;padding:10px 14px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid var(--border);background:var(--bg);}
.filter-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;}
.filter-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent);}
.filter-search{flex:1;min-width:120px;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;outline:none;}
.filter-search:focus{border-color:var(--accent);}

/* ── Message card ── */
.msg-list{display:flex;flex-direction:column;gap:0;}
.msg-card{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .15s;position:relative;}
.msg-card:hover{background:var(--bg2);}
.msg-card.unread{background:rgba(88,166,255,.04);}
.msg-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.msg-card.urgent::before{background:var(--err);}
.msg-card.high::before{background:var(--warn);}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.mc-from{font-weight:600;font-size:13px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-time{font-size:11px;color:var(--text3);flex-shrink:0;}
.mc-subject{font-size:12px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-meta{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;
  border-radius:10px;text-transform:uppercase;letter-spacing:.4px;}
.bdg-dept{background:rgba(88,166,255,.12);color:var(--blue);}
.bdg-type{background:rgba(188,140,255,.12);color:var(--purple);}
.bdg-urgent{background:rgba(248,81,73,.15);color:var(--err);}
.bdg-high{background:rgba(210,153,34,.15);color:var(--warn);}
.bdg-normal{background:var(--bg3);color:var(--text3);}
.bdg-ok{background:rgba(63,185,80,.12);color:var(--green);}
.bdg-action{background:rgba(248,81,73,.12);color:var(--err);}
.bdg-chloe{background:rgba(188,140,255,.15);color:var(--purple);}
.bdg-read{background:var(--bg3);color:var(--text3);}

/* ── Thread view ── */
.thread-view{display:flex;flex-direction:column;height:100%;}
.thread-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;}
.btn-back{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;padding:4px 8px;
  border-radius:6px;}
.btn-back:hover{background:var(--bg3);}
.thread-title{font-weight:600;font-size:13px;flex:1;}
.thread-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.bubble{max-width:82%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;}
.bubble.sent{background:rgba(88,166,255,.18);align-self:flex-end;border-bottom-right-radius:3px;}
.bubble.recv{background:var(--bg3);align-self:flex-start;border-bottom-left-radius:3px;}
.bubble.system{background:rgba(110,118,129,.12);align-self:center;text-align:center;
  font-size:11px;color:var(--text2);border-radius:6px;padding:4px 10px;}
.bubble.chloe{background:rgba(188,140,255,.15);align-self:flex-start;border-bottom-left-radius:3px;}
.bubble.urgent-msg{border-left:3px solid var(--err);}
.bub-meta{font-size:10px;color:var(--text3);margin-bottom:3px;}
.thread-compose{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);}
.compose-qr{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.compose-qr::-webkit-scrollbar{display:none;}
.qr-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;white-space:nowrap;}
.qr-btn:hover{background:var(--bg4);color:var(--text);}
.compose-row{display:flex;gap:8px;align-items:flex-end;}
.compose-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  color:var(--text);padding:8px 12px;font-size:13px;outline:none;resize:none;max-height:80px;
  font-family:inherit;}
.compose-input:focus{border-color:var(--accent);}
.btn-send{background:var(--accent);color:#0d1117;border:none;border-radius:8px;padding:8px 14px;
  cursor:pointer;font-weight:600;font-size:13px;flex-shrink:0;}
.btn-send:hover{background:#79b8ff;}
.btn-send:disabled{opacity:.4;cursor:default;}

/* ── New message modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:100;}
.modal-ov.open{display:block;}
.modal-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-radius:14px 14px 0 0;
  padding:0 16px 24px;z-index:101;max-height:80vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 14px;}
.modal-title{font-weight:700;font-size:15px;margin-bottom:14px;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;font-family:inherit;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;}
.form-select option{background:var(--bg3);}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn-cancel{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;}
.btn-primary{background:var(--accent);color:#0d1117;border:none;padding:8px 18px;
  border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}

/* ── Empty + loading ── */
.empty-state{padding:40px 20px;text-align:center;color:var(--text2);}
.empty-ico{font-size:36px;margin-bottom:10px;}
.loading{padding:24px;text-align:center;color:var(--text2);}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 18px;
  border-radius:8px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{background:var(--ok);color:#fff;}
.toast.err{background:var(--err);color:#fff;}
.toast.info{background:var(--bg4);color:var(--text);border:1px solid var(--border2);}

/* ── Draft card ── */
.draft-card{padding:12px 16px;border-bottom:1px solid var(--border);}
.draft-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
.draft-to{font-size:12px;color:var(--text2);margin:2px 0;}
.draft-subject{font-weight:600;font-size:13px;margin:2px 0;}
.draft-body{font-size:12px;color:var(--text2);margin:4px 0;max-height:40px;overflow:hidden;}
.draft-actions{display:flex;gap:8px;margin-top:8px;}
.btn-sm{padding:4px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text2);font-size:11px;cursor:pointer;font-weight:600;}
.btn-sm:hover{background:var(--bg4);color:var(--text);}
.btn-sm.ok{background:rgba(63,185,80,.12);color:var(--green);border-color:rgba(63,185,80,.3);}
.btn-sm.ok:hover{background:rgba(63,185,80,.2);}

/* ── Stats row ── */
.stats-row{display:flex;gap:0;border-bottom:1px solid var(--border);}
.stat-cell{flex:1;padding:10px 4px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-n{font-size:20px;font-weight:700;}
.stat-l{font-size:10px;color:var(--text3);margin-top:1px;}
.stat-n.err{color:var(--err);}
.stat-n.warn{color:var(--warn);}
.stat-n.ok{color:var(--green);}

/* ── Responsive ── */
@media(max-width:600px){
  .tab-btn{padding:8px 10px;font-size:11px;}
  .mc-from{font-size:12px;}
  .bubble{max-width:90%;}
  .modal-sheet{border-radius:10px 10px 0 0;}
}
@media(max-width:390px){
  .tab-btn{padding:7px 8px;font-size:10px;}
}
</style>
</head>
<body>
<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-title">💬 Messagerie Interne</div>
  <span class="topbar-badge" id="unread-badge" style="display:none">0</span>
  <button class="btn-sm" onclick="openNewMsg()" style="padding:5px 12px;background:var(--accent);color:#0d1117;border:none;font-weight:700;">+ Nouveau</button>
</div>

<!-- ── Tab bar ── -->
<div class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-tab="inbox"    onclick="switchTab('inbox',this)">📥 Réception<span class="tbadge" id="tbadge-inbox" style="display:none"></span></button>
  <button class="tab-btn"        data-tab="threads"  onclick="switchTab('threads',this)">💬 Conversations</button>
  <button class="tab-btn"        data-tab="orders"   onclick="switchTab('orders',this)">🛵 Commandes</button>
  <button class="tab-btn"        data-tab="employees" onclick="switchTab('employees',this)">👥 Employés</button>
  <button class="tab-btn"        data-tab="chloe"    onclick="switchTab('chloe',this)">🧠 Chloé<span class="tbadge" id="tbadge-chloe" style="display:none"></span></button>
  <button class="tab-btn"        data-tab="drafts"   onclick="switchTab('drafts',this)">✉️ Brouillons</button>
  <button class="tab-btn"        data-tab="archives" onclick="switchTab('archives',this)">🗂 Archives</button>
</div>

<!-- ── Content ── -->
<div class="content">
  <div class="tab-pane active" id="pane-inbox"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-threads"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-orders"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-employees"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-chloe"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-drafts"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
  <div class="tab-pane" id="pane-archives"><div class="loading"><span class="spinner"></span>Chargement…</div></div>
</div>

<!-- ── New message modal ── -->
<div class="modal-ov" id="new-msg-ov" onclick="closeNewMsg()"></div>
<div class="modal-sheet" id="new-msg-sheet" style="display:none;position:fixed;bottom:0;left:0;right:0;">
  <div class="modal-handle"></div>
  <div class="modal-title">✏️ Nouveau message</div>
  <div class="form-row">
    <div class="form-label">Destinataire / Département</div>
    <select class="form-select" id="nm-recipient">
      <option value="admin">👔 Admin / Gérant</option>
      <option value="restaurant">🍽️ Restaurant</option>
      <option value="delivery">🛵 Équipe Livraison</option>
      <option value="housekeeping">🧹 Housekeeping</option>
      <option value="rh">👥 RH</option>
      <option value="maintenance">🔧 Maintenance</option>
      <option value="all_admins">📢 Tous les admins</option>
    </select>
  </div>
  <div class="form-row">
    <div class="form-label">Contexte (optionnel)</div>
    <select class="form-select" id="nm-context">
      <option value="general">Général</option>
      <option value="order">Commande</option>
      <option value="housekeeping">Housekeeping</option>
      <option value="maintenance">Maintenance</option>
      <option value="rh">RH</option>
      <option value="finance">Finance</option>
      <option value="document">Document</option>
    </select>
  </div>
  <div class="form-row">
    <div class="form-label">Priorité</div>
    <select class="form-select" id="nm-priority">
      <option value="normal">Normal</option>
      <option value="high">⚠️ Élevé</option>
      <option value="urgent">🔴 Urgent</option>
      <option value="low">Faible</option>
    </select>
  </div>
  <div class="form-row">
    <div class="form-label">Message</div>
    <textarea class="form-textarea" id="nm-message" placeholder="Votre message…"></textarea>
  </div>
  <div class="btn-row">
    <button class="btn-cancel" onclick="closeNewMsg()">Annuler</button>
    <button class="btn-primary" onclick="submitNewMsg()">Envoyer</button>
  </div>
</div>

<!-- ── Thread view overlay ── -->
<div class="modal-ov" id="thread-ov" onclick="closeThread()"></div>
<div id="thread-panel" style="position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:90;">
  <div class="thread-header">
    <button class="btn-back" onclick="closeThread()">← Retour</button>
    <div class="thread-title" id="thread-panel-title">Conversation</div>
    <span id="thread-panel-badge" class="badge" style="display:none"></span>
  </div>
  <div class="thread-msgs" id="thread-panel-msgs"></div>
  <div class="thread-compose">
    <div class="compose-qr" id="compose-qr-btns"></div>
    <div class="compose-row">
      <textarea class="compose-input" id="compose-input" rows="1"
        placeholder="Votre message…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitThreadMsg();}"></textarea>
      <button class="btn-send" id="btn-send-msg" onclick="submitThreadMsg()">Envoyer</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="msg-toast"></div>

<script>
var MESSAGES_BUILD = 'v031-final-day-2026-06-28'; /* PROMPT 031 */
var _migration030Status = 'pending'; /* sera verifie au demarrage */
/* ──────────────────────────────────────────────────────────
   VERALUZ MESSAGES MODULE — PROMPT 030
   ────────────────────────────────────────────────────────── */
var SB  = 'https://dfdmasejsoibxrvubegu.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY';
var TENANT = 'veraluz-001';
var _currentUser = { username:'admin', role:'admin', name:'Admin' };
var _activeTab = 'inbox';
var _activeThreadId = null;
var _threadMessages = [];
var _threadContext = {};
var _allMessages = [];
var _unreadCount = 0;

/* ── Supabase helpers ── */
function H(extra){
  return Object.assign({apikey:KEY,Authorization:'Bearer '+KEY,'Content-Type':'application/json',Accept:'application/json'},extra||{});
}
function sbQ(path){
  return fetch(SB+'/rest/v1/'+path,{headers:H()}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
  });
}
function sbIns(table,data){
  return fetch(SB+'/rest/v1/'+table,{method:'POST',headers:H({Prefer:'return=representation'}),body:JSON.stringify(data)})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});
}
function sbUpd(table,filter,data){
  return fetch(SB+'/rest/v1/'+table+'?'+filter,{method:'PATCH',headers:H({Prefer:'return=minimal'}),body:JSON.stringify(data)})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);});
}

function escH(s){
  if(s===null||s===undefined)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Auth context from CORE ── */
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='auth-context'&&e.data.data){
    _currentUser = e.data.data;
  }
});

/* ── Toast ── */
function toast(msg,type){
  var el=document.getElementById('msg-toast');
  if(!el)return;
  el.textContent=msg;
  el.className='toast show '+(type||'info');
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.classList.remove('show');},2800);
}

/* ── Tab switching ── */
function switchTab(tab,btn){
  _activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  var pane=document.getElementById('pane-'+tab);
  if(pane){pane.classList.add('active');}
  loadTab(tab);
}

function loadTab(tab){
  if(tab==='inbox')      loadMessages({status:'sent',excludeArchived:true,excludeChloe:false});
  else if(tab==='threads')   loadMessageThreads();
  else if(tab==='orders')    loadDeliveryMessages();
  else if(tab==='employees') loadEmployeeMessages();
  else if(tab==='chloe')     renderChloeMessages();
  else if(tab==='drafts')    loadDrafts();
  else if(tab==='archives')  loadMessages({status:'archived'});
}

/* ────────────────────────────────────
   INBOX — loadMessages
──────────────────────────────────── */
function loadMessages(filters){
  var pane=document.getElementById('pane-'+(filters&&filters.status==='archived'?'archives':'inbox'));
  if(!pane)return;
  pane.innerHTML='<div class="loading"><span class="spinner"></span>Chargement…</div>';
  var path='veraluz_internal_messages?tenant_id=eq.'+TENANT+'&order=created_at.desc&limit=60';
  if(filters&&filters.status==='archived') path+='&status=eq.archived';
  else path+='&status=neq.archived&status=neq.cancelled';
  sbQ(path).then(function(rows){
    _allMessages=rows||[];
    _unreadCount=_allMessages.filter(function(m){return !m.read_at&&m.status==='sent';}).length;
    updateBadges();
    var toShow=_allMessages;
    if(filters&&filters.excludeChloe===false){/* tout afficher */}
    renderInboxList(pane,toShow,filters&&filters.status==='archived');
  }).catch(function(){
    pane.innerHTML='<div class="empty-state"><div class="empty-ico">📭</div>'
      +'<div>Messagerie non disponible.<br>Exécutez MIGRATION_SQL_PROMPT_030.sql</div></div>';
  });
}

function renderInboxList(pane,msgs,isArchive){
  if(!msgs||!msgs.length){
    pane.innerHTML='<div class="empty-state"><div class="empty-ico">'+(isArchive?'🗂':'📭')+'</div>'
      +'<div>'+(isArchive?'Aucun message archivé':'Aucun message')+'</div></div>';
    return;
  }
  /* Stats row */
  var unread=msgs.filter(function(m){return !m.read_at&&m.status!=='archived';}).length;
  var urgent=msgs.filter(function(m){return m.priority==='urgent';}).length;
  var action=msgs.filter(function(m){return m.requires_action&&m.action_status==='pending';}).length;
  var statsHtml='<div class="stats-row">'
    +'<div class="stat-cell"><div class="stat-n '+(unread?'err':'ok')+'">'+unread+'</div><div class="stat-l">Non lus</div></div>'
    +'<div class="stat-cell"><div class="stat-n '+(urgent?'warn':'')+'">'+urgent+'</div><div class="stat-l">Urgents</div></div>'
    +'<div class="stat-cell"><div class="stat-n '+(action?'err':'')+'">'+action+'</div><div class="stat-l">Action requise</div></div>'
    +'<div class="stat-cell"><div class="stat-n">'+msgs.length+'</div><div class="stat-l">Total</div></div>'
    +'</div>';
  var listHtml=msgs.map(function(m){return buildMsgCard(m);}).join('');
  pane.innerHTML=statsHtml+'<div class="msg-list">'+listHtml+'</div>';
}

function buildMsgCard(m){
  var isUnread=!m.read_at&&m.status!=='archived';
  var dt=m.created_at?fmtTime(m.created_at):'';
  var from=escH(senderLabel(m));
  var dept=m.department?'<span class="badge bdg-dept">'+escH(m.department)+'</span>':'';
  var prio=m.priority&&m.priority!=='normal'?'<span class="badge bdg-'+(m.priority==='urgent'?'urgent':'high')+'">'+escH(m.priority)+'</span>':'';
  var typ=m.message_type&&m.message_type!=='text'?'<span class="badge bdg-type">'+escH(m.message_type)+'</span>':'';
  var act=m.requires_action&&m.action_status==='pending'?'<span class="badge bdg-action">⚡ Action</span>':'';
  var preview=escH((m.message||'').slice(0,80));
  var cls='msg-card'+(isUnread?' unread':'')+(m.priority==='urgent'?' urgent':m.priority==='high'?' high':'');
  return '<div class="'+cls+'" onclick="openMessage(\''+escH(m.id)+'\',\''+escH(m.context_type||'general')+'\')">'
    +'<div class="mc-top"><span class="mc-from">'+from+'</span><span class="mc-time">'+dt+'</span></div>'
    +'<div class="mc-subject">'+escH(contextLabel(m))+'</div>'
    +'<div class="mc-preview">'+preview+'</div>'
    +'<div class="mc-meta">'+dept+prio+typ+act+'</div>'
    +'</div>';
}

function senderLabel(m){
  var icons={admin:'👔',manager:'👔',reception:'🏨',restaurant:'🍽️',driver:'🛵',
             housekeeping:'🧹',employee:'👤',chloe:'🧠',system:'⚙️'};
  var ico=icons[m.sender_type]||'💬';
  return ico+' '+(m.sender_name||m.sender_type||'Système');
}
function contextLabel(m){
  var map={order:'🛒 Commande',delivery:'🛵 Livraison',employee:'👤 Employé',
    housekeeping:'🧹 Housekeeping',maintenance:'🔧 Maintenance',rh:'👥 RH',
    finance:'💳 Finance',document:'🗂 Document',chloe:'🧠 Chloé',general:'💬 Général'};
  var lbl=map[m.context_type]||'💬 Général';
  if(m.context_id) lbl+=' #'+m.context_id.slice(0,8);
  return lbl;
}
function fmtTime(iso){
  var d=new Date(iso);
  var now=new Date();
  var diff=now-d;
  if(diff<60000)return 'À l\'instant';
  if(diff<3600000)return Math.floor(diff/60000)+'min';
  if(diff<86400000)return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
}

/* ── Open message → thread ── */
function openMessage(id,ctx){
  var msg=_allMessages.find(function(m){return m.id===id;});
  if(!msg)return;
  markMessageRead(id);
  var tid=msg.thread_id;
  if(tid){
    openMessageThread(tid,msg);
  } else {
    /* Afficher seul en thread view */
    openSingleMessage(msg);
  }
}

function openSingleMessage(msg){
  _threadContext={id:null,title:senderLabel(msg),contextType:msg.context_type,contextId:msg.context_id};
  document.getElementById('thread-panel-title').textContent=contextLabel(msg);
  var urgBdg=document.getElementById('thread-panel-badge');
  if(msg.priority&&msg.priority!=='normal'){
    urgBdg.textContent=msg.priority.toUpperCase();
    urgBdg.className='badge bdg-'+(msg.priority==='urgent'?'urgent':'high');
    urgBdg.style.display='';
  } else { urgBdg.style.display='none'; }
  var dt=msg.created_at?fmtTime(msg.created_at):'';
  var bubbCls='bubble recv'+(msg.priority==='urgent'?' urgent-msg':'')+' '+(msg.sender_type==='chloe'?'chloe':'');
  document.getElementById('thread-panel-msgs').innerHTML='<div class="'+bubbCls+'">'
    +'<div class="bub-meta">'+escH(senderLabel(msg))+' · '+dt+'</div>'
    +escH(msg.message||'')
    +(msg.requires_action?'<div style="margin-top:6px;font-size:11px;font-style:italic;color:var(--warn)">⚡ Action requise</div>':'')
    +'</div>';
  setupQuickReplies(msg.context_type,msg.context_id);
  document.getElementById('compose-input').value='';
  document.getElementById('thread-panel').style.display='flex';
  scrollThreadToBottom();
}

function openMessageThread(threadId,refMsg){
  _activeThreadId=threadId;
  if(refMsg) _threadContext={id:threadId,title:contextLabel(refMsg),contextType:refMsg.context_type,contextId:refMsg.context_id};

function renderThreadMessages(){
  var el=document.getElementById('thread-panel-msgs');
  if(!_threadMessages.length){
    el.innerHTML='<div class="empty-state"><div class="empty-ico">💬</div><div>Aucun message</div></div>';
    return;
  }
  var isMeType=_currentUser.role;
  el.innerHTML=_threadMessages.map(function(m){
    var isMe=m.sender_type===isMeType||m.sender_id===(_currentUser.username||'');
    var cls='bubble '+(isMe?'sent':m.sender_type==='chloe'?'chloe':m.sender_type==='system'?'system':'recv')
      +(m.priority==='urgent'?' urgent-msg':'');
    var dt=m.created_at?fmtTime(m.created_at):'';
    if(m.sender_type==='system') return '<div class="'+cls+'">'+escH(m.message||'')+'</div>';
    return '<div class="'+cls+'">'
      +'<div class="bub-meta">'+(isMe?'Vous':escH(senderLabel(m)))+' · '+dt+'</div>'
      +escH(m.message||'')
      +'</div>';
  }).join('');
  scrollThreadToBottom();
}

function submitThreadMsg(){
  var inp=document.getElementById('compose-input');
  var txt=(inp.value||'').trim();
  if(!txt)return;
  inp.value='';
  inp.disabled=true;
  var btn=document.getElementById('btn-send-msg');
  if(btn)btn.disabled=true;
  sendInternalMessage({
    thread_id:_activeThreadId||undefined,
    context_type:_threadContext.contextType||'general',
    context_id:_threadContext.contextId||undefined,
    message:txt,
    message_type:'text',
    priority:'normal'
  }).then(function(newMsg){
    if(newMsg&&newMsg.length){
      _threadMessages.push(newMsg[0]);
      renderThreadMessages();
    }
    inp.disabled=false;if(btn)btn.disabled=false;inp.focus();
  }).catch(function(){
    toast('Erreur envoi','err');
    inp.disabled=false;if(btn)btn.disabled=false;inp.value=txt;
  });
}

function closeThread(){
  document.getElementById('thread-panel').style.display='none';
  _activeThreadId=null;
  loadTab(_activeTab);
}

function scrollThreadToBottom(){
  var el=document.getElementById('thread-panel-msgs');
  if(el) setTimeout(function(){el.scrollTop=el.scrollHeight;},60);
}

/* ── Quick replies per context ── */
function setupQuickReplies(ctx,ctxId){
  var el=document.getElementById('compose-qr-btns');
  if(!el)return;
  var qrs=[];
  if(ctx==='order'||ctx==='delivery'){
    qrs=['Commande prête','En route','Livré','Client absent','Problème signalé'];
  } else if(ctx==='housekeeping'){
    qrs=['Chambre propre','Linge demandé','Maintenance signalée','En cours'];
  } else if(ctx==='maintenance'){
    qrs=['Reçu','En cours','Terminé','Besoin de pièces'];
  } else if(ctx==='rh'){
    qrs=['Document reçu','Validé','En attente de signature'];
  } else {
    qrs=['Reçu','Compris','En cours','Fait','OK'];
  }
  el.innerHTML=qrs.map(function(q){
    return '<button class="qr-btn" onclick="sendQuickReply(\''+q.replace(/'/g,"\\'")+'\')" >'+escH(q)+'</button>';
  }).join('');
}

function sendQuickReply(text){
  var inp=document.getElementById('compose-input');
  if(inp) inp.value=text;
  submitThreadMsg();
}

function loadDeliveryMessages(){
  var pane=document.getElementById('pane-orders');
  pane.innerHTML='<div class="loading"><span class="spinner"></span>Chargement…</div>';
  var today=new Date().toISOString().slice(0,10);
  // Unifier delivery_messages + internal_messages contexte order/delivery
  Promise.all([
    sbQ('veraluz_delivery_messages?tenant_id=eq.'+TENANT+'&created_at=gte.'+today+'T00:00:00&order=created_at.desc&limit=50').catch(function(){return[];}),
    sbQ('veraluz_internal_messages?tenant_id=eq.'+TENANT+'&context_type=in.(order,delivery)&order=created_at.desc&limit=30').catch(function(){return[];})
  ]).then(function(results){
    var dm=results[0]||[];
    var im=results[1]||[];
    if(!dm.length&&!im.length){
      pane.innerHTML='<div class="empty-state"><div class="empty-ico">🛵</div><div>Aucun message de livraison aujourd\'hui</div></div>';
      return;
    }
    /* Grouper delivery_messages par order_id */
    var orderGroups={};
    dm.forEach(function(m){
      var oid=m.order_id||'sans_commande';
      if(!orderGroups[oid])orderGroups[oid]=[];
      orderGroups[oid].push(m);
    });
    var html='';
    if(dm.length){
      html+='<div style="padding:8px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;">Messages Restaurant ↔ Livreur</div>';
      html+=Object.keys(orderGroups).map(function(oid){
        var msgs=orderGroups[oid];
        var last=msgs[0];
        return '<div class="msg-card" onclick="openDeliveryOrderThread(\''+escH(oid)+'\')">'
          +'<div class="mc-top"><span class="mc-from">🛵 Commande #'+escH(oid.slice(0,8))+'</span>'
          +'<span class="mc-time">'+fmtTime(last.created_at)+'</span></div>'
          +'<div class="mc-preview">'+escH((last.message||'').slice(0,60))+'</div>'
          +'<div class="mc-meta"><span class="badge bdg-dept">'+escH(msgs.length)+' message'+(msgs.length>1?'s':'')+'</span></div>'
          +'</div>';
      }).join('');
    }
    if(im.length){
      html+='<div style="padding:8px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:8px;">Messages internes commandes</div>';
      html+=im.map(function(m){return buildMsgCard(m);}).join('');
    }
    pane.innerHTML='<div class="msg-list">'+html+'</div>';
  });
}

      pane.innerHTML='<div class="empty-state"><div class="empty-ico">✉️</div><div>Brouillons non disponibles.<br>Exécutez MIGRATION_SQL_PROMPT_030.sql</div></div>';
    });
}

function buildDraftCard(d){
  var typeIco={email_client:'📧 Email client',whatsapp_client:'📱 WhatsApp client',
    email_fournisseur:'📧 Email fournisseur',whatsapp_fournisseur:'📱 WhatsApp fournisseur',
    email_employe:'📧 Email employé',note_interne:'📝 Note interne'};
  var typ=typeIco[d.draft_type]||('✉️ '+escH(d.draft_type||''));
  var dt=d.created_at?fmtTime(d.created_at):'';
  return '<div class="draft-card">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'
    +'<span class="badge bdg-type">'+typ+'</span>'
    +'<span style="font-size:11px;color:var(--text3);">'+dt+'</span></div>'
    +(d.recipient_name?'<div class="draft-to">À : '+escH(d.recipient_name)+'</div>':'')
    +(d.subject?'<div class="draft-subject">'+escH(d.subject)+'</div>':'')
    +'<div class="draft-body">'+escH((d.body||'').slice(0,200))+'</div>'
    +'<div class="draft-actions">'
    +'<button class="btn-sm" onclick="copyDraftMessage(\''+escH(d.id)+'\','+JSON.stringify(d.body).replace(/</g,'\\u003c')+')">📋 Copier</button>'
    +'<button class="btn-sm ok" onclick="markDraftSentByHuman(\''+escH(d.id)+'\')">✓ Marquer envoyé</button>'
    +'<button class="btn-sm" onclick="cancelDraft(\''+escH(d.id)+'\')">✕ Annuler</button>'
    +'</div></div>';
}

function copyDraftMessage(draftId,body){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(body).then(function(){toast('📋 Brouillon copié','ok');})
      .catch(function(){_execCopyText(body);});
  } else { _execCopyText(body); }
}
function _execCopyText(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);toast('📋 Copié','ok');
}

function markDraftSentByHuman(draftId){
  sbUpd('veraluz_chloe_drafts','id=eq.'+encodeURIComponent(draftId),
    {status:'sent_by_human',sent_at:new Date().toISOString(),updated_at:new Date().toISOString()})
    .then(function(){toast('✓ Marqué comme envoyé','ok');loadDrafts();})
    .catch(function(){toast('Erreur','err');});
}

function cancelDraft(draftId){
  if(!confirm('Annuler ce brouillon ?'))return;
  sbUpd('veraluz_chloe_drafts','id=eq.'+encodeURIComponent(draftId),
    {status:'cancelled',updated_at:new Date().toISOString()})
    .then(function(){toast('Brouillon annulé','info');loadDrafts();})
    .catch(function(){toast('Erreur','err');});
}

/* ────────────────────────────────────
   CORE FUNCTIONS
──────────────────────────────────── */
function sendInternalMessage(payload){
  /* Sécurité : jamais de service_role, jamais de PIN, jamais d'envoi automatique WA */
  var data=Object.assign({
    tenant_id:TENANT,
    sender_type:_currentUser.role||'admin',
    sender_id:_currentUser.username||'',
    sender_name:_currentUser.name||_currentUser.username||'Utilisateur',
    is_internal:true,
    status:'sent',
    created_at:new Date().toISOString()
  },payload);
  return sbIns('veraluz_internal_messages',data);
}

function markMessageRead(messageId){
  var msg=_allMessages.find(function(m){return m.id===messageId;});
  if(!msg||msg.read_at)return Promise.resolve();
  msg.read_at=new Date().toISOString();
  return sbUpd('veraluz_internal_messages','id=eq.'+encodeURIComponent(messageId),
    {read_at:msg.read_at,status:'read'}).catch(function(){});
}

function archiveMessage(messageId){
  return sbUpd('veraluz_internal_messages','id=eq.'+encodeURIComponent(messageId),
    {status:'archived',archived_at:new Date().toISOString()})
    .then(function(){toast('Message archivé','info');loadTab(_activeTab);})
    .catch(function(){toast('Erreur archivage','err');});
}

function getUnreadMessageCount(){
  return sbQ('veraluz_internal_messages?tenant_id=eq.'+TENANT+'&status=eq.sent&select=id&limit=1&read_at=is.null')
    .then(function(rows){return (rows||[]).length;}).catch(function(){return 0;});
}

function updateBadges(){
  var inboxBadge=document.getElementById('tbadge-inbox');
  var topBadge=document.getElementById('unread-badge');
  if(_unreadCount>0){
    if(inboxBadge){inboxBadge.textContent=_unreadCount>99?'99+':String(_unreadCount);inboxBadge.style.display='';}
    if(topBadge){topBadge.textContent=_unreadCount>99?'99+':String(_unreadCount);topBadge.style.display='';}
  } else {
    if(inboxBadge)inboxBadge.style.display='none';
    if(topBadge)topBadge.style.display='none';
  }
  /* Notifier le CORE parent */
  try{
    window.parent.postMessage({type:'message-count',source:'veraluz-messages',data:{unread:_unreadCount}},'*');
  }catch(e){}
}

function renderMessageBadge(){
  getUnreadMessageCount().then(function(n){
    _unreadCount=n;updateBadges();
  });
}

/* ── New message modal ── */
function openNewMsg(forcedCtx){
  if(forcedCtx){
    var sel=document.getElementById('nm-context');
    if(sel)sel.value=forcedCtx;
  }
  document.getElementById('new-msg-ov').classList.add('open');
  document.getElementById('new-msg-sheet').style.display='block';
  setTimeout(function(){document.getElementById('nm-message').focus();},150);
}
function closeNewMsg(){
  document.getElementById('new-msg-ov').classList.remove('open');
  document.getElementById('new-msg-sheet').style.display='none';
}

function submitNewMsg(){
  var recipient=document.getElementById('nm-recipient').value;
  var ctx=document.getElementById('nm-context').value;
  var priority=document.getElementById('nm-priority').value;
  var msg=(document.getElementById('nm-message').value||'').trim();
  if(!msg){toast('Message vide','err');return;}
  var deptMap={admin:'direction',restaurant:'restaurant',delivery:'delivery',
    housekeeping:'housekeeping',rh:'rh',maintenance:'maintenance',all_admins:'direction'};
  sendInternalMessage({
    context_type:ctx,
    recipient_type:recipient,
    department:deptMap[recipient]||'direction',
    message:msg,
    message_type:'text',
    priority:priority
  }).then(function(){
    toast('Message envoyé','ok');
    closeNewMsg();
    document.getElementById('nm-message').value='';
    loadTab(_activeTab);
  }).catch(function(){toast('Erreur envoi','err');});
}

/* ── createChloeMessage (appelable par AI_CENTER) ── */
function createChloeMessage(payload){
  /* payload: {message, message_type, priority, context_type, context_id, requires_action} */
  var data=Object.assign({
    sender_type:'chloe',
    sender_name:'Directrice Chloé',
    recipient_type:'admin',
    is_internal:true
  },payload,{tenant_id:TENANT});
  return sbIns('veraluz_internal_messages',data);
}

/* ── logMessageEvent — incidents → delivery_events ── */
function logMessageEvent(message){
  /* Seulement pour incidents/statuts importants */
  var eventTypes={
    'Client absent':'incident_client_absent',
    'Adresse introuvable':'incident_address_issue',
    'Problème paiement':'incident_payment',
    'Commande récupérée':'driver_picked_up',
    'Je suis en route':'driver_en_route',
    'Je suis arrivé':'driver_arrived',
    'Commande livrée':'delivery_completed',
    'Commande prête':'message_order_ready'
  };
  var evType=eventTypes[message.message]||null;
  if(!evType||!message.order_id)return Promise.resolve();
  return fetch(SB+'/rest/v1/veraluz_delivery_events',{
    method:'POST',
    headers:H({Prefer:'return=minimal'}),
    body:JSON.stringify({
      tenant_id:TENANT,
      order_id:message.order_id,
      event_type:evType,
      actor_type:message.sender_type||'driver',
      actor_id:message.sender_id||null,
      notes:'Via messagerie interne',
      created_at:new Date().toISOString()
    })
  }).catch(function(){});
}

/* ── sendDeliveryMessage ── */
function sendDeliveryMessage(orderId,message,type){
  return sbIns('veraluz_delivery_messages',{
    tenant_id:TENANT,
    order_id:orderId,
    sender_type:_currentUser.role||'admin',
    sender_id:_currentUser.username||'',
    sender_name:_currentUser.name||'',
    message:message,
    message_type:type||'text'
  });
}

──────────────────────────────────── */
document.addEventListener('DOMContentLoaded',function(){
  loadMessages({status:'sent',excludeArchived:true});
  renderMessageBadge();
  /* Polling léger toutes les 45s */
  setInterval(function(){
    if(_activeTab==='inbox')loadMessages({status:'sent',excludeArchived:true});
    else if(_activeTab==='chloe')renderChloeMessages();
    renderMessageBadge();
  },45000);
});
