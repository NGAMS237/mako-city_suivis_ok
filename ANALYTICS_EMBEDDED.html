<style>
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3347;--border:#3a3f55;--border2:#4a5068;
  --accent:#6c63ff;--accent2:#8b7fff;--accent-glow:rgba(108,99,255,.15);
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4;--orange:#f97316;--pink:#ec4899;--purple:#8b5cf6;
  --text:#e8eaf6;--text2:#9ca3af;--text3:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:14px 16px;border-bottom:1px solid var(--border);}
.logo-t{font-size:15px;font-weight:700;color:var(--accent2);}
.logo-s{font-size:10px;color:var(--text3);}
.nav{padding:6px;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:12.5px;margin-bottom:1px;transition:.15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);border:1px solid var(--border);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600;}
.nav-user{padding:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.user-av{width:32px;height:32px;border-radius:50%;background:rgba(108,99,255,.2);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.user-info{flex:1;}
.user-name{font-size:12px;font-weight:600;}
.user-role{font-size:10px;color:var(--text3);}
.remote-tag{background:rgba(108,99,255,.15);color:var(--accent2);border:1px solid rgba(108,99,255,.2);padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;}
.page-title{font-size:17px;font-weight:700;flex:1;}
.topbar-right{display:flex;align-items:center;gap:8px;}
/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:10px 14px;font-size:12.5px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab-badge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:600;}
/* Content */
.content{flex:1;overflow-y:auto;padding:16px;}
/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.kpi-val{font-size:22px;font-weight:700;margin:2px 0;}
.kpi-sub{font-size:11px;color:var(--text3);}
.kpi-trend{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;}
.trend-up{background:rgba(16,185,129,.1);color:var(--green);}
.trend-dn{background:rgba(239,68,68,.1);color:var(--red);}
.trend-neu{background:var(--bg3);color:var(--text2);}
/* Charts */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.chart-sub{font-size:11px;color:var(--text3);margin-top:6px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:700px){.g2{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}}
/* SVG chart container */
.svg-wrap{width:100%;overflow:hidden;}
/* Bars */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-lbl{font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg3);border-radius:8px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;transition:.6s;}
.bar-val{font-size:11px;font-weight:600;width:70px;text-align:right;}
/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--bg4);font-size:12.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
/* Badges */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;}
.bdg-g{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.bdg-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.bdg-y{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2);}
.bdg-b{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);}
.bdg-p{background:rgba(108,99,255,.1);color:var(--accent2);border:1px solid rgba(108,99,255,.2);}
.bdg-gr{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
/* Btns */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:.15s;}
.btn-p{background:var(--accent);color:#fff;} .btn-p:hover{background:var(--accent2);}
.btn-g{background:var(--green);color:#fff;} .btn-g:hover{opacity:.85;}
.btn-o{background:var(--bg3);border:1px solid var(--border);color:var(--text2);} .btn-o:hover{color:var(--text);background:var(--bg4);}
.btn-sm{padding:4px 8px;font-size:11px;}
/* Alert items */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-left:3px solid;border-radius:8px;margin-bottom:7px;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-cnt{flex:1;}
.alert-tit{font-weight:600;font-size:12.5px;}
.alert-msg{font-size:11px;color:var(--text2);margin-top:2px;}
.alert-time{font-size:10px;color:var(--text3);margin-top:3px;}
/* Progress ring */
.ring-wrap{display:flex;align-items:center;justify-content:center;flex-direction:column;}
.ring-val{font-size:22px;font-weight:700;}
.ring-lbl{font-size:11px;color:var(--text2);}
/* Tabs right */
.period-sel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-size:12px;}
/* Hotels grid */
.hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px;}
.hotel-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:.15s;}
.hotel-card:hover,.hotel-card.sel{border-color:var(--accent);background:var(--bg3);}
.hotel-name{font-size:14px;font-weight:600;margin-bottom:6px;}
.hotel-loc{font-size:11px;color:var(--text2);margin-bottom:10px;}
/* Donut chart */
.donut-svg{width:100px;height:100px;flex-shrink:0;}
.donut-info{flex:1;}
.donut-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.d-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-lbl{font-size:11px;color:var(--text2);flex:1;}
.d-pct{font-size:11px;font-weight:700;}
.d-bar{flex:2;height:5px;border-radius:5px;overflow:hidden;background:var(--bg3);}
.d-fill{height:100%;border-radius:5px;}
/* Sparkline container */
.spark{height:30px;width:100%;margin-top:6px;}
/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:12.5px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.show{display:flex;align-items:center;gap:7px;}
/* Timeline */
.timeline{position:relative;padding-left:18px;}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:12px;}
.tl-dot{position:absolute;left:-16px;top:3px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2);}
.tl-time{font-size:10px;color:var(--text3);}
.tl-text{font-size:12.5px;margin-top:1px;}
/* Section title */
.s-title{font-size:13px;font-weight:600;margin-bottom:12px;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;}
</style>

(function() {

  /* 1. Toast → déléguer au parent */

        window.parent.showToast(msg, type || 'info');

      console.log('[Embedded toast]', msg, type);

  /* Aussi patcher showToast si défini localement */

  /* 2. Émettre un événement vers le Core via postMessage */
  window.emitToCore = function(type, data) {
    try {
      window.parent.postMessage({
        veraluzEvent: true,
        type: type,
        data: data,
        source: window.__MODULE_NAME__ || 'embedded-module'
      }, '*');
    } catch(e) {}
  };

  /* 3. Recevoir des événements du Core */
  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.veraluzEvent) return;
    var evt = new CustomEvent('veraluz:' + e.data.type, { detail: e.data.data });
    window.dispatchEvent(evt);
  });

  /* 4. Signaler au Core que le module est chargé */
  window.addEventListener('DOMContentLoaded', function() {
    window.emitToCore('module:ready', { module: window.__MODULE_NAME__ });
  });

  /* 5. Recevoir auth-context du Core */
  window.addEventListener('message', function(ev) {
    if (!ev.data || ev.data.source !== 'veraluz-core') return;

})();

function trend(base,variance,n){
  let arr=[],v=base;
  for(let i=0;i<n;i++){v=Math.max(0,v+(Math.random()-.4)*variance);arr.push(Math.round(v));}
  return arr;
}

const totalRev30 = revenueDaily.reduce((a,b)=>a+b,0);
const totalRest30 = restaurantDaily.reduce((a,b)=>a+b,0);
const avgOcc30 = occupancyDaily.reduce((a,b)=>a+b,0)/30;

let alerts = [
  {id:1,level:'critical',cat:'payment',title:'Paiements en attente élevés',msg:'7 paiements non validés depuis plus de 24h — Montant total: 890 000 FCFA',time:'Il y a 2h',status:'active'},

  {id:4,level:'info',cat:'hr',title:'Congé Théodore Mba',msg:'Chef Housekeeping en congé jusqu\'au 21 Mai — couverture assurée',time:'Il y a 12h',status:'acknowledged'},
  {id:5,level:'info',cat:'revenue',title:'Pic de revenus Samedi',msg:'Revenus Samedi 11 Mai: 320 000 FCFA — record de la semaine',time:'Il y a 2j',status:'resolved'},
];

let generatedReports = [];
let currentTab = 'overview';

// ============================================================
// UTILS
// ============================================================
function fmt(n){return new Intl.NumberFormat('fr-FR').format(Math.round(n))+' FCFA';}
function fmtS(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'k':String(Math.round(n));}
function pct(n){return Math.round(n)+'%';}
/* toast() delegated to embedded bridge — voir le script embedded-bridge */

// ============================================================
// SVG CHARTS
// ============================================================
function lineChart(data,color,h=70){
  if(!data||data.length<2) return '';
  const max=Math.max(...data)||1,min=Math.min(...data);
  const r=max-min||1;
  const W=100,H=h;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*W;
    const y=H-((v-min)/r)*(H*.85)-(H*.075);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const area=`0,${H} `+pts+` ${W},${H}`;
  const gid='g'+color.replace('#','');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#${gid})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function barChart(data,labels,color,h=80){
  if(!data||!data.length) return '';
  const max=Math.max(...data)||1;
  const bw=100/data.length;
  const bars=data.map((v,i)=>{
    const bh=(v/max)*(h*.9);
    const x=i*bw+bw*.08;
    const y=h-bh;
    const opacity=i===data.length-1?1:0.55;
    const lbl=labels?`<text x="${(x+bw*.42).toFixed(1)}" y="${h+12}" text-anchor="middle" font-size="4.5" fill="#6b7280">${labels[i]}</text>`:'';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*.84).toFixed(1)}" height="${bh.toFixed(1)}" fill="${color}" opacity="${opacity}" rx="1.5"/>${lbl}`;
  }).join('');
  return `<svg viewBox="0 0 100 ${h+14}" style="width:100%;height:${h+14}px;" preserveAspectRatio="none">${bars}</svg>`;
}

function sparkline(data,color,h=28){
  if(!data||data.length<2)return '';
  const max=Math.max(...data)||1,min=Math.min(...data);
  const r=max-min||1;
  const pts=data.slice(-10).map((v,i,arr)=>{
    const x=(i/(arr.length-1))*100;
    const y=h-((v-min)/r)*(h*.9)-(h*.05);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 100 ${h}" style="width:100%;height:${h}px;" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ============================================================
// KPI CARD HTML
// ============================================================
function kpiCard(icon,label,value,sub,color,trendVal,series){
  const trendHtml=trendVal!=null?`<span class="kpi-trend ${trendVal>=0?'trend-up':'trend-dn'}">${trendVal>=0?'↑':'↓'} ${Math.abs(trendVal)}%</span>`:'';
  const sparkHtml=series?`<div class="spark">${sparkline(series,color)}</div>`:'';
  return `<div class="kpi-card">
    <div class="kpi-lbl"><span>${icon}</span>${label}${trendHtml}</div>
    <div class="kpi-val" style="color:${color};">${value}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
    ${sparkHtml}
  </div>`;

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

function onPeriodChange(){
  period=parseInt(document.getElementById('period-sel').value);
  render();
}

function refreshAll(){
  toast('📡 Données actualisées — connexion Supabase OK','success');
  render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  const tabs={
    overview:renderOverview,revenue:renderRevenue,occupancy:renderOccupancy,
    restaurant:renderRestaurant,guests:renderGuests,employees:renderEmployees,
    alerts:renderAlerts,reports:renderReports
  };
  const fn=tabs[currentTab]||renderOverview;
  document.getElementById('content').innerHTML=fn();
  // Update alert badge
  const activeCount=alerts.filter(a=>a.status==='active').length;
  document.getElementById('alert-badge').textContent=activeCount;
  const critCount=alerts.filter(a=>a.status==='active'&&a.level==='critical').length;
  const cb=document.getElementById('critical-alert');
  if(cb){if(critCount>0){cb.style.display='';cb.textContent=`🚨 ${critCount} critique(s)`;}else cb.style.display='none';}
}

// ALERTS
// ============================================================
function renderAlerts(){
  const active=alerts.filter(a=>a.status==='active');
  const acked=alerts.filter(a=>a.status==='acknowledged');
  const resolved=alerts.filter(a=>a.status==='resolved');
  const lc={critical:'#ef4444',warning:'#f59e0b',info:'#3b82f6'};
  const bg={critical:'rgba(239,68,68,.08)',warning:'rgba(245,158,11,.08)',info:'rgba(59,130,246,.08)'};
  const ic={critical:'🚨',warning:'⚠️',info:'ℹ️'};

  function alertHTML(a){
    return `<div class="alert-item" style="border-left-color:${lc[a.level]};background:${bg[a.level]};">
      <div class="alert-icon">${ic[a.level]}</div>
      <div class="alert-cnt">
        <div class="alert-tit" style="color:${lc[a.level]};">${a.title}</div>
        <div class="alert-msg">${a.msg}</div>
        <div class="alert-time">🕐 ${a.time} · Catégorie: ${a.cat}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">
        ${a.status==='active'?`<button class="btn btn-o btn-sm" onclick="ackAlert(${a.id})">✓ Vu</button>`:''}
        ${a.status!=='resolved'?`<button class="btn btn-o btn-sm" onclick="resolveAlert(${a.id})">✅ Résoudre</button>`:''}
      </div>
    </div>`;
  }

  return `
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">
    ${kpiCard('🔴','Critiques',String(active.filter(a=>a.level==='critical').length),'Action immédiate requise','#ef4444',null)}
    ${kpiCard('🟡','Avertissements',String(active.filter(a=>a.level==='warning').length),'À surveiller','#f59e0b',null)}
    ${kpiCard('✅','Résolues ce mois','12','Temps moyen résolution: 4h','#10b981',null)}
  </div>

  <div class="chart-wrap">
    <div class="chart-title">🔴 Alertes actives — Action requise (${active.length})</div>
    ${active.length===0?'<div style="text-align:center;padding:20px;color:var(--text3);">✅ Aucune alerte active — tout est normal</div>':active.map(alertHTML).join('')}
  </div>

  ${acked.length>0?`<div class="chart-wrap">
    <div class="chart-title">👁 Prises en compte (${acked.length})</div>
    ${acked.map(alertHTML).join('')}
  </div>`:''}

  <div class="chart-wrap">
    <div class="chart-title">⚙️ Seuils d'alertes automatiques</div>
    ${[
      {metric:'Taux occupation',seuil:'< 50%',niv:'⚠️ Warning',actuel:pct(avgOcc30),ok:avgOcc30>=50},
      {metric:'Taux occupation',seuil:'< 30%',niv:'🚨 Critique',actuel:pct(avgOcc30),ok:avgOcc30>=30},
      {metric:'Paiements en attente',seuil:'> 5',niv:'⚠️ Warning',actuel:'7',ok:false},
      {metric:'Paiements en attente',seuil:'> 10',niv:'🚨 Critique',actuel:'7',ok:true},
      {metric:'Revenus journaliers',seuil:'< 100 000 FCFA',niv:'⚠️ Warning',actuel:fmt(revenueDaily[revenueDaily.length-1]),ok:revenueDaily[revenueDaily.length-1]>=100000},
      {metric:'Stock restaurant',seuil:'Niveau critique',niv:'⚠️ Warning',actuel:'3 articles bas',ok:false},
    ].map(row=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg4);flex-wrap:wrap;">
      <span style="min-width:180px;font-size:12px;font-weight:500;">${row.metric}</span>
      <span style="min-width:120px;font-size:11px;color:var(--text2);">Seuil: ${row.seuil}</span>
      <span style="font-size:11px;">${row.niv}</span>
      <span style="margin-left:auto;font-size:11px;">Actuel: <strong>${row.actuel}</strong></span>
      <span class="bdg ${row.ok?'bdg-g':'bdg-r'}">${row.ok?'✅ OK':'⚠️ Déclenché'}</span>
    </div>`).join('')}
    <button class="btn btn-o btn-sm" style="margin-top:10px;" onclick="toast('Configuration des seuils — bientôt disponible')">⚙️ Configurer les seuils</button>
  </div>

  <div class="chart-wrap">
    <div class="chart-title">✅ Historique résolutions récentes</div>
    ${resolved.map(alertHTML).join('')}
    ${resolved.length===0?'<div style="text-align:center;padding:16px;color:var(--text3);">Aucun historique disponible</div>':''}
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function ackAlert(id){
  const a=alerts.find(x=>x.id===id);
  if(a){a.status='acknowledged';toast(`✓ Alerte prise en compte: ${a.title}`,'success');render();}
}
function resolveAlert(id){
  const a=alerts.find(x=>x.id===id);
  if(a){a.status='resolved';toast(`✅ Alerte résolue: ${a.title}`,'success');render();}
}

function genReport(type,fmt){
  const titles={daily:'Rapport Journalier',weekly:'Rapport Hebdomadaire',monthly:'Rapport Mensuel',annual:'Bilan Annuel'};
  toast(`⏳ Génération du ${titles[type]} en ${fmt.toUpperCase()}...`);
  setTimeout(()=>{
    generatedReports.unshift({
      title:`${titles[type]} — Résidence Veraluz ${new Date().toLocaleDateString('fr-FR')}`,
      type,fmt,
      size:Math.floor(Math.random()*400+100),
      time:'à l\'instant'
    });
    toast(`✅ ${titles[type]} (${fmt.toUpperCase()}) prêt — Email envoyé`,'success');
    render();
  },1500);
}
