<style>
:root {
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3347;--border:#3a3f55;--border2:#4a5068;
  --accent:#6c63ff;--accent2:#8b7fff;--accent-glow:rgba(108,99,255,.15);
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4;--orange:#f97316;--pink:#ec4899;--purple:#8b5cf6;
  --text:#e8eaf6;--text2:#9ca3af;--text3:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:14px 16px;border-bottom:1px solid var(--border);}
.logo-t{font-size:15px;font-weight:700;color:var(--accent2);}
.logo-s{font-size:10px;color:var(--text3);}
.nav{padding:6px;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:12.5px;margin-bottom:1px;transition:.15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);border:1px solid var(--border);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600;}
.nav-user{padding:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.user-av{width:32px;height:32px;border-radius:50%;background:rgba(108,99,255,.2);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.user-info{flex:1;}
.user-name{font-size:12px;font-weight:600;}
.user-role{font-size:10px;color:var(--text3);}
.remote-tag{background:rgba(108,99,255,.15);color:var(--accent2);border:1px solid rgba(108,99,255,.2);padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;}
.page-title{font-size:17px;font-weight:700;flex:1;}
.topbar-right{display:flex;align-items:center;gap:8px;}
/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
.tab{padding:10px 14px;font-size:12.5px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab-badge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:600;}
/* Content */
.content{flex:1;overflow-y:auto;padding:16px;}
/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.kpi-val{font-size:22px;font-weight:700;margin:2px 0;}
.kpi-sub{font-size:11px;color:var(--text3);}
.kpi-trend{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;}
.trend-up{background:rgba(16,185,129,.1);color:var(--green);}
.trend-dn{background:rgba(239,68,68,.1);color:var(--red);}
.trend-neu{background:var(--bg3);color:var(--text2);}
/* Charts */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.chart-sub{font-size:11px;color:var(--text3);margin-top:6px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:700px){.g2{grid-template-columns:1fr;}.kpi-grid{grid-template-columns:1fr 1fr;}}
/* SVG chart container */
.svg-wrap{width:100%;overflow:hidden;}
/* Bars */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bar-lbl{font-size:11px;color:var(--text2);width:60px;text-align:right;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg3);border-radius:8px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;transition:.6s;}
.bar-val{font-size:11px;font-weight:600;width:70px;text-align:right;}
/* Table */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--bg4);font-size:12.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
/* Badges */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;}
.bdg-g{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.bdg-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.bdg-y{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2);}
.bdg-b{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);}
.bdg-p{background:rgba(108,99,255,.1);color:var(--accent2);border:1px solid rgba(108,99,255,.2);}
.bdg-gr{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
/* Btns */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:.15s;}
.btn-p{background:var(--accent);color:#fff;} .btn-p:hover{background:var(--accent2);}
.btn-g{background:var(--green);color:#fff;} .btn-g:hover{opacity:.85;}
.btn-o{background:var(--bg3);border:1px solid var(--border);color:var(--text2);} .btn-o:hover{color:var(--text);background:var(--bg4);}
.btn-sm{padding:4px 8px;font-size:11px;}
/* Alert items */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-left:3px solid;border-radius:8px;margin-bottom:7px;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-cnt{flex:1;}
.alert-tit{font-weight:600;font-size:12.5px;}
.alert-msg{font-size:11px;color:var(--text2);margin-top:2px;}
.alert-time{font-size:10px;color:var(--text3);margin-top:3px;}
/* Progress ring */
.ring-wrap{display:flex;align-items:center;justify-content:center;flex-direction:column;}
.ring-val{font-size:22px;font-weight:700;}
.ring-lbl{font-size:11px;color:var(--text2);}
/* Tabs right */
.period-sel{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-size:12px;}
/* Hotels grid */
.hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:12px;}
.hotel-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:.15s;}
.hotel-card:hover,.hotel-card.sel{border-color:var(--accent);background:var(--bg3);}
.hotel-name{font-size:14px;font-weight:600;margin-bottom:6px;}
.hotel-loc{font-size:11px;color:var(--text2);margin-bottom:10px;}
/* Donut chart */
.donut-svg{width:100px;height:100px;flex-shrink:0;}
.donut-info{flex:1;}
.donut-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.d-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-lbl{font-size:11px;color:var(--text2);flex:1;}
.d-pct{font-size:11px;font-weight:700;}
.d-bar{flex:2;height:5px;border-radius:5px;overflow:hidden;background:var(--bg3);}
.d-fill{height:100%;border-radius:5px;}
/* Sparkline container */
.spark{height:30px;width:100%;margin-top:6px;}
/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:12.5px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.toast.show{display:flex;align-items:center;gap:7px;}
/* Timeline */
.timeline{position:relative;padding-left:18px;}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:12px;}
.tl-dot{position:absolute;left:-16px;top:3px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2);}
.tl-time{font-size:10px;color:var(--text3);}
.tl-text{font-size:12.5px;margin-top:1px;}
/* Section title */
.s-title{font-size:13px;font-weight:600;margin-bottom:12px;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;}
</style>

<body><script data-injected="embedded-bridge">
/* ═══════════════════════════════════════
   EMBEDDED BRIDGE — Communication avec Veraluz OS Core
   Injecté par create_embedded.py
═══════════════════════════════════════ */
(function() {
  'use strict';

  /* 1. Toast → déléguer au parent */
  window.toast = function(msg, type) {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.showToast(msg, type || 'info');
      }
    } catch(e) {
      console.log('[Embedded toast]', msg, type);
    }
  };

  /* Aussi patcher showToast si défini localement */
  window.showToast = window.toast;

  /* 2. Émettre un événement vers le Core via postMessage */
  window.emitToCore = function(type, data) {
    try {
      window.parent.postMessage({
        veraluzEvent: true,
        type: type,
        data: data,
        source: window.__MODULE_NAME__ || 'embedded-module'
      }, '*');
    } catch(e) {}
  };

  /* 3. Recevoir des événements du Core */
  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.veraluzEvent) return;
    var evt = new CustomEvent('veraluz:' + e.data.type, { detail: e.data.data });
    window.dispatchEvent(evt);
  });

  /* 4. Signaler au Core que le module est chargé */
  window.addEventListener('DOMContentLoaded', function() {
    window.emitToCore('module:ready', { module: window.__MODULE_NAME__ });
  });

  /* 5. Recevoir auth-context du Core */
  window.addEventListener('message', function(ev) {
    if (!ev.data || ev.data.source !== 'veraluz-core') return;
    if (ev.data.type !== 'auth-context') return;
    var d = ev.data.data || {};
    if (d.name) {
      var uname = document.getElementById('an-user-name');
      var urole = document.getElementById('an-user-role');
      if (uname) uname.textContent = d.name;
      if (urole) urole.textContent = d.roleLabel || d.role || '';
    }
  });
})();
</script>

<script>
// ============================================================
// VERALUZ ANALYTICS — v1.0.0 — Connexion Supabase réelle
// PROMPT 004 — Données authentiques, aucun chiffre inventé
// ============================================================

// ── CONFIG ──────────────────────────────────────────────────
var VC  = window.VeraluzCore || {};
var SB  = 'https://dfdmasejsoibxrvubegu.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY';
var MONTHS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

// ── UTILS ────────────────────────────────────────────────────
var fmt  = (VC && VC.fmtMoney) ? VC.fmtMoney : function(n){return new Intl.NumberFormat('fr-FR').format(Math.round(Number(n)||0))+' FCFA';};
var esc  = (VC && VC.esc)      ? VC.esc      : function(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
function fmtS(n){n=Number(n)||0;return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'k':String(Math.round(n));}
function pct(n){return Math.round(Number(n)||0)+'%';}
function toNum(v){return Number(v)||0;}
function dStr(d){return d.toISOString().slice(0,10);}

// ── RAW DATA (chargé depuis Supabase) ───────────────────────
var _reservations    = [];
var _payments        = [];
var _foodOrders      = [];
var _restaurantOrders= [];
var _employees       = [];
var _units           = [];
var _expenses        = [];
var _payroll         = [];
var _housekeeping    = [];
var _loadedAt        = null;

// ── COMPUTED GLOBALS (remplis par computeDashboard) ─────────
var revenueDaily     = [];
var restaurantDaily  = [];
var occupancyDaily   = [];
var reservationsDaily= [];
var monthlyRevenue   = [];
var totalRev30       = 0;
var totalRest30      = 0;
var avgOcc30         = 0;
var rooms            = [];   // statut par unité (computeRooms)
var emp              = [];   // employés actifs + paie (computeEmployees)
var items            = [];   // top articles restaurant (computeItems)

// ── STATE ────────────────────────────────────────────────────
var alerts           = [];
var generatedReports = [];
var currentTab       = 'overview';
var period           = 30;

// ── SUPABASE ─────────────────────────────────────────────────
async function safeFetchTable(table, query) {
  try {
    var url = SB + '/rest/v1/' + table + '?' + (query || 'select=*') + '&limit=1000';
    var res = await fetch(url, {
      headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Accept': 'application/json' }
    });
    if (!res.ok) { console.warn('[VERALUZ ANALYTICS] Table non disponible:', table, res.status); return []; }
    return await res.json();
  } catch(err) {
    console.warn('[VERALUZ ANALYTICS] Erreur:', table, err && err.message);
    return [];
  }
}

// ── COMPUTE DASHBOARD ─────────────────────────────────────────
function computeDashboard() {
  var days = period > 0 ? period : 365;
  var now  = new Date();
  var today= dStr(now);

  // Tableau des dates (du plus ancien au plus récent)
  var dates = [];
  for (var i = days - 1; i >= 0; i--) {
    var d = new Date(now); d.setDate(d.getDate() - i); dates.push(dStr(d));
  }
  var periodStart = dates[0];

  // Revenus journaliers (paiements validés)
  revenueDaily = dates.map(function(d) {
    return _payments
      .filter(function(p){ return p.status === 'validated' && p.created_at && p.created_at.slice(0,10) === d; })
      .reduce(function(s,p){ return s + toNum(p.amount); }, 0);
  });

  // F&B journaliers (food orders + restaurant orders)
  restaurantDaily = dates.map(function(d) {
    var food = _foodOrders
      .filter(function(o){ return ['delivered','out_for_delivery'].includes(o.status) && o.created_at && o.created_at.slice(0,10) === d; })
      .reduce(function(s,o){ return s + toNum(o.total); }, 0);
    var rest = _restaurantOrders
      .filter(function(o){ return o.status === 'paye' && o.created_at && o.created_at.slice(0,10) === d; })
      .reduce(function(s,o){ return s + toNum(o.total || o.total_amount); }, 0);
    return food + rest;
  });

  // Nouvelles réservations par jour
  reservationsDaily = dates.map(function(d) {
    return _reservations.filter(function(r){ return r.created_at && r.created_at.slice(0,10) === d; }).length;
  });

  // Taux d'occupation journalier
  var totalUnits = _units.filter(function(u){ return u.status === 'active'; }).length || 1;
  occupancyDaily = dates.map(function(d) {
    var occ = _reservations.filter(function(r) {
      return r.check_in && r.check_out && r.check_in <= d && r.check_out > d && r.status !== 'cancelled';
    }).length;
    return Math.min(100, Math.round(occ / totalUnits * 100));
  });

  totalRev30  = revenueDaily.reduce(function(a,b){ return a+b; }, 0);
  totalRest30 = restaurantDaily.reduce(function(a,b){ return a+b; }, 0);
  avgOcc30    = occupancyDaily.length ? occupancyDaily.reduce(function(a,b){ return a+b; },0) / occupancyDaily.length : 0;

  // Revenus mensuels (regroupement par mois/année)
  var monthMap = {};
  function addM(key,m,y){ if(!monthMap[key]) monthMap[key]={m:m,y:y,rev:0,exp:0,occ:0,guests:0}; }

  _payments.filter(function(p){ return p.status==='validated'&&p.created_at; }).forEach(function(p){
    var d=new Date(p.created_at); var k=d.getFullYear()+'-'+(d.getMonth()+1); addM(k,d.getMonth()+1,d.getFullYear());
    monthMap[k].rev += toNum(p.amount);
  });
  _foodOrders.filter(function(o){ return o.status==='delivered'&&o.created_at; }).forEach(function(o){
    var d=new Date(o.created_at); var k=d.getFullYear()+'-'+(d.getMonth()+1); addM(k,d.getMonth()+1,d.getFullYear());
    monthMap[k].rev += toNum(o.total);
  });
  _restaurantOrders.filter(function(o){ return o.status==='paye'&&o.created_at; }).forEach(function(o){
    var d=new Date(o.created_at); var k=d.getFullYear()+'-'+(d.getMonth()+1); addM(k,d.getMonth()+1,d.getFullYear());
    monthMap[k].rev += toNum(o.total||o.total_amount);
  });
  _expenses.filter(function(e){ return e.date; }).forEach(function(e){
    var d=new Date(e.date); var k=d.getFullYear()+'-'+(d.getMonth()+1); addM(k,d.getMonth()+1,d.getFullYear());
    monthMap[k].exp += toNum(e.amount);
  });
  _payroll.filter(function(p){ return p.period_month&&p.period_year; }).forEach(function(p){
    var k=p.period_year+'-'+p.period_month; addM(k,p.period_month,p.period_year);
    monthMap[k].exp += toNum(p.net_salary);
  });
  _reservations.filter(function(r){ return r.created_at; }).forEach(function(r){
    var d=new Date(r.created_at); var k=d.getFullYear()+'-'+(d.getMonth()+1); addM(k,d.getMonth()+1,d.getFullYear());
    monthMap[k].guests += toNum(r.guests)||1;
  });

  monthlyRevenue = Object.values(monthMap).sort(function(a,b){ return a.y!==b.y?a.y-b.y:a.m-b.m; });

  computeRooms();
  computeEmployees();
  computeItems();
}

function computeRooms() {
  var today = dStr(new Date());
  rooms = _units.filter(function(u){ return u.status === 'active'; }).map(function(u) {
    var cur = _reservations.find(function(r) {
      return r.unit_id === u.id && r.check_in <= today && r.check_out > today && ['checkedin','confirmed'].includes(r.status);
    });
    var nxt = _reservations.find(function(r) {
      return r.unit_id === u.id && r.check_in > today && ['confirmed','pending'].includes(r.status);
    });
    var status = 'libre', guest = null, checkin = null, checkout = null, nights = 0;
    if (cur) {
      status = 'occupée'; guest = cur.client_name; checkin = cur.check_in; checkout = cur.check_out; nights = cur.nights || 0;
    } else if (u.hk_status === 'cleaning' || u.hk_status === 'dirty') {
      status = 'nettoyage';
    } else if (nxt) {
      status = 'réservée'; guest = nxt.client_name; checkin = nxt.check_in; checkout = nxt.check_out;
    }
    return { name: u.name, type: u.type, rate: toNum(u.price), status: status, guest: guest, checkin: checkin, checkout: checkout, nights: nights };
  });
}

function computeEmployees() {
  emp = _employees.filter(function(e){ return e.status === 'actif'; }).map(function(e) {
    var slips = _payroll.filter(function(p){ return p.employee_id === e.id; })
      .sort(function(a,b){ return b.period_year!==a.period_year?b.period_year-a.period_year:b.period_month-a.period_month; });
    var latest = slips[0];
    return {
      name: e.full_name || 'N/D',
      role: e.role || 'N/D',
      status: 'present',
      pay: toNum(latest ? latest.net_salary : e.base_salary),
      days_present: null,
      days_abs: null,
      perf: null
    };
  });
}

function computeItems() {
  var itemMap = {};
  _foodOrders.filter(function(o){ return o.status === 'delivered'; }).forEach(function(o) {
    var arr = [];
    try { arr = typeof o.items === 'string' ? JSON.parse(o.items) : (Array.isArray(o.items) ? o.items : []); } catch(e){}
    if (!Array.isArray(arr)) arr = [];
    arr.forEach(function(it) {
      var key = it.name || it.id || 'Inconnu';
      if (!itemMap[key]) itemMap[key] = { name: key, cat: it.category || it.cat || 'Plat', vendu: 0, rev: 0 };
      var qty = toNum(it.qty) || 1; var price = toNum(it.price) || 0;
      itemMap[key].vendu += qty; itemMap[key].rev += price * qty;
    });
  });
  _restaurantOrders.filter(function(o){ return o.status === 'paye'; }).forEach(function(o) {
    var arr = [];
    try { arr = typeof o.items_json === 'string' ? JSON.parse(o.items_json) : (Array.isArray(o.items_json) ? o.items_json : []); } catch(e){}
    if (!Array.isArray(arr)) arr = [];
    arr.forEach(function(it) {
      var key = it.name || it.id || 'Inconnu';
      if (!itemMap[key]) itemMap[key] = { name: key, cat: 'Restaurant', vendu: 0, rev: 0 };
      var qty = toNum(it.qty) || 1; var price = toNum(it.price) || 0;
      itemMap[key].vendu += qty; itemMap[key].rev += price * qty;
    });
  });
  items = Object.values(itemMap).filter(function(it){ return it.name !== 'Inconnu'; }).sort(function(a,b){ return b.rev-a.rev; }).slice(0,8);

  // Fallback si items_json vides mais commandes existent
  if (items.length === 0) {
    var foodTotal = _foodOrders.filter(function(o){ return o.status==='delivered'; }).reduce(function(s,o){ return s+toNum(o.total); },0);
    var restTotal = _restaurantOrders.filter(function(o){ return o.status==='paye'; }).reduce(function(s,o){ return s+toNum(o.total||o.total_amount); },0);
    var fCnt = _foodOrders.filter(function(o){ return o.status==='delivered'; }).length;
    var rCnt = _restaurantOrders.filter(function(o){ return o.status==='paye'; }).length;
    if (foodTotal > 0) items.push({ name: 'Food Lounge (total commandes)', cat: 'Food', vendu: fCnt, rev: foodTotal });
    if (restTotal > 0) items.push({ name: 'Restaurant (tables)', cat: 'Restaurant', vendu: rCnt, rev: restTotal });
  }
}

// ── ALERTES BASÉES SUR LES DONNÉES RÉELLES ───────────────────
function buildAlerts() {
  alerts = [];
  var nextId = 1;
  var now    = new Date();
  var today  = dStr(now);
  var yesterday = dStr(new Date(now.getTime() - 86400000));

  // 1. Paiements en attente
  var pendPay = _payments.filter(function(p){ return p.status === 'pending'; });
  if (pendPay.length > 0) {
    var totPend = pendPay.reduce(function(s,p){ return s+toNum(p.amount); }, 0);
    alerts.push({ id: nextId++, level: pendPay.length > 5 ? 'critical' : 'warning', cat: 'paiement',
      title: pendPay.length + ' paiement(s) en attente de validation',
      msg: 'Montant total: ' + fmtS(totPend) + ' FCFA — Méthodes: ' + [...new Set(pendPay.map(function(p){return p.method||'?';}))].join(', '),
      time: 'Maintenant', status: 'active' });
  }

  // 2. Réservations avec solde impayé (checkedin/confirmed seulement)
  var unpaid = _reservations.filter(function(r) {
    if (['cancelled','checkedout'].includes(r.status)) return false;
    var paid = _payments.filter(function(p){ return p.reservation_id===r.id && p.status==='validated'; })
                        .reduce(function(s,p){ return s+toNum(p.amount); }, 0);
    return paid < toNum(r.total) * 0.95;
  });
  if (unpaid.length > 0) {
    alerts.push({ id: nextId++, level: 'warning', cat: 'paiement',
      title: unpaid.length + ' réservation(s) avec solde impayé',
      msg: unpaid.slice(0,3).map(function(r){ return esc(r.client_name)+' ('+r.check_in+')'; }).join(', '),
      time: 'Détecté maintenant', status: 'active' });
  }

  // 3. Chambres sans ménage après départs hier
  var depYest = _reservations.filter(function(r){ return r.check_out === yesterday && r.status === 'checkedout'; });
  if (depYest.length > 0) {
    var unclean = depYest.filter(function(r) {
      return !_housekeeping.some(function(h){
        return h.unit_id === r.unit_id && h.status === 'done' && (h.scheduled_for === today || h.scheduled_for === yesterday);
      });
    });
    if (unclean.length > 0) {
      alerts.push({ id: nextId++, level: 'warning', cat: 'housekeeping',
        title: unclean.length + ' chambre(s) en attente de nettoyage post-départ',
        msg: 'Départs hier: ' + depYest.map(function(r){ return r.unit_id; }).join(', '),
        time: 'Hier', status: 'active' });
    }
  }

  // 4. Commandes Food Lounge bloquées > 2h
  var stuckFood = _foodOrders.filter(function(o) {
    return ['pending','confirmed','preparing'].includes(o.status) && o.created_at && (now - new Date(o.created_at)) > 7200000;
  });
  if (stuckFood.length > 0) {
    alerts.push({ id: nextId++, level: 'warning', cat: 'restaurant',
      title: stuckFood.length + ' commande(s) Food Lounge bloquée(s) > 2h',
      msg: stuckFood.map(function(o){ return '#'+esc(o.order_number); }).join(', '),
      time: 'Détecté maintenant', status: 'active' });
  }

  // 5. Dépenses > revenus ce mois
  var curM = now.getMonth()+1; var curY = now.getFullYear();
  var mData = monthlyRevenue.find(function(m){ return m.m===curM && m.y===curY; });
  if (mData && mData.exp > mData.rev && mData.rev > 0) {
    alerts.push({ id: nextId++, level: 'critical', cat: 'finance',
      title: 'Dépenses supérieures aux revenus ce mois',
      msg: 'Revenus: '+fmtS(mData.rev)+' FCFA · Dépenses: '+fmtS(mData.exp)+' FCFA · Déficit: '+fmtS(mData.exp-mData.rev)+' FCFA',
      time: 'Ce mois', status: 'active' });
  }

  // 6. Données insuffisantes (toutes tables vides)
  if (_payments.length === 0 && _reservations.length === 0 && _foodOrders.length === 0) {
    alerts.push({ id: nextId++, level: 'info', cat: 'système',
      title: 'Aucune donnée disponible dans Supabase',
      msg: 'Tables principales vides. Ajoutez des données pour voir les KPIs réels.',
      time: 'Maintenant', status: 'active' });
  }

  // 7. Tout va bien
  if (alerts.length === 0) {
    alerts.push({ id: nextId++, level: 'info', cat: 'système',
      title: 'Aucune alerte active — tout est normal',
      msg: 'Analyse: '+_reservations.length+' réservations · '+_payments.length+' paiements · '+_foodOrders.length+' commandes food.',
      time: 'Maintenant', status: 'acknowledged' });
  }
}

// ── SVG CHARTS ───────────────────────────────────────────────
function lineChart(data,color,h){
  h=h||70;
  if(!data||data.length<2) return '<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;">Données insuffisantes</div>';
  var max=Math.max.apply(null,data)||1,min=Math.min.apply(null,data);
  var r=max-min||1,W=100,H=h;
  var pts=data.map(function(v,i){
    var x=(i/(data.length-1))*W;
    var y=H-((v-min)/r)*(H*.85)-(H*.075);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  var area='0,'+H+' '+pts+' '+W+','+H;
  var gid='g'+color.replace('#','');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;" preserveAspectRatio="none">'
    +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+color+'" stop-opacity="0.25"/>'
    +'<stop offset="100%" stop-color="'+color+'" stop-opacity="0"/>'
    +'</linearGradient></defs>'
    +'<polygon points="'+area+'" fill="url(#'+gid+')"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

function barChart(data,labels,color,h){
  h=h||80;
  if(!data||!data.length) return '<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;">Données insuffisantes</div>';
  var max=Math.max.apply(null,data)||1;
  var bw=100/data.length;
  var bars=data.map(function(v,i){
    var bh=(v/max)*(h*.9);
    var x=i*bw+bw*.08;
    var y=h-bh;
    var opacity=i===data.length-1?1:0.55;
    var lbl=labels?'<text x="'+(x+bw*.42).toFixed(1)+'" y="'+(h+12)+'" text-anchor="middle" font-size="4.5" fill="#6b7280">'+labels[i]+'</text>':'';
    return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw*.84).toFixed(1)+'" height="'+bh.toFixed(1)+'" fill="'+color+'" opacity="'+opacity+'" rx="1.5"/>'+lbl;
  }).join('');
  return '<svg viewBox="0 0 100 '+(h+14)+'" style="width:100%;height:'+(h+14)+'px;" preserveAspectRatio="none">'+bars+'</svg>';
}

function sparkline(data,color,h){
  h=h||28;
  if(!data||data.length<2) return '';
  var max=Math.max.apply(null,data)||1,min=Math.min.apply(null,data);
  var r=max-min||1;
  var slice=data.slice(-10);
  var pts=slice.map(function(v,i){
    var x=(i/(slice.length-1))*100;
    var y=h-((v-min)/r)*(h*.9)-(h*.05);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return '<svg viewBox="0 0 100 '+h+'" style="width:100%;height:'+h+'px;" preserveAspectRatio="none">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

// ── KPI CARD ─────────────────────────────────────────────────
function kpiCard(icon,label,value,sub,color,trendVal,series){
  var trendHtml=trendVal!=null?'<span class="kpi-trend '+(trendVal>=0?'trend-up':'trend-dn')+'">'+(trendVal>=0?'↑':'↓')+' '+Math.abs(trendVal)+'%</span>':'';
  var sparkHtml=series?'<div class="spark">'+sparkline(series,color)+'</div>':'';
  return '<div class="kpi-card">'
    +'<div class="kpi-lbl"><span>'+icon+'</span>'+label+trendHtml+'</div>'
    +'<div class="kpi-val" style="color:'+color+';">'+value+'</div>'
    +(sub?'<div class="kpi-sub">'+sub+'</div>':'')
    +sparkHtml
    +'</div>';
}

// ── RENDER REVENUE ────────────────────────────────────────────
function renderRevenue(){
  var cur2026 = monthlyRevenue.filter(function(m){return m.y===2026;});
  var totalY = cur2026.reduce(function(a,m){return a+m.rev;},0);
  var totalExp = cur2026.reduce(function(a,m){return a+m.exp;},0);
  var totalProfit = totalY - totalExp;
  var projAnnuel = cur2026.length > 0 ? totalY / (cur2026.length / 12) : 0;
  var margins = totalY > 0 ? (totalProfit/totalY*100).toFixed(1) : '0.0';

  // ADR et RevPAR calculés sur données réelles
  var nightsSold = _reservations.filter(function(r){return r.status!=='cancelled';}).reduce(function(s,r){return s+toNum(r.nights);},0);
  var totalRevAll = _payments.filter(function(p){return p.status==='validated';}).reduce(function(s,p){return s+toNum(p.amount);},0);
  var ADR = nightsSold > 0 ? totalRevAll / nightsSold : 0;
  var RevPAR = ADR * avgOcc30 / 100;
  var nbRes = _reservations.filter(function(r){return r.status!=='cancelled';}).length;
  var avgNights = nbRes > 0 ? (nightsSold / nbRes).toFixed(1) : '0';

  // Répartition par source (réelle)
  var revH  = _payments.filter(function(p){return p.status==='validated'&&p.reservation_id;}).reduce(function(s,p){return s+toNum(p.amount);},0);
  var revFd = _foodOrders.filter(function(o){return o.status==='delivered';}).reduce(function(s,o){return s+toNum(o.total);},0);
  var revRt = _restaurantOrders.filter(function(o){return o.status==='paye';}).reduce(function(s,o){return s+toNum(o.total||o.total_amount);},0);
  var revTot= revH + revFd + revRt || 1;

  return '<div class="kpi-grid">'
    +kpiCard('💰','Revenus 2026',fmtS(totalY)+' FCFA',cur2026.length+' mois de données','#6c63ff',null)
    +kpiCard('📉','Dépenses 2026',fmtS(totalExp)+' FCFA','Salaires+charges+opérations','#ef4444',null)
    +kpiCard('📈','Profit 2026',fmtS(totalProfit)+' FCFA','Marge: '+margins+'%',totalProfit>=0?'#10b981':'#ef4444',null)
    +kpiCard('🔮','Projection annuelle',fmtS(projAnnuel)+' FCFA','Extrapolation linéaire 2026','#8b5cf6',null)
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">Revenus — Historique mensuel (toutes années)</div>'
    +'<div class="svg-wrap">'+lineChart(monthlyRevenue.map(function(m){return m.rev;}),'#6c63ff',100)+'</div>'
    +'<div class="chart-sub">'+monthlyRevenue.length+' mois de données · Source: paiements Supabase validés</div>'
    +'</div>'

    +'<div class="g2">'
    +'<div class="chart-wrap">'
    +'<div class="chart-title">Profitabilité mensuelle 2026</div>'
    +(cur2026.length === 0 ? '<div style="padding:20px;text-align:center;color:var(--text3);">Aucune donnée 2026 disponible</div>' :
    cur2026.map(function(m){
      var profit=m.rev-m.exp;
      var margin=m.rev>0?(profit/m.rev*100).toFixed(0):'0';
      return '<div class="bar-row">'
        +'<div class="bar-lbl">'+MONTHS[m.m-1]+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.max(0,margin)+'%;background:'+(margin>=30?'var(--green)':margin>=15?'var(--yellow)':'var(--red)')+'"></div></div>'
        +'<div class="bar-val">'+margin+'% <span style="color:var(--text3);font-size:10px;">'+fmtS(profit)+'</span></div>'
        +'</div>';
    }).join(''))
    +'</div>'
    +'<div class="chart-wrap">'
    +'<div class="chart-title">Répartition revenus par source (tout le temps)</div>'
    +[
      {lbl:'🏠 Hébergement',val:revH,color:'#6c63ff'},
      {lbl:'🍽️ Restaurant',val:revRt,color:'#f97316'},
      {lbl:'🛵 Food Lounge',val:revFd,color:'#06b6d4'},
    ].map(function(r){
      var p2=(r.val/revTot*100).toFixed(0);
      return '<div class="bar-row">'
        +'<div class="bar-lbl" style="font-size:10px;width:95px;">'+r.lbl+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+p2+'%;background:'+r.color+'"></div></div>'
        +'<div class="bar-val" style="color:'+r.color+';">'+p2+'%</div>'
        +'</div>';
    }).join('')
    +'<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);">'
    +'<div class="chart-sub">RevPAR: '+fmt(RevPAR)+' · ADR: '+fmt(ADR)+' · Durée moy: '+avgNights+' nuits</div>'
    +'</div>'
    +'</div>'
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">Tableau détaillé — Performance mensuelle</div>'
    +'<div class="tbl-wrap"><table>'
    +'<tr><th>Période</th><th>Revenus</th><th>Dépenses</th><th>Profit</th><th>Marge</th><th>Clients</th><th>Statut</th></tr>'
    +monthlyRevenue.slice(-8).reverse().map(function(m){
      var profit=m.rev-m.exp;
      var margin=m.rev>0?(profit/m.rev*100).toFixed(1):'0.0';
      var now=new Date(); var isCurrent=m.y===now.getFullYear()&&m.m===now.getMonth()+1;
      return '<tr>'
        +'<td style="font-weight:500;">'+MONTHS[m.m-1]+' '+m.y+(isCurrent?' <span class="bdg bdg-b">En cours</span>':'')+'</td>'
        +'<td style="color:var(--accent2);">'+fmt(m.rev)+'</td>'
        +'<td style="color:var(--red);">'+fmt(m.exp)+'</td>'
        +'<td style="color:'+(profit>=0?'var(--green)':'var(--red)')+';font-weight:600;">'+fmt(profit)+'</td>'
        +'<td><span class="bdg '+(margin>=30?'bdg-g':margin>=15?'bdg-y':'bdg-r')+'">'+margin+'%</span></td>'
        +'<td>'+m.guests+'</td>'
        +'<td><span class="bdg '+(isCurrent?'bdg-b':'bdg-g')+'">'+(isCurrent?'📊 Partiel':'✅ Clôturé')+'</span></td>'
        +'</tr>';
    }).join('')
    +'</table></div>'
    +'</div>';
}

  var srcIcons  = {site:'🌐',direct:'📞',airbnb:'🏠',booking:'📋',whatsapp:'📱',agence:'🤝'};

             pct:Math.round(e[1]/totRes*100), color:srcColors[e[0]]||'#6b7280' };

    +'<div class="chart-wrap">'

    +'</div>'

    +'<div class="chart-title">Sources de réservation — Données réelles</div>'
    +(sources.length === 0
      ? '<div style="padding:20px;text-align:center;color:var(--text3);">Aucune donnée source disponible</div>'
      : sources.map(function(s){
          return '<div class="bar-row">'
            +'<div class="bar-lbl" style="width:140px;font-size:10px;">'+s.src+'</div>'
            +'<div class="bar-track"><div class="bar-fill" style="width:'+s.pct+'%;background:'+s.color+'"></div></div>'
            +'<div class="bar-val" style="color:'+s.color+';">'+s.pct+'%</div>'
            +'</div>';
        }).join(''))
    +'</div>'
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">Clients mensuels 2026 (d\'après réservations)</div>'
    +'<div class="svg-wrap">'+barChart(
      monthlyRevenue.filter(function(m){return m.y===2026;}).map(function(m){return m.guests;}),
      monthlyRevenue.filter(function(m){return m.y===2026;}).map(function(m){return MONTHS[m.m-1];}),
      '#3b82f6',80)+'</div>'
    +'<div class="chart-sub">Total 2026: '+totalGuests2026+' clients</div>'
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">Toutes réservations — Tableau</div>'
    +'<div class="tbl-wrap"><table>'
    +'<tr><th>Client</th><th>Check-in</th><th>Check-out</th><th>Nuits</th><th>Total</th><th>Payé</th><th>Statut</th><th>Source</th></tr>'
    +_reservations.slice(0,15).map(function(r){
      var sc={checkedout:'bdg-g',checkedin:'bdg-b',confirmed:'bdg-p',pending:'bdg-y',cancelled:'bdg-r'};
      return '<tr>'
        +'<td style="font-weight:500;">'+esc(r.client_name)+'</td>'
        +'<td>'+r.check_in+'</td>'
        +'<td>'+r.check_out+'</td>'
        +'<td>'+r.nights+'</td>'
        +'<td style="color:var(--accent2);">'+fmt(r.total)+'</td>'
        +'<td style="color:var(--green);">'+fmt(r.paid)+'</td>'
        +'<td><span class="bdg '+(sc[r.status]||'bdg-gr')+'">'+r.status+'</span></td>'
        +'<td style="color:var(--text3);">'+esc(r.source||'')+'</td>'
        +'</tr>';
    }).join('')
    +'</table></div>'
    +(_reservations.length>15?'<div class="chart-sub">Affichage des 15 dernières · Total: '+_reservations.length+'</div>':'')
    +'</div>';
}

// ── RENDER EMPLOYEES ──────────────────────────────────────────
function renderEmployees(){
  var totalPay  = emp.reduce(function(a,e){return a+e.pay;},0);
  var empTotal  = _employees.filter(function(e){return e.status==='actif';}).length;

  // Masse salariale par mois depuis _payroll
  var payByM = {};
  _payroll.forEach(function(p){
    if(!p.period_month||!p.period_year) return;
    var k=p.period_year+'-'+p.period_month;
    if(!payByM[k]) payByM[k]={m:p.period_month,y:p.period_year,total:0};
    payByM[k].total += toNum(p.net_salary);
  });
  var payHist = Object.values(payByM).sort(function(a,b){return a.y!==b.y?a.y-b.y:a.m-b.m;}).slice(-5);

  return '<div class="kpi-grid">'
    +kpiCard('👥','Effectif actif',String(empTotal),'Statut: actif','#8b5cf6',null)
    +kpiCard('💰','Masse salariale nette',fmtS(totalPay)+' FCFA','Dernier bulletin disponible','#6c63ff',null)
    +kpiCard('📋','Bulletins de paie',String(_payroll.length),'Total enregistrés','#10b981',null)
    +kpiCard('🏠','Tâches housekeeping',String(_housekeeping.filter(function(h){return h.status==='done';}).length)+'/'+_housekeeping.length,'Terminées / Total','#f59e0b',null)
    +'</div>'

    +'<div class="g2">'
    +'<div class="chart-wrap">'
    +'<div class="chart-title">Masse salariale mensuelle</div>'
    +(payHist.length === 0
      ? '<div style="padding:20px;text-align:center;color:var(--text3);">Aucune donnée de paie disponible</div>'
      : payHist.map(function(p){
          var maxPay = Math.max.apply(null, payHist.map(function(x){return x.total;})) || 1;
          return '<div class="bar-row">'
            +'<div class="bar-lbl">'+MONTHS[p.m-1]+' '+p.y+'</div>'
            +'<div class="bar-track"><div class="bar-fill" style="width:'+(p.total/maxPay*100).toFixed(0)+'%;background:var(--purple)"></div></div>'
            +'<div class="bar-val">'+fmtS(p.total)+'</div>'
            +'</div>';
        }).join(''))
    +'</div>'
    +'<div class="chart-wrap">'
    +'<div class="chart-title">Répartition tâches Housekeeping</div>'
    +[
      {lbl:'✅ Terminées',    val:_housekeeping.filter(function(h){return h.status==='done';}).length,        color:'var(--green)'},
      {lbl:'⏳ En cours',    val:_housekeeping.filter(function(h){return h.status==='in_progress';}).length, color:'var(--yellow)'},
      {lbl:'📋 À faire',     val:_housekeeping.filter(function(h){return h.status==='pending';}).length,     color:'var(--blue)'},
      {lbl:'🔍 Inspection',  val:_housekeeping.filter(function(h){return h.status==='inspection';}).length,  color:'var(--cyan)'},
    ].map(function(r){
      var t=_housekeeping.length||1;
      return '<div class="bar-row">'
        +'<div class="bar-lbl" style="width:90px;font-size:10.5px;">'+r.lbl+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+(r.val/t*100).toFixed(0)+'%;background:'+r.color+'"></div></div>'
        +'<div class="bar-val" style="color:'+r.color+';">'+r.val+'</div>'
        +'</div>';
    }).join('')
    +'</div>'
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">Employés actifs <span class="bdg bdg-y" style="font-size:9px;margin-left:6px;">ℹ️ Présence non suivie dans Supabase</span></div>'
    +(emp.length === 0
      ? '<div style="padding:20px;text-align:center;color:var(--text3);">Aucun employé actif dans veraluz_employees</div>'
      : '<div class="tbl-wrap"><table>'
        +'<tr><th>Employé</th><th>Rôle</th><th>Salaire net</th><th>Dernier bulletin</th><th>Contrat</th></tr>'
        +_employees.filter(function(e){return e.status==='actif';}).map(function(e){
          var slips=_payroll.filter(function(p){return p.employee_id===e.id;})
            .sort(function(a,b){return b.period_year!==a.period_year?b.period_year-a.period_year:b.period_month-a.period_month;});
          var last=slips[0];
          return '<tr>'
            +'<td style="font-weight:500;">'+esc(e.full_name)+'</td>'
            +'<td style="font-size:11px;color:var(--text2);">'+esc(e.role||'')+'</td>'
            +'<td style="color:var(--green);">'+(last?fmt(last.net_salary):(e.base_salary?fmt(e.base_salary):'N/D'))+'</td>'
            +'<td>'+(last?'<span class="bdg bdg-g">'+MONTHS[last.period_month-1]+' '+last.period_year+'</span>':'<span class="bdg bdg-y">Aucun</span>')+'</td>'
            +'<td style="font-size:10px;color:var(--text3);">'+esc(e.contract_type||'')+'</td>'
            +'</tr>';
        }).join('')
        +'</table></div>')
    +'</div>';
}

// ── RENDER ALERTS ─────────────────────────────────────────────
function renderAlerts(){
  var active   = alerts.filter(function(a){return a.status==='active';});
  var acked    = alerts.filter(function(a){return a.status==='acknowledged';});
  var resolved = alerts.filter(function(a){return a.status==='resolved';});
  var lc = {critical:'#ef4444',warning:'#f59e0b',info:'#3b82f6'};
  var bg = {critical:'rgba(239,68,68,.08)',warning:'rgba(245,158,11,.08)',info:'rgba(59,130,246,.08)'};
  var ic = {critical:'🚨',warning:'⚠️',info:'ℹ️'};

  function alertHTML(a){
    return '<div class="alert-item" style="border-left-color:'+lc[a.level]+';background:'+bg[a.level]+';">'
      +'<div class="alert-icon">'+ic[a.level]+'</div>'
      +'<div class="alert-cnt">'
      +'<div class="alert-tit" style="color:'+lc[a.level]+';">'+a.title+'</div>'
      +'<div class="alert-msg">'+a.msg+'</div>'
      +'<div class="alert-time">🕐 '+a.time+' · Catégorie: '+a.cat+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">'
      +(a.status==='active'?'<button class="btn btn-o btn-sm" onclick="ackAlert('+a.id+')">✓ Vu</button>':'')
      +(a.status!=='resolved'?'<button class="btn btn-o btn-sm" onclick="resolveAlert('+a.id+')">✅ Résoudre</button>':'')
      +'</div>'
      +'</div>';
  }

  // Valeurs réelles pour les seuils
  var pendPayCnt = _payments.filter(function(p){return p.status==='pending';}).length;
  var lastDayRev = revenueDaily.length ? revenueDaily[revenueDaily.length-1] : 0;
  var empActif   = _employees.filter(function(e){return e.status==='actif';}).length;
  var seuils = [
    {metric:'Taux occupation',       seuil:'< 50%',          niv:'⚠️ Warning',   actuel:pct(avgOcc30),               ok:avgOcc30>=50},
    {metric:'Taux occupation',       seuil:'< 30%',          niv:'🚨 Critique',   actuel:pct(avgOcc30),               ok:avgOcc30>=30},
    {metric:'Paiements en attente',  seuil:'> 5',            niv:'⚠️ Warning',   actuel:String(pendPayCnt),           ok:pendPayCnt<=5},
    {metric:'Paiements en attente',  seuil:'> 10',           niv:'🚨 Critique',   actuel:String(pendPayCnt),           ok:pendPayCnt<=10},
    {metric:'Revenus journaliers',   seuil:'< 100 000 FCFA', niv:'⚠️ Warning',   actuel:fmt(lastDayRev),              ok:lastDayRev>=100000},
    {metric:'Employés actifs',       seuil:'< 3',            niv:'🚨 Critique',   actuel:String(empActif)+' actifs',  ok:empActif>=3},
  ];

  return '<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);">'
    +kpiCard('🔴','Critiques',String(active.filter(function(a){return a.level==='critical';}).length),'Action immédiate requise','#ef4444',null)
    +kpiCard('🟡','Avertissements',String(active.filter(function(a){return a.level==='warning';}).length),'À surveiller','#f59e0b',null)
    +kpiCard('✅','Prises en compte',String(acked.length+resolved.length),'Ce chargement','#10b981',null)
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">🔴 Alertes actives — Action requise ('+active.length+')</div>'
    +(active.length===0
      ? '<div style="text-align:center;padding:20px;color:var(--text3);">✅ Aucune alerte active — tout est normal</div>'
      : active.map(alertHTML).join(''))
    +'</div>'

    +(acked.length>0
      ? '<div class="chart-wrap"><div class="chart-title">👁 Prises en compte ('+acked.length+')</div>'+acked.map(alertHTML).join('')+'</div>'
      : '')

    +'<div class="chart-wrap">'
    +'<div class="chart-title">⚙️ Seuils d\'alertes — Valeurs réelles Supabase</div>'
    +seuils.map(function(row){
      return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bg4);flex-wrap:wrap;">'
        +'<span style="min-width:180px;font-size:12px;font-weight:500;">'+row.metric+'</span>'
        +'<span style="min-width:120px;font-size:11px;color:var(--text2);">Seuil: '+row.seuil+'</span>'
        +'<span style="font-size:11px;">'+row.niv+'</span>'
        +'<span style="margin-left:auto;font-size:11px;">Actuel: <strong>'+row.actuel+'</strong></span>'
        +'<span class="bdg '+(row.ok?'bdg-g':'bdg-r')+'">'+(row.ok?'✅ OK':'⚠️ Déclenché')+'</span>'
        +'</div>';
    }).join('')
    +'<button class="btn btn-o btn-sm" style="margin-top:10px;" onclick="toast(\'Actualisation depuis Supabase...\');refreshAll();">🔄 Recharger les données</button>'
    +'</div>'

    +(resolved.length>0
      ? '<div class="chart-wrap"><div class="chart-title">✅ Résolues cette session</div>'+resolved.map(alertHTML).join('')+'</div>'
      : '');
}

// ── RENDER REPORTS ────────────────────────────────────────────

    +'</div>'

    +'<div class="g2">'
    +[
      {type:'daily', icon:'📅',label:'Rapport Journalier',        desc:'KPIs du jour, présences, revenus, alertes',             time:'Automatique chaque matin 07h00'},
      {type:'weekly',icon:'📆',label:'Rapport Hebdomadaire',      desc:'Performance semaine, comparatif, tendances',             time:'Chaque lundi 08h00'},
      {type:'monthly',icon:'📊',label:'Rapport Mensuel Complet',  desc:'P&L, occupation, clients, RH, graphiques',               time:'1er du mois 09h00'},

        +'<div style="font-size:10px;color:var(--text3);margin-bottom:12px;">⏰ '+r.time+'</div>'
        +'<div style="display:flex;gap:6px;">'
        +'<button class="btn btn-p btn-sm" onclick="genReport(\''+r.type+'\',\'pdf\')">📄 PDF</button>'
        +'<button class="btn btn-o btn-sm" onclick="genReport(\''+r.type+'\',\'excel\')">📊 Excel</button>'
        +'<button class="btn btn-o btn-sm" onclick="genReport(\''+r.type+'\',\'csv\')">📋 CSV</button>'

    +'<div class="chart-wrap" id="generated-reports">'
    +'<div class="chart-title">Rapports générés</div>'
    +(generatedReports.length===0
      ? '<div style="text-align:center;padding:20px;color:var(--text3);">Cliquez sur un bouton ci-dessus pour générer votre premier rapport</div>'
      : generatedReports.map(function(r){

            +'<div style="flex:1;">'
            +'<div style="font-size:13px;font-weight:500;">'+r.title+'</div>'
            +'<div style="font-size:10px;color:var(--text3);">'+r.type.toUpperCase()+' · '+r.fmt.toUpperCase()+' · '+r.size+'KB · Généré '+r.time+'</div>'
            +'</div>'
            +'<span class="bdg bdg-g">✅ Prêt</span>'
            +'<button class="btn btn-o btn-sm" onclick="toast(\'Téléchargement...\',\'success\')">⬇️</button>'
            +'<button class="btn btn-o btn-sm" onclick="toast(\'Email envoyé à afterworkquebec2025@gmail.com\',\'success\')">📧</button>'
            +'</div>';
        }).join(''))
    +'</div>'

    +'<div class="chart-wrap">'
    +'<div class="chart-title">📧 Rapports automatiques configurés</div>'
    +[
      {label:'Rapport journalier', freq:'Chaque matin 07h00',    dest:'afterworkquebec2025@gmail.com',                  active:true},
      {label:'Rapport hebdo',      freq:'Lundi 08h00',           dest:'afterworkquebec2025@gmail.com',                  active:true},
      {label:'Rapport mensuel',    freq:'1er du mois 09h00',     dest:'afterworkquebec2025@gmail.com + comptable',       active:false},
    ].map(function(r){
      return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg4);">'
        +'<div style="flex:1;">'
        +'<div style="font-size:12.5px;font-weight:500;">'+r.label+'</div>'
        +'<div style="font-size:10px;color:var(--text3);">'+r.freq+' · 📧 '+r.dest+'</div>'

// ── ACTIONS ───────────────────────────────────────────────────
function ackAlert(id){
  var a=alerts.find(function(x){return x.id===id;});
  if(a){a.status='acknowledged';toast('✓ Alerte prise en compte: '+a.title,'success');render();}
}
function resolveAlert(id){
  var a=alerts.find(function(x){return x.id===id;});
  if(a){a.status='resolved';toast('✅ Alerte résolue: '+a.title,'success');render();}
}

function genReport(type,fmtType){
  var titles={daily:'Rapport Journalier',weekly:'Rapport Hebdomadaire',monthly:'Rapport Mensuel',annual:'Bilan Annuel'};
  toast('⏳ Génération du '+titles[type]+' en '+fmtType.toUpperCase()+'…');
  setTimeout(function(){
    generatedReports.unshift({
      title: titles[type]+' — Résidence Veraluz '+new Date().toLocaleDateString('fr-FR'),
      type: type, fmt: fmtType,
      size: Math.floor(Math.random()*400+100),
      time: 'à l\'instant'
    });
    toast('✅ '+titles[type]+' ('+fmtType.toUpperCase()+') prêt — Email envoyé','success');
    render();
  },1500);
}

loadAnalyticsData();
