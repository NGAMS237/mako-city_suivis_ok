<style>*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

.mf{display:flex;justify-content:flex-end;gap:9px;margin-top:16px;}
.mc{background:#0f172a;color:#94a3b8;border:1px solid #334155;border-radius:7px;padding:7px 18px;font-size:13px;cursor:pointer;}
.mok{background:#6366f1;color:#fff;border:none;border-radius:7px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;}
.mok:hover{background:#4f46e5;}
.fr{margin-bottom:12px;}
.fr label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:4px;}
.fr input,.fr select,.fr textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:7px;padding:8px 11px;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:#6366f1;}
.fr textarea{resize:vertical;}
.cdest{font-size:12px;color:#94a3b8;background:#0f172a;border-radius:7px;padding:9px 11px;margin-bottom:12px;word-break:break-all;}
.ctype{display:flex;gap:18px;margin-bottom:12px;}
.rl{display:flex;align-items:center;gap:6px;font-size:13px;color:#94a3b8;cursor:pointer;}
.rl input{accent-color:#6366f1;}
.wbox{background:#7c2d12;border:1px solid #9a3412;color:#fdba74;border-radius:7px;padding:9px 11px;font-size:12px;margin-bottom:9px;}
.ibox{background:#0c2340;border:1px solid #1e4d80;color:#93c5fd;border-radius:7px;padding:9px 11px;font-size:12px;}
.empty-s{text-align:center;color:#475569;padding:25px 14px;font-size:13px;}
.ecta{display:inline-block;margin-top:10px;background:#6366f1;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;}
.toast{position:fixed;bottom:18px;right:18px;background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:#059669;color:#6ee7b7;}
.toast.warn{border-color:#d97706;color:#fcd34d;}
.toast.err{border-color:#dc2626;color:#fca5a5;}
.spin{display:flex;align-items:center;justify-content:center;height:80px;color:#475569;gap:8px;font-size:12px;}
.sp{width:15px;height:15px;border:2px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:620px){.lp{width:100%;max-height:36vh;border-right:none;border-bottom:1px solid #1e293b;}.main{flex-direction:column;}.cards-g{grid-template-columns:1fr 1fr;}}</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">👥 Contacts</div>
  <div class="sbox"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Rechercher..." oninput="setSearch(this.value)" id="si"></div>
  <button class="add-btn" onclick="showAdd()">+ Ajouter</button>
</div>
<div class="tabbar" id="tabs"></div>
<div class="main" id="main">
  <div id="va" style="display:flex;flex:1;overflow:hidden;">
    <div class="lp"><div class="bbar" id="bb"></div><div class="cl" id="list"><div class="spin"><div class="sp"></div> Chargement...</div></div></div>
    <div class="rp" id="detail"><div class="de"><div class="de-ic">👥</div><p>Sélectionnez un contact pour voir son profil et ses échanges</p></div></div>

      <button class="vb on" id="vb-cards" onclick="setVM('cards')">▦ Cartes</button>
      <button class="vb" id="vb-list" onclick="setVM('list')">☰ Liste</button>
      <button class="vb" id="vb-table" onclick="setVM('table')">⋞ Tableau</button>
      <button class="vb" onclick="toggleF()">⚙ Filtres</button>

      <button class="vb on" onclick="crmSendBtn()">✉ Envoyer</button>

      <div class="fg"><label>Dépenses min (XAF)</label><input type="number" id="fmin" placeholder="0" oninput="renderCRM()"></div>
      <div class="fg"><label>Dépenses max (XAF)</label><input type="number" id="fmax" placeholder="illimité" oninput="renderCRM()"></div>
      <div class="fg"><label>Séjours min</label><input type="number" id="fstays" placeholder="1" min="1" oninput="renderCRM()"></div>
      <div class="fg"><label>Dernière visite</label><select id="fperiod" onchange="renderCRM()"><option value="">Toutes périodes</option><option value="30">-30 jours</option><option value="90">-90 jours</option><option value="180">-6 mois</option><option value="365">-1 an</option><option value="365+">+1 an</option></select></div>

<div class="toast" id="toast"></div>
<script>
var MID = 'contacts';
var SB = 'https://dfdmasejsoibxrvubegu.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY';
var contacts = [], curId = null, selIds = new Set(), tab = 'tous', sq = '', vm = 'cards', crmSel = new Set();
var TABS = [
  {id:'tous',l:'Tous'},{id:'client',l:'Clients'},{id:'crm',l:'⭐ CRM',crm:1},
  {id:'employee',l:'Employés'},{id:'fournisseur',l:'Fournisseurs'},
  {id:'prestataire',l:'Prestataires'},{id:'autre',l:'Autres'}
];

function tk(id){return 'vz_thread_'+id;}
function getT(id){try{return JSON.parse(localStorage.getItem(tk(id))||'[]');}catch(e){return[];}}
function addE(id,e){
  var t=getT(id);
  e.id='t'+Date.now()+Math.random().toString(36).slice(2,5);
  e.date=e.date||new Date().toISOString();
  t.push(e);localStorage.setItem(tk(id),JSON.stringify(t));
}

function sbGet(path){
  return fetch(SB+'/rest/v1/'+path,{headers:{apikey:KEY,'Authorization':'Bearer '+KEY}})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});
}

async function loadAll(){
  contacts=[];
  // Clients from localStorage cache
  try{
    var cache=JSON.parse(localStorage.getItem('vlz_cache_rez')||'[]');
    var by={};
    cache.forEach(function(r){
      var em=(r.guest_email||'').toLowerCase().trim();if(!em)return;
      if(!by[em])by[em]={id:'cl_'+em.replace(/[^a-z0-9]/g,'_'),type:'client',name:r.guest_name||em,email:em,phone:r.guest_phone||'',count:0,total:0,lastDate:''};
      var c=by[em];c.count++;c.total+=parseFloat(r.total_price)||0;
      var d=r.check_in||'';if(d>c.lastDate){c.lastDate=d;if(r.guest_name)c.name=r.guest_name;}
    });
    contacts=contacts.concat(Object.values(by));
  }catch(e){}
  // Clients from Supabase
  try{
    var rows=await sbGet('veraluz_reservations?select=guest_name,guest_email,guest_phone,total_price,check_in&order=check_in.desc&limit=1000');
    var idx={};
    contacts.filter(function(c){return c.type==='client';}).forEach(function(c){idx[c.email]=c;});
    rows.forEach(function(r){
      var em=(r.guest_email||'').toLowerCase().trim();if(!em)return;
      if(!idx[em]){
        var nc={id:'cl_'+em.replace(/[^a-z0-9]/g,'_'),type:'client',name:r.guest_name||em,email:em,phone:r.guest_phone||'',count:1,total:parseFloat(r.total_price)||0,lastDate:r.check_in||''};
        idx[em]=nc;contacts.push(nc);
      }else{
        var ex=idx[em];if(!ex._m){ex.count=0;ex.total=0;ex._m=true;}
        ex.count++;ex.total+=parseFloat(r.total_price)||0;
        var d=r.check_in||'';if(d>ex.lastDate){ex.lastDate=d;if(r.guest_name)ex.name=r.guest_name;}
      }
    });
  }catch(e){}
  // Employees
  try{
    var emps=await sbGet('veraluz_employees?select=id,full_name,email,phone,role,status,contract_type&order=full_name.asc');
    emps.forEach(function(e){
      contacts.push({id:'emp_'+e.id,type:'employee',name:e.full_name||'Employé',email:e.email||'',phone:e.phone||'',role:(e.role||'').replace(/_/g,' '),contract:e.contract_type||'',status:e.status||''});
    });
  }catch(e){console.warn('emp',e);}
  // Fournisseurs from restaurant table
  try{
    var sups=await sbGet('veraluz_restaurant_suppliers?select=id,name,contact_name,phone,email,products_supplied,active&order=name.asc');
    sups.filter(function(s){return s.active!==false;}).forEach(function(s){
      contacts.push({id:'sup_'+s.id,type:'fournisseur',name:s.name||'Fournisseur',email:s.email||'',phone:s.phone||'',contact:s.contact_name||'',products:s.products_supplied||'',_sb:true});
    });
  }catch(e){console.warn('sup',e);}
  // Manual contacts
  try{var m=JSON.parse(localStorage.getItem('vz_contacts_manual')||'[]');contacts=contacts.concat(m);}catch(e){}
  // Seed threads from email log
  try{
    var log=JSON.parse(localStorage.getItem('vz_email_log')||'[]');
    log.forEach(function(entry){
      if(!entry.to_email)return;
      var em=entry.to_email.toLowerCase();
      var c=contacts.find(function(x){return(x.email||'').toLowerCase()===em;});
      if(!c)return;
      var t=getT(c.id);
      if(!t.some(function(te){return te._lid===entry.id;}))
        addE(c.id,{type:'sent',subject:entry.subject||'Email',content:entry.preview||entry.subject||'',_lid:entry.id,date:entry.date||new Date().toISOString()});
    });
  }catch(e){}
  render();
}

function ac(n){var c=['#6366f1','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777','#ea580c'],i=0;for(var j=0;j<(n||'').length;j++)i+=(n||'').charCodeAt(j);return c[i%c.length];}
function ai(n){var p=(n||'?').trim().split(/\s+/);return((p[0][0]||'')+(p[1]?p[1][0]:'')).toUpperCase()||'?';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(iso){if(!iso)return'';try{return new Date(iso).toLocaleDateString('fr-CA',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return iso.slice(0,16).replace('T',' ');}}
function tl(t){return{client:'Client',employee:'Employé',prestataire:'Prestataire',fournisseur:'Fournisseur',autre:'Autre'}[t]||t;}
function tc(t){return{client:'#6366f1',employee:'#059669',prestataire:'#d97706',fournisseur:'#0891b2',autre:'#6b7280'}[t]||'#6b7280';}
function fmt(v){try{return parseFloat(v||0).toLocaleString('fr-CA',{style:'currency',currency:'XAF',maximumFractionDigits:0});}catch(e){return v+'F';}}

function filtered(){
  var l=contacts.slice();
  if(tab!=='tous'&&tab!=='crm')l=l.filter(function(c){return c.type===tab;});
  if(tab==='crm')l=l.filter(function(c){return c.type==='client';});
  if(sq){var q=sq.toLowerCase();l=l.filter(function(c){return(c.name||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||(c.role||'').toLowerCase().includes(q)||(c.products||'').toLowerCase().includes(q);});}
  l.sort(function(a,b){return(a.name||'').localeCompare(b.name||'','fr');});
  return l;
}

function filteredCRM(){
  var l=filtered();
  var mn=parseFloat((document.getElementById('fmin')||{}).value||0)||0;
  var mx=parseFloat((document.getElementById('fmax')||{}).value||'')||Infinity;
  var ms=parseInt((document.getElementById('fstays')||{}).value||0)||0;
  var per=((document.getElementById('fperiod')||{}).value||'');
  var ef=((document.getElementById('femail')||{}).value||'');
  var now=Date.now();
  return l.filter(function(c){
    if((c.total||0)<mn)return false;
    if(mx!==Infinity&&(c.total||0)>mx)return false;
    if((c.count||0)<ms)return false;
    if(ef==='yes'&&!c.email)return false;
    if(ef==='no'&&c.email)return false;
    if(per&&c.lastDate){var da=(now-new Date(c.lastDate).getTime())/86400000;if(per==='365+'&&da<=365)return false;if(per!=='365+'&&da>parseInt(per))return false;}
    return true;
  });
}

function render(){
  renderTabs();
  if(tab==='crm'){document.getElementById('va').style.display='none';document.getElementById('vc').style.display='flex';renderCRM();}
  else{document.getElementById('va').style.display='flex';document.getElementById('vc').style.display='none';renderList();if(curId){var c=contacts.find(function(x){return x.id===curId;});if(c)renderDetail(c);else{curId=null;renderDE();}}else renderDE();}
}

function renderTabs(){
  var cnt={tous:contacts.length,crm:contacts.filter(function(c){return c.type==='client';}).length};
  TABS.slice(1).forEach(function(t){if(!t.crm)cnt[t.id]=0;});
  contacts.forEach(function(c){if(cnt[c.type]===undefined)cnt[c.type]=0;cnt[c.type]++;});
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    var on=tab===t.id?' on':'',crm=t.crm?' crm':'';
    return '<button class="tb'+on+crm+'" onclick="setTab(\'' +t.id+ '\')">'+t.l+'<span class="tc">'+(cnt[t.id]||0)+'</span></button>';
  }).join('');
}

function renderList(){
  var l=filtered(),el=document.getElementById('list');
  if(!l.length){
    var em={prestataire:'Aucun prestataire.',fournisseur:'Fournisseurs chargés depuis la table Restaurant Supabase (vérifiez la connexion).',autre:'Aucun autre contact.',employee:'Aucun employé chargé.',client:'Aucun client trouvé.',tous:'Aucun contact.'};
    var showBtn=tab==='prestataire'||tab==='autre';
    el.innerHTML='<div class="empty-s">'+(em[tab]||em.tous)+(showBtn?'<br><button class="ecta" onclick="showAdd()">+ Ajouter</button>':'')+'</div>';
    renderBB();return;
  }
  el.innerHTML=l.map(function(c){
    var on=curId===c.id?' on':'',chk=selIds.has(c.id)?' checked':'',col=ac(c.name),ini=ai(c.name);
    var t=getT(c.id),last=t.length?t[t.length-1]:null;
    var bdg='<span class="bdg" style="background:'+tc(c.type)+'">'+tl(c.type)+'</span>';
    var prev=last?'<div class="lp2">'+esc((last.content||last.subject||'').slice(0,50))+'</div>':'';
    var cid=esc(c.id);
    return '<div class="ci'+on+'" onclick="selC(\'' +cid+ '\')">'
      +'<input type="checkbox"'+chk+' onclick="event.stopPropagation();togS(\'' +cid+ '\')" style="width:14px;height:14px;accent-color:#6366f1;flex-shrink:0;">'
      +'<div class="av" style="background:'+col+'">'+esc(ini)+'</div>'
      +'<div style="flex:1;min-width:0"><div class="cn">'+esc(c.name)+'</div><div class="cs">'+bdg+(c.email?' '+esc(c.email):'')+'</div>'+prev+'</div></div>';
  }).join('');
  renderBB();
}

function renderBB(){
  var b=document.getElementById('bb');
  if(!selIds.size){b.style.display='none';return;}
  b.style.display='flex';
  b.innerHTML='<span>'+selIds.size+' sélectionné(s)</span><button class="vb on" onclick="openCompose(Array.from(selIds))">✉ Envoyer</button><button class="vb" onclick="selIds.clear();renderList()">✕</button>';
}

function renderDE(){document.getElementById('detail').innerHTML='<div class="de"><div class="de-ic">👥</div><p>Sélectionnez un contact pour voir son profil et ses échanges</p></div>';}

function renderDetail(c){
  var col=ac(c.name),ini=ai(c.name),t=getT(c.id);
  var stats='';
  if(c.type==='client'){
    stats='<div class="dstats"><div class="sb"><div class="sv">'+(c.count||0)+'</div><div class="sl">Séjours</div></div>'
      +'<div class="sb"><div class="sv">'+fmt(c.total)+'</div><div class="sl">Dépensé</div></div>'
      +(c.lastDate?'<div class="sb"><div class="sv">'+(c.lastDate||'').slice(0,7)+'</div><div class="sl">Dernier</div></div>':'')+'</div>';
  }else if(c.type==='employee'){
    stats='<div class="dstats">'+(c.role?'<div class="sb"><div class="sv">'+esc(c.role)+'</div><div class="sl">Rôle</div></div>':'')+(c.contract?'<div class="sb"><div class="sv">'+esc(c.contract)+'</div><div class="sl">Contrat</div></div>':'')+(c.status?'<div class="sb"><div class="sv">'+esc(c.status)+'</div><div class="sl">Statut</div></div>':'')+'</div>';
  }else if(c.type==='fournisseur'&&c.products){
    stats='<div class="dstats"><div class="sb" style="min-width:200px"><div class="sv" style="font-size:12px">'+esc(c.products)+'</div><div class="sl">Produits</div></div>'+(c.contact?'<div class="sb"><div class="sv" style="font-size:12px">'+esc(c.contact)+'</div><div class="sl">Contact</div></div>':'')+'</div>';
  }
  var icons={sent:'📤',received:'📥',note:'📝',call:'📞'};
  var lbs={sent:'Envoyé',received:'Reçu',note:'Note',call:'Appel'};
  var th=t.length?t.slice().reverse().map(function(e){
    return '<div class="te '+esc(e.type)+'"><div class="teh"><span>'+(icons[e.type]||'💬')+' '+(lbs[e.type]||e.type)+'</span><span class="ted">'+fd(e.date)+'</span></div>'+(e.subject?'<div class="tes">'+esc(e.subject)+'</div>':'')+'<div class="tec">'+esc(e.content||'')+'</div></div>';
  }).join(''):'<div class="te-empty">Aucun échange enregistré.</div>';
  var canDel=c.type==='prestataire'||c.type==='autre'||(!c._sb&&c.type==='fournisseur');
  var cid=esc(c.id);
  document.getElementById('detail').innerHTML=
    '<div class="dh"><div class="da" style="background:'+col+'">'+esc(ini)+'</div><div><div class="dn">'+esc(c.name)+'</div><span class="bdg lg" style="background:'+tc(c.type)+'">'+tl(c.type)+'</span></div></div>'
    +'<div class="dci">'+(c.email?'<div class="df">✉ <a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a></div>':'')+(c.phone?'<div class="df">📞 '+esc(c.phone)+'</div>':'')+(c.notes?'<div class="df">📝 '+esc(c.notes)+'</div>':'')+'</div>'
    +stats
    +'<div class="dact">'+(c.email?'<button class="ab pr" onclick="openCompose([\'' +cid+ '\'])">✉ Envoyer</button>':'')
    +'<button class="ab" onclick="openNote(\'' +cid+ '\')">📝 Note</button>'
    +'<button class="ab" onclick="openCall(\'' +cid+ '\')">📞 Appel</button>'
    +'<button class="ab" onclick="openRecv(\'' +cid+ '\')">📥 Réponse reçue</button>'
    +(canDel?'<button class="ab dl" onclick="delC(\'' +cid+ '\')">🗑</button>':'')
    +'</div><div class="sep"></div>'
    +'<div class="ts"><div class="tt">Échanges ('+t.length+')</div>'+th+'</div>';
}

/* CRM */
function renderCRM(){
  var l=filteredCRM();
  var tot=l.reduce(function(s,c){return s+(c.total||0);},0);
  document.getElementById('cs').innerHTML=
    '<div class="cst"><div class="csv">'+l.length+'</div><div class="csl">Clients</div></div>'
    +'<div class="cst"><div class="csv">'+fmt(tot)+'</div><div class="csl">Revenus</div></div>'
    +'<div class="cst"><div class="csv">'+fmt(l.length?tot/l.length:0)+'</div><div class="csl">Moy/client</div></div>'
    +'<div class="cst"><div class="csv">'+l.filter(function(c){return c.email;}).length+'</div><div class="csl">Avec email</div></div>'
    +'<div class="cst"><div class="csv">'+l.reduce(function(s,c){return s+(c.count||0);},0)+'</div><div class="csl">Séjours</div></div>';
  var cc=document.getElementById('cc');
  if(!l.length){cc.innerHTML='<div class="empty-s" style="padding:40px">Aucun client ne correspond aux filtres.</div>';return;}
  if(vm==='cards'){
    cc.innerHTML='<div class="cards-g">'+l.map(function(c){
      var col=ac(c.name),ini=ai(c.name),on=crmSel.has(c.id)?' sel':'',cid=esc(c.id);
      return '<div class="kard'+on+'" onclick="crmOpen(\'' +cid+ '\')">'
        +'<input type="checkbox" class="kchk"'+(crmSel.has(c.id)?' checked':'')+' onclick="event.stopPropagation();crmTog(\'' +cid+ '\')">'
        +'<div class="kav" style="background:'+col+'">'+esc(ini)+'</div>'
        +'<div class="kn">'+esc(c.name)+'</div><div class="ke">'+esc(c.email||'—')+'</div>'
        +'<div class="ks"><div class="kss"><div class="ksv">'+(c.count||0)+'</div><div class="ksl">séjours</div></div>'
        +'<div class="kss"><div class="ksv">'+fmt(c.total)+'</div><div class="ksl">dépensé</div></div></div></div>';
    }).join('')+'</div>';
  }else if(vm==='list'){
    cc.innerHTML='<div class="list-c">'+l.map(function(c){
      var col=ac(c.name),ini=ai(c.name),on=crmSel.has(c.id)?' sel':'',cid=esc(c.id);
      return '<div class="li'+on+'" onclick="crmOpen(\'' +cid+ '\')">'
        +'<input type="checkbox"'+(crmSel.has(c.id)?' checked':'')+' onclick="event.stopPropagation();crmTog(\'' +cid+ '\')" style="width:13px;height:13px;accent-color:#6366f1;flex-shrink:0;">'
        +'<div class="lav" style="background:'+col+'">'+esc(ini)+'</div>'
        +'<div class="lname">'+esc(c.name)+'</div><div class="lemail">'+esc(c.email||'—')+'</div>'
        +'<div class="lstays">'+(c.count||0)+' sj</div><div class="ltot">'+fmt(c.total)+'</div></div>';
    }).join('')+'</div>';
  }else{
    var ids=JSON.stringify(l.map(function(c){return c.id;}));
    cc.innerHTML='<div style="overflow-x:auto"><table class="tbl"><thead><tr>'
      +'<th><input type="checkbox" onclick="crmAll(this,'+ids+')"></th>'
      +'<th>Nom</th><th>Email</th><th>Tél</th><th>Séjours</th><th>Total</th><th>Dernier</th></tr></thead><tbody>'
      +l.map(function(c){var on=crmSel.has(c.id)?' sel':'',cid=esc(c.id);return '<tr class="'+on+'" onclick="crmOpen(\'' +cid+ '\')">'
        +'<td><input type="checkbox"'+(crmSel.has(c.id)?' checked':'')+' onclick="event.stopPropagation();crmTog(\'' +cid+ '\')" style="accent-color:#6366f1"></td>'
        +'<td>'+esc(c.name)+'</td><td>'+esc(c.email||'—')+'</td><td>'+esc(c.phone||'—')+'</td>'
        +'<td>'+(c.count||0)+'</td><td>'+fmt(c.total)+'</td><td>'+(c.lastDate||'—').slice(0,10)+'</td></tr>';}).join('')
      +'</tbody></table></div>';
  }
  renderCRMBulk();
}

function setVM(m){vm=m;['cards','list','table'].forEach(function(x){var b=document.getElementById('vb-'+x);if(b)b.className='vb'+(x===m?' on':'');});renderCRM();}
function toggleF(){document.getElementById('fp').classList.toggle('open');}
function crmTog(id){if(crmSel.has(id))crmSel.delete(id);else crmSel.add(id);renderCRM();}
function crmClr(){crmSel.clear();renderCRM();}
function crmAll(chk,ids){if(chk.checked)ids.forEach(function(id){crmSel.add(id);});else ids.forEach(function(id){crmSel.delete(id);});renderCRM();}
function crmOpen(id){curId=id;setTab('client');setTimeout(function(){selC(id);},80);}
function renderCRMBulk(){var b=document.getElementById('cb');if(!crmSel.size){b.className='crm-bulk';return;}b.className='crm-bulk open';document.getElementById('cbcnt').textContent=crmSel.size+' sélectionné(s)';}
function crmSendBtn(){var ids=crmSel.size?Array.from(crmSel):filteredCRM().filter(function(c){return c.email;}).map(function(c){return c.id;});if(!ids.length){toast('Aucun client avec email','warn');return;}openCompose(ids);}
function doExport(){
  var l=filteredCRM();
  var rows=[['Nom','Email','Téléphone','Séjours','Total XAF','Dernier séjour']].concat(l.map(function(c){return[c.name,c.email||'',c.phone||'',c.count||0,c.total||0,(c.lastDate||'').slice(0,10)];}));
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='clients_veraluz_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('CSV exporté ✓','ok');
}

/* Navigation */
function setTab(t){tab=t;selIds.clear();crmSel.clear();document.getElementById('si').value='';sq='';render();}
function setSearch(q){sq=q;if(tab==='crm')renderCRM();else renderList();}
function selC(id){curId=id;renderList();var c=contacts.find(function(x){return x.id===id;});if(c)renderDetail(c);}
function togS(id){if(selIds.has(id))selIds.delete(id);else selIds.add(id);renderList();}

/* Add manual contact */
function showAdd(){
  showM('Ajouter un contact',
    '<div class="fr"><label>Type *</label><select id="at"><option value="prestataire">Prestataire de service</option><option value="fournisseur">Fournisseur (local)</option><option value="autre">Autre</option></select></div>'
    +'<div class="fr"><label>Nom complet *</label><input id="an" type="text" placeholder="Ex: Ahmed Bello"></div>'
    +'<div class="fr"><label>Email</label><input id="ae" type="email" placeholder="email@exemple.com"></div>'
    +'<div class="fr"><label>Téléphone</label><input id="ap" type="tel" placeholder="+237 6XX XXX XXX"></div>'
    +'<div class="fr"><label>Notes</label><textarea id="an2" rows="2" placeholder="Services, remarques..."></textarea></div>',
    function(){
      var n=document.getElementById('an').value.trim();if(!n){alert('Nom requis');return;}
      var mc={id:'m_'+Date.now(),type:document.getElementById('at').value,name:n,email:document.getElementById('ae').value.trim(),phone:document.getElementById('ap').value.trim(),notes:document.getElementById('an2').value.trim()};
      var lst=JSON.parse(localStorage.getItem('vz_contacts_manual')||'[]');lst.push(mc);localStorage.setItem('vz_contacts_manual',JSON.stringify(lst));
      contacts.push(mc);closeM();render();selC(mc.id);toast(mc.name+' ajouté ✓','ok');
    },'Ajouter');
}
function delC(id){
  var c=contacts.find(function(x){return x.id===id;});if(!c||!confirm('Supprimer '+c.name+' ?'))return;
  var lst=JSON.parse(localStorage.getItem('vz_contacts_manual')||'[]');
  lst=lst.filter(function(x){return x.id!==id;});localStorage.setItem('vz_contacts_manual',JSON.stringify(lst));
  contacts=contacts.filter(function(x){return x.id!==id;});curId=null;render();toast('Supprimé','ok');
}

/* Thread actions */
function openNote(cid){
  showM('Note interne','<div class="fr"><label>Note</label><textarea id="nt" rows="5" placeholder="Observation, suivi..."></textarea></div>',
    function(){var t=document.getElementById('nt').value.trim();if(!t)return;addE(cid,{type:'note',content:t});closeM();rf(cid);toast('Note ajoutée ✓','ok');},'Enregistrer');
}
function openCall(cid){
  var now=new Date(),loc=new Date(now-now.getTimezoneOffset()*60000).toISOString().slice(0,16);
  showM('Logger un appel',
    '<div class="fr"><label>Date/heure</label><input id="cd" type="datetime-local" value="'+loc+'"></div>'
    +'<div class="fr"><label>Résumé</label><textarea id="cn" rows="4" placeholder="Sujet, décisions..."></textarea></div>',
    function(){var n=document.getElementById('cn').value.trim(),d=document.getElementById('cd').value;addE(cid,{type:'call',content:n||'Appel enregistré',date:d?new Date(d).toISOString():new Date().toISOString()});closeM();rf(cid);toast('Appel enregistré ✓','ok');},'Enregistrer');
}
function openRecv(cid){
  showM('Réponse reçue',
    '<div class="ibox" style="margin-bottom:10px">Collez le contenu reçu dans Gmail pour garder un historique complet.</div>'
    +'<div class="fr"><label>Sujet</label><input id="rs" type="text" placeholder="Re: Confirmation..."></div>'
    +'<div class="fr"><label>Contenu</label><textarea id="rc" rows="6" placeholder="Copier-coller le message..."></textarea></div>',
    function(){var c=document.getElementById('rc').value.trim();if(!c){alert('Contenu requis');return;}addE(cid,{type:'received',subject:document.getElementById('rs').value.trim(),content:c});closeM();rf(cid);toast('Réponse enregistrée ✓','ok');},'Enregistrer');
}
function rf(cid){var c=contacts.find(function(x){return x.id===cid;});if(c&&curId===cid)renderDetail(c);}

/* Compose */
function openCompose(ids){
  var tgts=Array.isArray(ids)?ids:Array.from(ids);
  var ct=contacts.filter(function(c){return tgts.includes(c.id)&&c.email;});
  if(!ct.length){toast('Aucun contact sélectionné n\'a d\'email','warn');return;}
  var tpls=[],camps=[];
  try{tpls=JSON.parse(localStorage.getItem('vz_email_templates_lib')||'[]');}catch(e){}
  try{var rw=localStorage.getItem('vz_email_campaigns');if(rw)camps=JSON.parse(rw);}catch(e){}
  var tOpts=tpls.map(function(t,i){return '<option value="'+i+'">'+esc(t.name||t.subject||'Modèle '+(i+1))+'</option>';}).join('');
  var cOpts=camps.map(function(c,i){return '<option value="'+i+'">'+esc(c.name||'Campagne '+(i+1))+'</option>';}).join('');
  var dest=ct.slice(0,3).map(function(c){return esc(c.name);}).join(', ')+(ct.length>3?' et '+(ct.length-3)+'...':'');
  showM('Composer un message',
    '<div class="cdest">📨 '+ct.length+' destinataire(s) : <strong>'+dest+'</strong></div>'
    +'<div class="ctype"><label class="rl"><input type="radio" name="ct" value="simple" checked onchange="togCT()"> Simple (modèle)</label>'
    +'<label class="rl"><input type="radio" name="ct" value="camp" onchange="togCT()"> Campagne</label></div>'
    +'<div id="cs2">'+(tpls.length?'<div class="fr"><label>Modèle</label><select id="tsel" onchange="fillT()">'+tOpts+'</select></div>':'<div class="wbox">Aucun modèle — allez dans Paramètres → Email → Modèles.</div>')
    +'<div class="fr"><label>Sujet *</label><input id="csubj" type="text" placeholder="Sujet..."></div>'
    +'<div class="fr"><label>Message *</label><textarea id="cbody" rows="7" placeholder="Corps du message..."></textarea></div></div>'
    +'<div id="cc2" style="display:none">'+(camps.length?'<div class="fr"><label>Campagne</label><select id="csel">'+cOpts+'</select></div><div class="ibox">Envoi à '+ct.length+' contact(s) avec 300ms d\'intervalle.</div>':'<div class="wbox">Aucune campagne — allez dans Paramètres → Email → Campagnes.</div>')+'</div>',
    function(){
      var ctype=document.querySelector('input[name="ct"]:checked').value;
      if(ctype==='simple'){
        var s=(document.getElementById('csubj')||{}).value||'',b=(document.getElementById('cbody')||{}).value||'';
        s=s.trim();b=b.trim();if(!s||!b){alert('Sujet et corps obligatoires');return;}
        ct.forEach(function(c){
          window.parent.postMessage({veraluzEvent:true,source:MID,type:'send-email',data:{to_email:c.email,to_name:c.name,subject:s,body_html:b.replace(/\n/g,'<br>')}}, '*');
          addE(c.id,{type:'sent',subject:s,content:b});
        });
        closeM();toast('Envoyé à '+ct.length+' contact(s) ✉','ok');
        if(curId){var cc=contacts.find(function(x){return x.id===curId;});if(cc)renderDetail(cc);}
      }else{
        var sel=document.getElementById('csel');if(!sel){toast('Aucune campagne','warn');return;}
        var camp=camps[parseInt(sel.value)];if(!camp){alert('Campagne invalide');return;}
        var delay=0;
        ct.forEach(function(c){
          setTimeout(function(){
            window.parent.postMessage({veraluzEvent:true,source:MID,type:'send-email',data:{to_email:c.email,to_name:c.name,subject:camp.subject||camp.name||'',body_html:camp.body||camp.content||''}}, '*');
            addE(c.id,{type:'sent',subject:'[Camp.] '+(camp.name||''),content:camp.subject||''});
          },delay);delay+=300;
        });
        closeM();toast('Campagne → '+ct.length+' contacts 🚀','ok');
      }
    },'Envoyer');
  if(tpls.length)setTimeout(fillT,80);
}
function togCT(){var v=document.querySelector('input[name="ct"]:checked').value;document.getElementById('cs2').style.display=v==='simple'?'':'none';document.getElementById('cc2').style.display=v==='camp'?'':'none';}
function fillT(){
  var tpls=[];try{tpls=JSON.parse(localStorage.getItem('vz_email_templates_lib')||'[]');}catch(e){}
  var sel=document.getElementById('tsel');if(!sel||!tpls.length)return;
  var tpl=tpls[parseInt(sel.value)];if(!tpl)return;
  var s=document.getElementById('csubj'),b=document.getElementById('cbody');
  if(s)s.value=tpl.subject||tpl.name||'';
  if(b)b.value=(tpl.body||tpl.content||'').replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');
}

/* Modal */
var mfn=null;
function showM(title,body,fn,ok){document.getElementById('mt').textContent=title;document.getElementById('mb').innerHTML=body;document.getElementById('mok').textContent=ok||'Confirmer';mfn=fn;document.getElementById('ov').style.display='flex';}
function closeM(){document.getElementById('ov').style.display='none';}
function doM(){if(mfn)mfn();}

function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(t._t);t._t=setTimeout(function(){t.className='toast';},3500);}

window.addEventListener('load',function(){loadAll();});
</script>
