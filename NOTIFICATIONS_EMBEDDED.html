<title>Veraluz OS — Notifications &amp; Alertes</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3347;--border:#3a3f55;--border2:#4a5068;
  --accent:#6c63ff;--accent2:#8b7fff;--glow:rgba(108,99,255,.15);
  --green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4;
  --orange:#f97316;--purple:#8b5cf6;--pink:#ec4899;--teal:#14b8a6;
  --text:#e8eaf6;--text2:#9ca3af;--text3:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
/* Sidebar */
.sidebar{width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:14px 16px;border-bottom:1px solid var(--border);}
.logo-t{font-size:15px;font-weight:700;color:var(--accent2);}
.logo-s{font-size:10px;color:var(--text3);}
.nav{padding:6px;flex:1;overflow-y:auto;}
.nv{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:12.5px;margin-bottom:1px;transition:.15s;}
.nv:hover{background:var(--bg3);color:var(--text);}
.nv.active{background:var(--glow);color:var(--accent2);border:1px solid var(--border);}
.nv-icon{font-size:15px;width:18px;text-align:center;}
.nv-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:600;}
.nav-user{padding:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.u-av{width:32px;height:32px;border-radius:50%;background:rgba(108,99,255,.2);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.u-nm{font-size:12px;font-weight:600;}.u-rl{font-size:10px;color:var(--text3);}
.ca-tag{background:rgba(108,99,255,.15);color:var(--accent2);border:1px solid rgba(108,99,255,.2);padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;}
/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;}
.pg-title{font-size:17px;font-weight:700;flex:1;}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(16,185,129,.4);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(16,185,129,.4);}70%{box-shadow:0 0 0 8px rgba(16,185,129,0);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}}
.pulse-red{background:var(--red);box-shadow:0 0 0 0 rgba(239,68,68,.4);animation:pulseR 1.5s infinite;}
@keyframes pulseR{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}70%{box-shadow:0 0 0 8px rgba(239,68,68,0);}100%{box-shadow:0 0 0 0 rgba(239,68,68,0);}}
/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;overflow-x:auto;flex-shrink:0;}
.tab{padding:10px 13px;font-size:12.5px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab-badge{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:700;}
/* Content */
.content{flex:1;overflow-y:auto;padding:16px;}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:16px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px;transition:.15s;}
.kpi-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:700;margin:2px 0;}
.kpi-sub{font-size:11px;color:var(--text3);}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:12px;}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr;}.sidebar{display:none;}}
/* Badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;}
.bg{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2);}
.br{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.by{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.2);}
.bb{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);}
.bp{background:rgba(108,99,255,.1);color:var(--accent2);border:1px solid rgba(108,99,255,.2);}
.bgr{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.bo{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2);}
.bc{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2);}
.bpk{background:rgba(236,72,153,.1);color:var(--pink);border:1px solid rgba(236,72,153,.2);}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:.15s;}
.bp_{background:var(--accent);color:#fff;}.bp_:hover{background:var(--accent2);}
.bg_{background:var(--green);color:#fff;}.bg_:hover{opacity:.85;}
.br_{background:var(--red);color:#fff;}.br_:hover{opacity:.85;}
.by_{background:var(--yellow);color:#000;}.by_:hover{opacity:.85;}
.bo_{background:var(--bg3);border:1px solid var(--border);color:var(--text2);}.bo_:hover{color:var(--text);background:var(--bg4);}
.btn-sm{padding:4px 9px;font-size:11px;}
/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.mh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1;}
.mt{font-size:15px;font-weight:600;}
.mc{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:15px;}
.mb{padding:18px;}
.mf{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
/* Form */
.fg{margin-bottom:11px;}
label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* Notification items */
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:9px;margin-bottom:6px;cursor:pointer;transition:.15s;border-left:3px solid transparent;position:relative;}
.notif-item:hover{background:var(--bg3);}
.notif-item.unread{background:rgba(108,99,255,.05);border-left-color:var(--accent);}
.notif-item.critical{border-left-color:var(--red);background:rgba(239,68,68,.05);}
.notif-item.high{border-left-color:var(--orange);}
.notif-item.medium{border-left-color:var(--yellow);}
.notif-item.low{border-left-color:var(--green);}
.notif-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.notif-body{flex:1;min-width:0;}
.notif-title{font-size:13px;font-weight:600;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.notif-text{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.notif-meta{font-size:10px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
/* Channel indicators */
.ch-icon{font-size:14px;opacity:.85;}
/* Alert banner */
.alert-banner{padding:10px 14px;border-radius:9px;font-size:12.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.al-crit{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;animation:flashBorder 2s infinite;}
@keyframes flashBorder{0%,100%{border-color:rgba(239,68,68,.3);}50%{border-color:rgba(239,68,68,.7);}}
.al-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--yellow);}
.al-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:var(--blue);}
.al-ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green);}
/* Timeline */
.tl{position:relative;padding-left:18px;}
.tl::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:10px;}
.tl-dot{position:absolute;left:-16px;top:3px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2);}
.tl-time{font-size:10px;color:var(--text3);}
.tl-text{font-size:12.5px;margin-top:1px;}
/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg4);}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:20px;cursor:pointer;transition:.3s;}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked + .toggle-slider{background:var(--accent);}
.toggle input:checked + .toggle-slider::before{transform:translateX(16px);}
/* Channel cards */
.ch-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;}
.ch-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.ch-badge-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* Priority bars */
.pr-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* Stats mini */
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg4);font-size:12.5px;}
/* Rules */
.rule-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:12.5px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:340px;}
.toast.show{display:flex;align-items:center;gap:8px;}
/* Realtime indicator */
.rt-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--green);}
/* Table */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
td{padding:9px 10px;border-bottom:1px solid var(--bg4);font-size:12.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px;}
</style>
<style data-injected="embedded-mode">
/* ═══════════════════════════════════════
   EMBEDDED MODE — injecté par create_embedded.py
   Supprime toute interface interne et force le module
   à occuper 100% du cadre iframe du Core
═══════════════════════════════════════ */
html, body {
  margin: 0 !important;
  padding: 0 !important;
  height: 100% !important;
  overflow: hidden !important;
  background: var(--bg-main, #0f172a) !important;
}

/* Supprimer les wrappers inutiles */
.app {
  display: block !important;
  height: 100vh !important;
  overflow: hidden !important;
}

/* .main occupe tout l'espace */
.main {
  display: flex !important;
  flex-direction: column !important;
  height: 100vh !important;
  width: 100% !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
  background: var(--bg-main, #0f172a) !important;
}

/* Tabs collés en haut */
.tabs {
  flex-shrink: 0 !important;
}

/* Content scrollable prend le reste */
.content {
  flex: 1 !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  padding: 20px !important;
  box-sizing: border-box !important;
}

/* RESTAURANT: les .view occupent tout le .main */
.main > .view {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  height: 100%;
  box-sizing: border-box;
}
.main > .view.active {
  display: flex;
  flex-direction: column;
}

/* Masquer sidebar, topbar, toast internes */
.sidebar,
aside.sidebar,
.topbar,
#toast,
.toast,
.bottom-nav,
nav.bottom-nav {
  display: none !important;
}
</style></head>
<body><script data-injected="embedded-bridge">
/* ═══════════════════════════════════════
   EMBEDDED BRIDGE — Communication avec Veraluz OS Core
   Injecté par create_embedded.py
═══════════════════════════════════════ */
(function() {
  'use strict';

  /* 1. Toast → déléguer au parent */
  /* ── Toast bridge ── */
  window.toast = function(msg, type) {
    var t = document.getElementById('toast-el');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast-el';
      t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1a1d27;color:#e8eaf6;'
        +'border:1px solid #3a3f55;padding:10px 16px;border-radius:10px;font-size:13px;'
        +'z-index:9999;opacity:0;transition:opacity .3s;max-width:320px;';
      document.body.appendChild(t);
    }
    var icons = {success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
    t.textContent = (icons[type]||'ℹ️') + ' ' + msg;
    t.style.opacity = '1';
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(function(){ t.style.opacity='0'; }, 3200);
  };
  window.showToast = window.toast;

  /* ── Émettre vers le Core (format compatible) ── */
  window.emitToCore = function(type, data) {
    try {
      window.parent.postMessage({
        source: 'veraluz-notifications',
        type: type,
        data: data
      }, '*');
    } catch(e) {}
  };

  /* ── Recevoir auth-context + événements du Core ── */
  window.addEventListener('message', function(e) {
    if (!e.data) return;
    /* Auth context depuis le Core */
    if (e.data.source === 'veraluz-core' && e.data.type === 'auth-context') {
      var d = e.data.data || {};
      if (d.name) {
        var el = document.getElementById('notif-user-name');
        var rl = document.getElementById('notif-user-role');
        if (el) el.textContent = d.name;
        if (rl) rl.textContent = d.roleLabel || d.role || '';
      }
      /* Recharger les notifs en tenant compte du rôle */
      if (typeof loadNotificationsFromSupabase === 'function') {
        loadNotificationsFromSupabase();
      }
    }
    /* Événements du Core routés vers ce module */
    if (e.data.source === 'veraluz-core' && e.data.type === 'module-event') {
      var payload = e.data.data || {};
      if (payload.originalType === 'reservation-created' ||
          payload.originalType === 'checkout-completed' ||
          payload.originalType === 'payment-validated') {
        /* Recharger les notifs quand un autre module génère un événement */
        if (typeof loadNotificationsFromSupabase === 'function') {
          setTimeout(loadNotificationsFromSupabase, 800);
        }
      }
    }
  });

  /* ── Signaler que le module est prêt ── */
  window.addEventListener('DOMContentLoaded', function() {
    window.emitToCore('module-ready', { module: 'veraluz-notifications' });
  });
})();
</script>

function testChannel(id){
  const ch=channels.find(c=>c.id===id);

  toast(`🧪 Message test envoyé via ${ch.name} → +237 699 001 001`,'success');
  ch.sent_today++;ch.total_sent++;
  setTimeout(()=>render(),500);
}
function retryChannel(id){
  const ch=channels.find(c=>c.id===id);
  toast(`🔄 Reconnexion ${ch.name} en cours...`,'info');
  setTimeout(()=>{ch.status='active';ch.last_error=null;toast(`✅ ${ch.name} reconnecté`,'success');render();},1500);
}
function toggleChannel(id){
  const ch=channels.find(c=>c.id===id);
  ch.status=ch.status==='active'?'inactive':'active';
  toast(`${ch.status==='active'?'✅':'⏸'} Canal ${ch.name} ${ch.status==='active'?'activé':'désactivé'}`,'info');
  render();
}

  </div>

  ${rules.map(r=>`
    <div class="rule-card" style="opacity:${r.active?1:0.5};">
      <div style="font-size:22px;">${trigIcons[r.trigger]||'⚙️'}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:600;">${r.name}</span>
          ${priorityBadge(r.priority)}
          <span class="bdg bgr">${r.trigger}</span>

          <span>👥 ${r.roles.join(', ')}</span>
          <span>${r.channels.map(ch=>CHANNELS[ch]?.icon||ch).join(' ')}</span>
          <span>🔢 ${r.triggers} déclenchement${r.triggers>1?'s':''}</span>
          ${r.last?`<span>🕐 Dernier: ${r.last}</span>`:'<span>Jamais déclenché</span>'}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;">

  `).join('')}`;
}

function toggleRule(id){
  const r=rules.find(x=>x.id===id);r.active=!r.active;
  toast(`${r.active?'▶️':'⏸'} Règle "${r.name}" ${r.active?'activée':'désactivée'}`,'info');render();
}
function testRule(id){
  const r=rules.find(x=>x.id===id);
  if(!r.active){toast(`⚠️ Règle désactivée — activez-la d'abord`,'warn');return;}
  toast(`🧪 Test règle "${r.name}" — notification simulée envoyée`,'success');
  r.triggers++;r.last=new Date().toLocaleString('fr-FR');
  setTimeout(()=>injectNotification(`🧪 Test: ${r.name}`,`Simulation de déclenchement de la règle automatique "${r.name}".`,'system',r.priority),800);
}
function addRule(){
  const name=document.getElementById('rl-name').value.trim();
  if(!name){toast('Nom obligatoire','warn');return;}
  rules.push({
    id:rules.length+1,name,
    trigger:document.getElementById('rl-trigger').value,
    condition:document.getElementById('rl-condition').value||'Condition non définie',
    priority:document.getElementById('rl-priority').value,
    roles:['owner'],channels:['in_app','whatsapp'],
    active:true,triggers:0,last:null,
  });
  closeModal('modal-rule');toast(`✅ Règle "${name}" créée`,'success');render();
}

        ${Object.entries(CATEGORIES).map(([cat,info])=>{
          const p=prefs.categories[cat]||{channels:['in_app'],priority_min:'medium'};
          return `<div style="margin-bottom:10px;padding:10px;background:var(--bg3);border-radius:9px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
              <span style="font-size:16px;">${info.icon}</span>
              <span style="font-size:12.5px;font-weight:600;">${info.label}</span>
              <span class="bdg" style="background:${info.color}20;color:${info.color};border:1px solid ${info.color}40;margin-left:auto;">${p.channels.map(ch=>CHANNELS[ch]?.icon||ch).join('')}</span>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${Object.keys(CHANNELS).map(ch=>`
                <label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:10px;color:var(--text2);">
                  <input type="checkbox" ${p.channels.includes(ch)?'checked':''} onchange="toggleCatChannel('${cat}','${ch}',this.checked)" style="width:auto;">
                  ${CHANNELS[ch].icon}
                </label>
              `).join('')}
              <select onchange="prefs.categories['${cat}'].priority_min=this.value;toast('Seuil ${info.label} mis à jour')" style="width:100px;font-size:10px;padding:2px 4px;">
                ${Object.entries(PRIORITIES).map(([k,v])=>`<option value="${k}" ${p.priority_min===k?'selected':''}>${v.dot} ${v.label} min.</option>`).join('')}
              </select>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📧 Rapports automatiques</div>
    <div class="toggle-wrap">
      <div><div style="font-size:13px;font-weight:500;">📅 Digest quotidien (8h00)</div><div style="font-size:10px;color:var(--text2);">Résumé: réservations, paiements, alertes non résolues</div></div>
      <label class="toggle"><input type="checkbox" ${prefs.daily_digest?'checked':''} onchange="prefs.daily_digest=this.checked;toast(this.checked?'✅ Digest quotidien activé':'⏸ Digest quotidien désactivé')"><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-wrap">
      <div><div style="font-size:13px;font-weight:500;">📊 Rapport hebdomadaire (Lundi 8h)</div><div style="font-size:10px;color:var(--text2);">Bilan complet: finance, taux occupation, performance</div></div>
      <label class="toggle"><input type="checkbox" ${prefs.weekly_report?'checked':''} onchange="prefs.weekly_report=this.checked;toast(this.checked?'✅ Rapport hebdo activé':'⏸ Rapport hebdo désactivé')"><span class="toggle-slider"></span></label>
    </div>
  </div>`;
}

function togglePrefChannel(ch,val){
  if(val){if(!prefs.channels_enabled.includes(ch))prefs.channels_enabled.push(ch);}
  else prefs.channels_enabled=prefs.channels_enabled.filter(c=>c!==ch);
  toast(`${val?'✅':'⏸'} Canal ${CHANNELS[ch].label} ${val?'activé':'désactivé'}`,'info');
}
function toggleCatChannel(cat,ch,val){
  if(!prefs.categories[cat])prefs.categories[cat]={channels:['in_app'],priority_min:'medium'};
  if(val){if(!prefs.categories[cat].channels.includes(ch))prefs.categories[cat].channels.push(ch);}
  else prefs.categories[cat].channels=prefs.categories[cat].channels.filter(c=>c!==ch);
  toast(`${CATEGORIES[cat].icon} ${CATEGORIES[cat].label}: ${CHANNELS[ch].label} ${val?'activé':'désactivé'}`,'info');
}

// ════════════════════════════════════════════════
// HISTORIQUE
// ════════════════════════════════════════════════
function renderHistorique(){
  const total=notifications.length;
  const sent=channels.reduce((a,c)=>a+c.total_sent,0);
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="font-size:15px;font-weight:600;">📋 Historique Complet</div>
    <div style="display:flex;gap:8px;">
      <button class="btn bo_ btn-sm" onclick="toast('Export CSV historique','success')">📥 CSV</button>
      <button class="btn bo_ btn-sm" onclick="toast('Rapport PDF audit','success')">📄 PDF</button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-lbl">📨 Total notifications</div><div class="kpi-val" style="color:var(--accent2);">${total}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">📡 Total envois</div><div class="kpi-val" style="color:var(--blue);">${sent}</div></div>
    <div class="kpi-card"><div class="kpi-lbl">✅ Taux de lecture</div><div class="kpi-val" style="color:var(--green);">${total>0?(notifications.filter(n=>n.status!=='unread').length/total*100).toFixed(0):0}%</div></div>
    <div class="kpi-card"><div class="kpi-lbl">⚡ Acquittées</div><div class="kpi-val" style="color:var(--yellow);">${notifications.filter(n=>n.status==='acknowledged').length}</div></div>
  </div>

  <div class="card" style="padding:0;">
    <div class="tw"><table>
      <tr><th>N°</th><th>Titre</th><th>Catégorie</th><th>Priorité</th><th>Canaux</th><th>Destinataire</th><th>Statut</th><th>Date</th><th>Actions</th></tr>
      ${notifications.map(n=>`<tr>
        <td style="font-family:monospace;font-size:10px;color:var(--text3);">${n.num}</td>
        <td><div style="font-size:12px;font-weight:${n.status==='unread'?'600':'400'};max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${n.title}</div></td>
        <td><span class="bdg bgr">${catIcon(n.category)} ${(CATEGORIES[n.category]||{label:n.category}).label}</span></td>
        <td>${priorityBadge(n.priority)}</td>
        <td style="font-size:14px;">${n.channels.map(ch=>CHANNELS[ch]?.icon||ch).join(' ')}</td>
        <td style="font-size:11px;">${n.recipient}</td>
        <td><span class="bdg ${n.status==='unread'?'bp':n.status==='acknowledged'?'bg':n.status==='read'?'bgr':'bgr'}">${n.status==='unread'?'📩 Non lue':n.status==='acknowledged'?'✅ Acquittée':n.status==='read'?'👁 Lue':'—'}</span></td>
        <td style="font-size:10px;color:var(--text2);white-space:nowrap;">${n.date}</td>
        <td><button class="btn bo_ btn-sm" onclick="viewNotif(${n.id})">👁</button></td>
      </tr>`).join('')}
    </table></div>
  </div>`;
}
</script>
<script>
// ════════════════════════════════════════════════
// ACTIONS & SIMULATION
// ════════════════════════════════════════════════
function viewNotif(id){
  const n=notifications.find(x=>x.id===id);
  if(n.status==='unread')n.status='read';
  const cat=CATEGORIES[n.category]||{icon:'📌',label:n.category,color:'#6b7280'};
  document.getElementById('nd-title').innerHTML=`${catIcon(n.category)} ${n.num}`;
  document.getElementById('nd-body').innerHTML=`
    <div style="padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:14px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:6px;line-height:1.4;">${n.title}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${priorityBadge(n.priority)}
        <span class="bdg bgr">${cat.icon} ${cat.label}</span>
        <span class="bdg bgr">${n.status==='acknowledged'?'✅ Acquittée':n.status==='read'?'👁 Lue':'📩 Non lue'}</span>
        ${n.requires_ack?'<span class="bdg br">⚡ Ack. requis</span>':''}
      </div>
    </div>
    <div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;">${n.body}</div>
    ${n.data&&Object.keys(n.data).length>0?`
      <div style="background:var(--bg3);border-radius:9px;padding:12px;margin-bottom:14px;">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Données contextuelles</div>
        ${Object.entries(n.data).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;border-bottom:1px solid var(--bg4);"><span style="color:var(--text2);">${k}</span><span style="font-weight:600;">${typeof v==='number'?v.toLocaleString('fr-FR'):v}</span></div>`).join('')}
      </div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
      <div><div style="color:var(--text3);font-size:10px;">Destinataire</div><div>${n.recipient}</div></div>
      <div><div style="color:var(--text3);font-size:10px;">Envoyée le</div><div>${n.date}</div></div>
      <div><div style="color:var(--text3);font-size:10px;">Canaux utilisés</div><div>${n.channels.map(ch=>CHANNELS[ch]?.icon+' '+CHANNELS[ch]?.label).join(', ')}</div></div>
      <div><div style="color:var(--text3);font-size:10px;">Référence</div><div style="font-family:monospace;">${n.num}</div></div>
    </div>
  `;
  let footer=`<button class="btn bo_" onclick="closeModal('modal-notif-detail')">Fermer</button>`;
  if(n.requires_ack&&n.status!=='acknowledged')footer+=`<button class="btn bg_" onclick="ackNotif(${n.id});closeModal('modal-notif-detail')">✅ Acquitter</button>`;
  if(n.action_url)footer+=`<button class="btn bp_" onclick="closeModal('modal-notif-detail');toast('Navigation vers le module concerné')">🔗 Voir module</button>`;
  document.getElementById('nd-footer').innerHTML=footer;
  showModal('modal-notif-detail');
  updateBadges();render();
}

function readNotif(id){
  const n=notifications.find(x=>x.id===id);
  n.status='read';toast('👁 Notification marquée comme lue','info');updateBadges();render();
}
function ackNotif(id){
  const n=notifications.find(x=>x.id===id);
  n.status='acknowledged';
  toast(`✅ ${n.num} acquittée — action confirmée`,'success');
  updateBadges();render();
}
function markAllRead(){
  notifications.forEach(n=>{if(n.status==='unread')n.status='read';});
  toast('✅ Toutes les notifications marquées comme lues','success');
  updateBadges();render();
}

function sendManualNotif(){
  const title=document.getElementById('snd-title').value.trim();
  const msg=document.getElementById('snd-msg').value.trim();
  if(!title||!msg){toast('Titre et message obligatoires','warn');return;}
  const priority=document.getElementById('snd-priority').value;
  const cat=document.getElementById('snd-cat').value;
  const chs=[];
  if(document.getElementById('ch-inapp').checked)chs.push('in_app');
  if(document.getElementById('ch-whatsapp').checked)chs.push('whatsapp');
  if(document.getElementById('ch-email').checked)chs.push('email');
  if(document.getElementById('ch-sms').checked)chs.push('sms');
  if(document.getElementById('ch-push').checked)chs.push('push');
  if(chs.length===0){toast('Sélectionnez au moins un canal','warn');return;}
  injectNotification(title,msg,cat,priority,chs);
  closeModal('modal-send');
  toast(`📤 Notification envoyée via ${chs.map(ch=>CHANNELS[ch]?.icon).join('')}`,'success');
}

function injectNotification(title,body,cat,priority,chs){
  cat=cat||'system'; priority=priority||'medium'; chs=chs||['in_app'];
  const newId=notifications.length+1;
  const num='NTF-'+String(newId).padStart(4,'0');
  notifications.unshift({
    id:newId,num,title,body,category:cat,priority,
    status:'unread',channel:chs[0],channels:chs,
    recipient:'Smith (Canada)',
    date:new Date().toLocaleString('fr-FR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(',',''),
    data:{},requires_ack:priority==='critical',
  });
  chs.forEach(ch=>{const c=channels.find(x=>x.type===ch);if(c){c.sent_today++;c.total_sent++;}});
  updateBadges();render();
}

function simulateAlert(){
  const scenarios=[
    {title:'🔥 Incendie détecté — Cuisine restaurant',body:'Détecteur fumée déclenché cuisine 1er étage à '+new Date().toLocaleTimeString('fr-FR')+'. Vérification immédiate requise. Pompiers alertés automatiquement.',cat:'security',priority:'critical'},
    {title:'💰 Paiement non reçu — Groupe Minepat',body:'Le virement de 620 000 FCFA attendu de la réservation groupe MINEPAT n\'est pas encore confirmé. Dépassement de 24h.',cat:'payment',priority:'high'},
    {title:'🛏️ Chambre 202 — Plainte client urgente',body:'M. Essomba (Ch.202) signale une fuite d\'eau depuis la douche. Suite présidentielle voisine pourrait être affectée. Intervention immédiate.',cat:'maintenance',priority:'high'},
    {title:'🔒 Accès serveur inhabituel — 03h12',body:'Tentative de connexion à l\'interface admin depuis une IP inconnue (197.234.x.x — Nigéria). Session bloquée automatiquement.',cat:'security',priority:'critical'},
    {title:'👤 Nouveau check-in VIP',body:'M. Laurent Eto\'o Fils arrive pour 5 nuits — Suite Présidentielle. Départ prévu le 19/05. Bouquet bienvenue requis.',cat:'reservation',priority:'medium'},
  ];
  const s=scenarios[Math.floor(Math.random()*scenarios.length)];
  injectNotification(s.title,s.body,s.cat,s.priority,['in_app','whatsapp','push']);
  toast(`⚡ Alerte simulée: ${s.priority.toUpperCase()}`,'warn');
}

// Simulation temps réel: nouvelle notification toutes les 45s
function startRealtime(){
  if(simulationInterval)return;
  simulationInterval=setInterval(()=>{
    const auto=[
      {title:'💳 Paiement reçu Orange Money',body:'Encaissement de 45 000 FCFA via Orange Money pour chambre 104.',cat:'payment',priority:'low'},
      {title:'🛏️ Check-out effectué — Ch.106',body:'M. Bikogo a rendu la chambre 106. Ménage requis avant 15h.',cat:'room',priority:'low'},
      {title:'🍽️ Commande VIP Table 8',body:'Commande spéciale Homard + bouteille Champagne — Table 8. Confirmation cuisine requise.',cat:'restaurant',priority:'medium'},
    ];
    const n=auto[Math.floor(Math.random()*auto.length)];
    injectNotification(n.title,n.body,n.cat,n.priority);
  },45000);
}

// ════════════════════════════════════════════════
// SUPABASE INTEGRATION
// ════════════════════════════════════════════════
const SUPA_URL = 'https://dfdmasejsoibxrvubegu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmZG1hc2Vqc29pYnhydnViZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDgzOTMsImV4cCI6MjA5MjI4NDM5M30.dEsafV84HFmFqU6Yi4xKydIbUlkIVE7QMRMpFt8kqXY';

function sbHdr(extra) {
  return Object.assign({'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}, extra||{});
}

let _supabaseLoaded = false;

function loadNotificationsFromSupabase() {
  fetch(SUPA_URL + '/rest/v1/veraluz_notifications?select=*&order=created_at.desc&limit=50', {
    headers: sbHdr()
  })
  .then(function(r){ return r.json(); })
  .then(function(rows) {
    if (!Array.isArray(rows) || rows.length === 0) {
      _supabaseLoaded = true;
      render(); return;
    }
    /* Mapper les colonnes Supabase → format local */
    notifications = rows.map(function(r, i) {
      return {
        id:          r.id || i+1,
        num:         'NTF-' + String(i+1).padStart(4,'0'),
        title:       r.title || '(sans titre)',
        body:        r.message || r.body || '',
        category:    r.category || 'system',
        priority:    r.priority || 'medium',
        status:      r.read_at ? 'read' : 'unread',
        channel:     (r.channels && r.channels[0]) || 'in_app',
        channels:    r.channels || ['in_app'],
        recipient:   r.recipient_role || 'Équipe',
        date:        (r.created_at||'').replace('T',' ').slice(0,16),
        requires_ack: r.requires_ack || false,
        data:        r.metadata || {}
      };
    });
    _supabaseLoaded = true;
    updateBadges();
    render();
    /* Émettre le compteur de non-lues vers le Core */
    window.emitToCore('notification-count', { unread: unreadCount() });
  })
  .catch(function(err) {
    console.warn('[Notifications] Supabase load failed, using demo data:', err);
    _supabaseLoaded = true;
    render();
  });
}

function saveNotifToSupabase(notif) {
  fetch(SUPA_URL + '/rest/v1/veraluz_notifications', {
    method: 'POST',
    headers: sbHdr({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body: JSON.stringify({
      title:    notif.title,
      message:  notif.body,
      category: notif.category || 'system',
      priority: notif.priority || 'medium',
      channels: notif.channels || ['in_app'],
      recipient_role: 'all',
      requires_ack: notif.requires_ack || false,
      metadata: notif.data || {}
    })
  }).catch(function(e){ console.warn('[Notifications] Save failed:', e); });
}

function markReadInSupabase(notifId) {
  fetch(SUPA_URL + '/rest/v1/veraluz_notifications?id=eq.' + notifId, {
    method: 'PATCH',
    headers: sbHdr({'Content-Type':'application/json','Prefer':'return=minimal'}),
    body: JSON.stringify({ read_at: new Date().toISOString() })
  }).catch(function(e){ console.warn('[Notifications] markRead failed:', e); });
}


// INIT
loadNotificationsFromSupabase();
startRealtime();
</script>
